<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Orb G — Ripple sphere (true sine waves)</title>
<style>
  :root {
    --bg: #06070d;
    --fg: #d8e4ff;
    --muted: #5a6a8a;
    --grid: #0f1626;
    --color-accent: #00f0ff;
    --orb-accent: var(--color-accent);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100%; background: var(--bg); color: var(--fg);
    font-family: "JetBrains Mono", ui-monospace, monospace;
  }
  body {
    display: grid; place-items: center;
    background-image:
      radial-gradient(var(--grid) 1px, transparent 1px),
      radial-gradient(var(--grid) 1px, transparent 1px);
    background-size: 24px 24px, 24px 24px;
    background-position: 0 0, 12px 12px;
    overflow: hidden;
  }
  .stage { display: grid; gap: 48px; justify-items: center; perspective: 1400px; }
  h1 {
    font-weight: 500; font-size: 13px; letter-spacing: .28em; text-transform: uppercase;
    color: var(--orb-accent); margin: 0 0 10px;
    text-shadow: 0 0 12px var(--orb-accent);
  }
  .desc { color: var(--muted); font-size: 12px; max-width: 580px; text-align: center; line-height: 1.6; }
  .controls {
    display: flex; gap: 22px; align-items: center; flex-wrap: wrap;
    justify-content: center; margin-top: 18px;
    color: var(--muted); font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  }
  .controls label { display: inline-flex; align-items: center; gap: 8px; }
  .controls input[type=range] { accent-color: var(--orb-accent); }
  .controls .val { color: var(--orb-accent); min-width: 3.2em; text-align: right; }
  .accents { display: flex; gap: 10px; }
  .accents button {
    width: 22px; height: 22px; border-radius: 50%; border: 1px solid #222a3d;
    cursor: pointer; padding: 0; background: var(--c); box-shadow: 0 0 8px var(--c);
  }
  .row { display: flex; gap: 80px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .swatch { display: grid; justify-items: center; }
  .label { color: var(--muted); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; margin-top: 18px; text-align: center; }

  /* ====================== Orb G — sine-wave-displaced dot sphere ====================== */
  .scene {
    width: var(--s, 280px);
    height: var(--s, 280px);
    perspective: 1100px;
    transform: rotateX(15deg);
    color: var(--orb-accent);
  }
  .sphere {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: g-spin var(--spin, 16s) linear infinite;
  }
  .sphere span {
    --d: calc(var(--s, 280px) / 90);
    position: absolute;
    top: 50%; left: 50%;
    width: var(--d); height: var(--d);
    margin: calc(var(--d) * -0.5) 0 0 calc(var(--d) * -0.5);
    border-radius: 50%;
    background: currentColor;
    transform-style: preserve-3d;
    transform: var(--t);
    /* per-dot brightness driven from JS via --br */
    opacity: var(--br, 0.6);
    box-shadow:
      0 0 calc(var(--d) * var(--glow, 1)) currentColor,
      0 0 calc(var(--d) * var(--glow, 1) * 2.5) color-mix(in srgb, currentColor 50%, transparent);
    will-change: transform, opacity;
  }
  @keyframes g-spin {
    0%   { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }

  .xs { --s: 80px; }
  .sm { --s: 120px; }
  .md { --s: 180px; }
  .lg { --s: 320px; }
</style>
</head>
<body>
  <div class="stage">
    <div style="text-align:center">
      <h1>Orb G · Ripple sphere</h1>
      <p class="desc">Fibonacci-distributed dots whose radial distance is displaced by two interfering sine waves traveling around the sphere. Real wavefronts you can watch sweep past — each dot brightens at the crests.</p>
      <div class="controls">
        <label>dots <input id="dots" type="range" min="80" max="900" step="20" value="500" /> <span class="val" id="dotsVal">500</span></label>
        <label>amp <input id="amp" type="range" min="0" max="40" step="1" value="18" /> <span class="val" id="ampVal">18%</span></label>
        <label>k1 <input id="k1" type="range" min="1" max="10" step="1" value="4" /> <span class="val" id="k1Val">4</span></label>
        <label>k2 <input id="k2" type="range" min="0" max="10" step="1" value="3" /> <span class="val" id="k2Val">3</span></label>
        <label>speed <input id="speed" type="range" min="0" max="30" step="1" value="12" /> <span class="val" id="speedVal">12</span></label>
        <span class="accents">
          <button style="--c:#00f0ff" onclick="setAccent('#00f0ff')"></button>
          <button style="--c:#ff2bd6" onclick="setAccent('#ff2bd6')"></button>
          <button style="--c:#a855f7" onclick="setAccent('#a855f7')"></button>
          <button style="--c:#39ff7a" onclick="setAccent('#39ff7a')"></button>
          <button style="--c:#ffcc00" onclick="setAccent('#ffcc00')"></button>
          <button style="--c:#ff5555" onclick="setAccent('#ff5555')"></button>
        </span>
      </div>
    </div>

    <div class="row">
      <div class="swatch">
        <div class="scene lg"><div class="sphere" data-orb-g></div></div>
        <div class="label">primary · 320</div>
      </div>
    </div>

    <div class="row">
      <div class="swatch"><div class="scene xs"><div class="sphere" data-orb-g></div></div><div class="label">xs · 80</div></div>
      <div class="swatch"><div class="scene sm"><div class="sphere" data-orb-g></div></div><div class="label">sm · 120</div></div>
      <div class="swatch"><div class="scene md"><div class="sphere" data-orb-g></div></div><div class="label">md · 180</div></div>
    </div>
  </div>

<script>
  // -------- helpers --------
  const TAU = Math.PI * 2;

  /** Fibonacci-sphere unit points (very even distribution, no pole bunching). */
  function fibonacciSphere(n) {
    const pts = [];
    const phi = (1 + Math.sqrt(5)) / 2;            // golden ratio
    for (let i = 0; i < n; i++) {
      // y = -1 .. 1 evenly
      const y = 1 - (i / (n - 1)) * 2;
      const r = Math.sqrt(1 - y * y);
      const theta = TAU * i / phi;                 // golden-angle increment
      const x = Math.cos(theta) * r;
      const z = Math.sin(theta) * r;
      // store base unit vector + spherical coords for wave math
      // u = longitude (0..2π), v = latitude (0..π)
      const u = Math.atan2(z, x);                  // -π..π
      const v = Math.acos(y);                      // 0..π
      pts.push({ x, y, z, u, v });
    }
    return pts;
  }

  // -------- per-orb state --------
  /** @type {Map<HTMLElement, {radius:number, dots:HTMLElement[], pts:any[]}>} */
  const orbs = new Map();

  function rebuild(sphere) {
    const radius = sphere.getBoundingClientRect().width / 2;
    const n = +document.getElementById("dots").value;
    const pts = fibonacciSphere(n);
    sphere.innerHTML = "";
    const dots = [];
    for (let i = 0; i < n; i++) {
      const dot = document.createElement("span");
      sphere.appendChild(dot);
      dots.push(dot);
    }
    orbs.set(sphere, { radius, dots, pts });
  }

  // -------- animation loop --------
  let t0 = performance.now();
  function frame(now) {
    const t = (now - t0) / 1000;
    const amp     = +document.getElementById("amp").value / 100;   // 0..0.4 (% of radius)
    const k1      = +document.getElementById("k1").value;          // longitudinal wavenumber
    const k2      = +document.getElementById("k2").value;          // latitudinal wavenumber
    const speed   = +document.getElementById("speed").value / 10;  // rad/s scale

    orbs.forEach((st, sphere) => {
      const { radius, dots, pts } = st;
      for (let i = 0; i < pts.length; i++) {
        const p = pts[i];
        // two interfering traveling waves, one along longitude one along latitude
        const w1 = Math.sin(k1 * p.u + speed * t);
        const w2 = Math.sin(k2 * p.v - speed * 0.7 * t + 1.3);
        const wave = (w1 + w2) * 0.5;             // -1..1
        const r = radius * (1 + amp * wave);

        const x = p.x * r;
        const y = p.y * r;
        const z = p.z * r;
        const dot = dots[i];
        dot.style.setProperty("--t", `translate3d(${x.toFixed(2)}px, ${y.toFixed(2)}px, ${z.toFixed(2)}px)`);
        dot.style.transform = `translate3d(${x.toFixed(2)}px, ${y.toFixed(2)}px, ${z.toFixed(2)}px)`;

        // brightness: crest = bright, trough = dim
        const br = 0.35 + 0.65 * (0.5 + 0.5 * wave);            // 0.35..1
        dot.style.setProperty("--br", br.toFixed(3));
        dot.style.opacity = br.toFixed(3);
        // glow grows with brightness
        dot.style.setProperty("--glow", (0.6 + 1.6 * br).toFixed(2));
      }
    });

    requestAnimationFrame(frame);
  }

  function setAccent(c) {
    document.documentElement.style.setProperty("--orb-accent", c);
  }

  // -------- wire controls --------
  function bind(id, valId, suffix = "") {
    const el = document.getElementById(id);
    el.addEventListener("input", e => {
      document.getElementById(valId).textContent = e.target.value + suffix;
    });
  }
  bind("amp",   "ampVal",   "%");
  bind("k1",    "k1Val");
  bind("k2",    "k2Val");
  bind("speed", "speedVal");

  // dot count rebuilds the DOM
  document.getElementById("dots").addEventListener("input", e => {
    document.getElementById("dotsVal").textContent = e.target.value;
    document.querySelectorAll("[data-orb-g]").forEach(rebuild);
  });

  window.addEventListener("load", () => {
    document.querySelectorAll("[data-orb-g]").forEach(rebuild);
    requestAnimationFrame(frame);
  });
</script>
</body>
</html>
