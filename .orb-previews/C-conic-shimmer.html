<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Orb C — Dot mesh + scanline sweep</title>
<style>
  :root {
    --bg: #06070d;
    --fg: #d8e4ff;
    --muted: #5a6a8a;
    --grid: #0f1626;
    --color-accent: #a855f7;        /* violet */
    --orb-accent: var(--color-accent);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font-family: "JetBrains Mono", ui-monospace, monospace; }
  body {
    display: grid; place-items: center;
    background-image:
      radial-gradient(var(--grid) 1px, transparent 1px),
      radial-gradient(var(--grid) 1px, transparent 1px);
    background-size: 24px 24px, 24px 24px;
    background-position: 0 0, 12px 12px;
  }
  .stage { display: grid; gap: 56px; justify-items: center; }
  .row { display: flex; gap: 64px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .label { color: var(--muted); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; margin-top: 14px; text-align: center; }
  .swatch { display: grid; justify-items: center; }
  h1 { font-weight: 500; font-size: 13px; letter-spacing: .28em; text-transform: uppercase; color: var(--orb-accent); margin: 0 0 10px; text-shadow: 0 0 12px var(--orb-accent); }
  .desc { color: var(--muted); font-size: 12px; max-width: 540px; text-align: center; line-height: 1.6; }
  .accents { display: flex; gap: 10px; margin-top: 18px; }
  .accents button { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #222a3d; cursor: pointer; padding: 0; background: var(--c); box-shadow: 0 0 8px var(--c); }

  /* ======================  Orb C — dot-mesh sphere with scanline sweep  ====================== */
  .orb-c {
    position: relative;
    width: var(--s, 96px); height: var(--s, 96px);
    border-radius: 50%;
    color: var(--orb-accent);
    display: inline-block;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--orb-accent) 22%, #06070d) 0%, #06070d 80%);
    box-shadow:
      0 0 calc(var(--s, 96px) * 0.35) color-mix(in srgb, var(--orb-accent) 60%, transparent),
      inset 0 0 calc(var(--s, 96px) * 0.25) rgba(0,0,0,.85),
      inset 0 0 0 1px color-mix(in srgb, var(--orb-accent) 50%, transparent);
  }
  /* dot mesh layer (the planet's "atmosphere of pixels") */
  .orb-c::before {
    content: "";
    position: absolute; inset: -10%;
    background:
      radial-gradient(circle, currentColor 1px, transparent 1.6px) 0 0 / calc(var(--s, 96px) * 0.085) calc(var(--s, 96px) * 0.085);
    -webkit-mask: radial-gradient(circle at 50% 50%, black 38%, rgba(0,0,0,.6) 60%, transparent 80%);
            mask: radial-gradient(circle at 50% 50%, black 38%, rgba(0,0,0,.6) 60%, transparent 80%);
    opacity: .9;
    animation: c-rot 8s linear infinite;
    mix-blend-mode: screen;
  }
  /* horizontal scanline sweep */
  .orb-c::after {
    content: "";
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg,
        transparent 0%,
        transparent 42%,
        currentColor 49%,
        #fff 50%,
        currentColor 51%,
        transparent 58%,
        transparent 100%);
    filter: blur(0.5px);
    opacity: .9;
    animation: c-scan 1.8s linear infinite;
    pointer-events: none;
  }
  /* a tiny center pixel that punches through */
  .orb-c .pixel {
    position: absolute; left: 50%; top: 50%;
    width: calc(var(--s, 96px) * 0.06); height: calc(var(--s, 96px) * 0.06);
    margin: calc(var(--s, 96px) * -0.03) 0 0 calc(var(--s, 96px) * -0.03);
    background: #fff;
    box-shadow:
      0 0 calc(var(--s, 96px) * 0.12) currentColor,
      0 0 calc(var(--s, 96px) * 0.3)  currentColor;
    animation: c-flicker 1.4s steps(2, end) infinite;
  }

  @keyframes c-rot  { to { transform: rotate(360deg); } }
  @keyframes c-scan {
    0%   { transform: translateY(-110%); }
    100% { transform: translateY(110%); }
  }
  @keyframes c-flicker {
    0%, 90%, 100% { opacity: 1; }
    93%           { opacity: .2; }
  }

  .xs { --s: 24px; }
  .sm { --s: 40px; }
  .md { --s: 64px; }
  .lg { --s: 96px; }
  .xl { --s: 144px; }
</style>
</head>
<body>
  <div class="stage">
    <div style="text-align:center">
      <h1>Orb C · Dot mesh + scanline sweep</h1>
      <p class="desc">A pixel-mesh sphere with a CRT scanline crossing top-to-bottom and a tiny flickering center pixel. Most "terminal / hologram".</p>
      <div class="accents">
        <button style="--c:#a855f7" onclick="document.documentElement.style.setProperty('--orb-accent','#a855f7')"></button>
        <button style="--c:#00f0ff" onclick="document.documentElement.style.setProperty('--orb-accent','#00f0ff')"></button>
        <button style="--c:#ff2bd6" onclick="document.documentElement.style.setProperty('--orb-accent','#ff2bd6')"></button>
        <button style="--c:#39ff7a" onclick="document.documentElement.style.setProperty('--orb-accent','#39ff7a')"></button>
        <button style="--c:#ffcc00" onclick="document.documentElement.style.setProperty('--orb-accent','#ffcc00')"></button>
      </div>
    </div>
    <div class="row">
      <div class="swatch"><span class="orb-c xs"><span class="pixel"></span></span><div class="label">xs · 24</div></div>
      <div class="swatch"><span class="orb-c sm"><span class="pixel"></span></span><div class="label">sm · 40</div></div>
      <div class="swatch"><span class="orb-c md"><span class="pixel"></span></span><div class="label">md · 64</div></div>
      <div class="swatch"><span class="orb-c lg"><span class="pixel"></span></span><div class="label">lg · 96</div></div>
      <div class="swatch"><span class="orb-c xl"><span class="pixel"></span></span><div class="label">xl · 144</div></div>
    </div>
  </div>
</body>
</html>
