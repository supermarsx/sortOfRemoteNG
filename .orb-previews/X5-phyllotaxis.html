<!doctype html>
<html><head><meta charset="utf-8"/><title>Orb X5 — Phyllotaxis bloom</title>
<style>
:root{--bg:#06070d;--fg:#d8e4ff;--muted:#5a6a8a;--grid:#0f1626;--orb-accent:#ffcc00;--orb-accent-2:#ff5555}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--fg);font-family:"JetBrains Mono",ui-monospace,monospace}
body{display:grid;place-items:center;overflow:hidden;background-image:radial-gradient(var(--grid) 1px,transparent 1px),radial-gradient(var(--grid) 1px,transparent 1px);background-size:24px 24px,24px 24px;background-position:0 0,12px 12px}
.stage{display:grid;gap:48px;justify-items:center}
h1{font-weight:500;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--orb-accent);margin:0 0 10px;text-shadow:0 0 12px var(--orb-accent)}
.desc{color:var(--muted);font-size:12px;max-width:600px;text-align:center;line-height:1.6}
.controls{display:flex;gap:22px;align-items:center;flex-wrap:wrap;justify-content:center;margin-top:18px;color:var(--muted);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.controls label{display:inline-flex;align-items:center;gap:8px}.controls input[type=range]{accent-color:var(--orb-accent)}.controls .val{color:var(--orb-accent);min-width:3.2em;text-align:right}
.row{display:flex;gap:80px;align-items:center;flex-wrap:wrap;justify-content:center}.swatch{display:grid;justify-items:center}
.label{color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:18px;text-align:center}
.scene{width:var(--s,380px);height:var(--s,380px);color:var(--orb-accent);border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--orb-accent) 8%,#06070d) 0%,#04050a 90%);box-shadow:0 0 calc(var(--s,380px)*0.12) color-mix(in srgb,var(--orb-accent) 40%,transparent),inset 0 0 0 1px color-mix(in srgb,var(--orb-accent) 50%,transparent);position:relative;overflow:hidden}
.face{width:100%;height:100%;position:absolute;inset:0;animation:r var(--spin,40s) linear infinite}
@keyframes r{to{transform:rotate(360deg)}}
.face span{--d:calc(var(--s,380px)/110);--scale:1;position:absolute;top:50%;left:50%;width:calc(var(--d)*var(--scale));height:calc(var(--d)*var(--scale));margin:calc(var(--d)*var(--scale)*-.5) 0 0 calc(var(--d)*var(--scale)*-.5);border-radius:50%;background:var(--c,currentColor);transform:var(--t);opacity:var(--br,.6);box-shadow:0 0 calc(3px*var(--glow,1)) var(--c,currentColor),0 0 calc(8px*var(--glow,1)) color-mix(in srgb,var(--c,currentColor) 60%,transparent)}
.lg{--s:380px}.md{--s:180px}.sm{--s:120px}.xs{--s:80px}
</style></head><body>
<div class="stage">
<div style="text-align:center"><h1>Orb X5 · Phyllotaxis bloom</h1>
<p class="desc">Sunflower-face — 2D phyllotaxis: rₙ = c·√n, θₙ = n·137.5°. Brightness rolls outward from the center as if the bloom is opening, then loops. Dot size grows with radius for the "petal" feel.</p>
<div class="controls">
<label>dots <input id="n" type="range" min="200" max="2000" step="50" value="900"/><span class="val" id="nVal">900</span></label>
<label>spacing <input id="sp" type="range" min="3" max="20" step="1" value="9"/><span class="val" id="spVal">9</span></label>
<label>trail <input id="tr" type="range" min="5" max="80" step="1" value="30"/><span class="val" id="trVal">30%</span></label>
<label>speed <input id="sd" type="range" min="1" max="30" step="1" value="10"/><span class="val" id="sdVal">10</span></label>
</div></div>
<div class="row"><div class="swatch"><div class="scene lg"><div class="face" data-orb></div></div><div class="label">primary · 380</div></div></div>
<div class="row"><div class="swatch"><div class="scene xs"><div class="face" data-orb></div></div><div class="label">xs · 80</div></div>
<div class="swatch"><div class="scene sm"><div class="face" data-orb></div></div><div class="label">sm · 120</div></div>
<div class="swatch"><div class="scene md"><div class="face" data-orb></div></div><div class="label">md · 180</div></div></div>
</div>
<script>
const PHI=(1+Math.sqrt(5))/2;const GA=Math.PI*2/(PHI*PHI);
const orbs=new Map();
function build(face){const radius=face.getBoundingClientRect().width/2*0.92;const n=+document.getElementById('n').value;const sp=+document.getElementById('sp').value/10;face.innerHTML='';const items=[];const c=sp*radius/Math.sqrt(n);for(let i=0;i<n;i++){const r=c*Math.sqrt(i+1);if(r>radius)continue;const theta=i*GA;const x=r*Math.cos(theta),y=r*Math.sin(theta);const dot=document.createElement('span');dot.style.transform=`translate3d(${x.toFixed(2)}px,${y.toFixed(2)}px,0)`;face.appendChild(dot);items.push({el:dot,f:r/radius,i})}orbs.set(face,items)}
let t0=performance.now();
function frame(now){const t=(now-t0)/1000,trailW=+document.getElementById('tr').value/100,speed=+document.getElementById('sd').value/10;
const cursor=(t*speed*0.07)%1;
orbs.forEach(items=>{for(const it of items){let d=Math.abs(it.f-cursor);if(d>0.5)d=1-d;const k=Math.max(0,1-d/trailW);const peak=Math.pow(k,2);it.el.style.opacity=(0.05+0.95*peak).toFixed(3);it.el.style.setProperty('--glow',(0.3+5*peak).toFixed(2));it.el.style.setProperty('--scale',((0.7+0.8*it.f)*(1+1.6*peak)).toFixed(2));it.el.style.setProperty('--c',(it.i%2?'var(--orb-accent)':'var(--orb-accent-2)'))}});requestAnimationFrame(frame)}
['tr','sd'].forEach(id=>document.getElementById(id).addEventListener('input',e=>{document.getElementById(id+'Val').textContent=e.target.value+(id==='tr'?'%':'')}));
['n','sp'].forEach(id=>document.getElementById(id).addEventListener('input',e=>{document.getElementById(id+'Val').textContent=e.target.value;document.querySelectorAll('[data-orb]').forEach(build)}));
window.addEventListener('load',()=>{document.querySelectorAll('[data-orb]').forEach(build);requestAnimationFrame(frame)});
</script></body></html>
