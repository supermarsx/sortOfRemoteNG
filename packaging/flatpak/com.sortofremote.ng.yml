id: com.sortofremote.ng
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: sortOfRemoteNG
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --socket=ssh-auth
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
modules:
  - name: sortofremoteng
    buildsystem: simple
    build-commands:
      - install -Dm755 sortOfRemoteNG /app/bin/sortOfRemoteNG
      - cp -a resources /app/bin/resources
      - install -Dm644 com.sortofremote.ng.desktop /app/share/applications/com.sortofremote.ng.desktop
      - install -Dm644 com.sortofremote.ng.metainfo.xml /app/share/metainfo/com.sortofremote.ng.metainfo.xml
      - install -Dm644 com.sortofremote.ng-32.png /app/share/icons/hicolor/32x32/apps/com.sortofremote.ng.png
      - install -Dm644 com.sortofremote.ng-128.png /app/share/icons/hicolor/128x128/apps/com.sortofremote.ng.png
      - install -Dm644 com.sortofremote.ng-256.png /app/share/icons/hicolor/256x256/apps/com.sortofremote.ng.png
    sources:
      - type: dir
        path: ../../.ci/flatpak-payload
      - type: file
        path: com.sortofremote.ng.desktop
      - type: file
        path: com.sortofremote.ng.metainfo.xml
      - type: file
        path: ../../src-tauri/icons/32x32.png
        dest-filename: com.sortofremote.ng-32.png
      - type: file
        path: ../../src-tauri/icons/128x128.png
        dest-filename: com.sortofremote.ng-128.png
      - type: file
        path: ../../src-tauri/icons/128x128@2x.png
        dest-filename: com.sortofremote.ng-256.png
