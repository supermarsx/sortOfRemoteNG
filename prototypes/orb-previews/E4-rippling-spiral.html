<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Orb E4 — Rippling spiral</title>
<style>
  :root {
    --bg: #06070d; --fg: #d8e4ff; --muted: #5a6a8a; --grid: #0f1626;
    --color-accent: #39ff7a; --orb-accent: var(--color-accent);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--fg); font-family: "JetBrains Mono", ui-monospace, monospace; }
  body { display: grid; place-items: center; overflow: hidden;
    background-image: radial-gradient(var(--grid) 1px, transparent 1px), radial-gradient(var(--grid) 1px, transparent 1px);
    background-size: 24px 24px, 24px 24px; background-position: 0 0, 12px 12px; }
  .stage { display: grid; gap: 48px; justify-items: center; }
  h1 { font-weight: 500; font-size: 13px; letter-spacing: .28em; text-transform: uppercase; color: var(--orb-accent); margin: 0 0 10px; text-shadow: 0 0 12px var(--orb-accent); }
  .desc { color: var(--muted); font-size: 12px; max-width: 600px; text-align: center; line-height: 1.6; }
  .controls { display: flex; gap: 22px; align-items: center; flex-wrap: wrap; justify-content: center; margin-top: 18px; color: var(--muted); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; }
  .controls label { display: inline-flex; align-items: center; gap: 8px; }
  .controls input[type=range] { accent-color: var(--orb-accent); }
  .controls .val { color: var(--orb-accent); min-width: 3.2em; text-align: right; }
  .accents { display: flex; gap: 10px; }
  .accents button { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #222a3d; cursor: pointer; padding: 0; background: var(--c); box-shadow: 0 0 8px var(--c); }
  .row { display: flex; gap: 80px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .swatch { display: grid; justify-items: center; }
  .label { color: var(--muted); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; margin-top: 18px; text-align: center; }

  .scene { width: var(--s, 320px); height: var(--s, 320px); perspective: 1200px; transform: rotateZ(28deg); color: var(--orb-accent); }
  .sphere { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: e4-spin var(--spin, 9s) linear infinite; }
  .sphere span {
    --d: calc(var(--s, 320px) / 110);
    --scale: 1;
    position: absolute; top: 50%; left: 50%;
    width: calc(var(--d) * var(--scale));
    height: calc(var(--d) * var(--scale));
    margin: calc(var(--d) * var(--scale) * -0.5) 0 0 calc(var(--d) * var(--scale) * -0.5);
    border-radius: 50%;
    background: currentColor;
    transform-style: preserve-3d;
    transform: var(--t);
    opacity: var(--br, .08);
    box-shadow: 0 0 calc(var(--d) * var(--glow, .8)) currentColor,
                0 0 calc(var(--d) * var(--glow, .8) * 2.6) color-mix(in srgb, currentColor 70%, transparent),
                0 0 calc(var(--d) * var(--glow, .8) * 5) color-mix(in srgb, currentColor 35%, transparent);
    will-change: transform, opacity, width, height;
  }
  @keyframes e4-spin { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }
  .lg { --s: 360px; } .md { --s: 180px; } .sm { --s: 120px; } .xs { --s: 80px; }
</style>
</head>
<body>
  <div class="stage">
    <div style="text-align:center">
      <h1>Orb E4 · Rippling spiral</h1>
      <p class="desc">The Milleus dot-spiral, but the radial distance pulses with a sine wave traveling along the spiral index. Watch the bands inflate and deflate like a beating heart wrapped in wire.</p>
      <div class="controls">
        <label>dots <input id="dots" type="range" min="100" max="700" step="20" value="320" /> <span class="val" id="dotsVal">320</span></label>
        <label>density <input id="mul" type="range" min="3" max="60" step="1" value="20" /> <span class="val" id="mulVal">20</span></label>
        <label>amp <input id="amp" type="range" min="0" max="60" step="1" value="35" /> <span class="val" id="ampVal">35%</span></label>
        <label>k <input id="k" type="range" min="1" max="10" step="1" value="3" /> <span class="val" id="kVal">3</span></label>
        <label>speed <input id="speed" type="range" min="1" max="40" step="1" value="16" /> <span class="val" id="speedVal">16</span></label>
        <label>spin <input id="spin" type="range" min="3" max="30" step="1" value="9" /> <span class="val" id="spinVal">9s</span></label>
        <span class="accents">
          <button style="--c:#39ff7a" onclick="setAccent('#39ff7a')"></button>
          <button style="--c:#00f0ff" onclick="setAccent('#00f0ff')"></button>
          <button style="--c:#ff2bd6" onclick="setAccent('#ff2bd6')"></button>
          <button style="--c:#a855f7" onclick="setAccent('#a855f7')"></button>
          <button style="--c:#ffcc00" onclick="setAccent('#ffcc00')"></button>
        </span>
      </div>
    </div>
    <div class="row"><div class="swatch"><div class="scene lg"><div class="sphere" data-orb></div></div><div class="label">primary · 360</div></div></div>
    <div class="row">
      <div class="swatch"><div class="scene xs"><div class="sphere" data-orb></div></div><div class="label">xs · 80</div></div>
      <div class="swatch"><div class="scene sm"><div class="sphere" data-orb></div></div><div class="label">sm · 120</div></div>
      <div class="swatch"><div class="scene md"><div class="sphere" data-orb></div></div><div class="label">md · 180</div></div>
    </div>
  </div>
<script>
  const TAU = Math.PI * 2;
  const orbs = new Map();
  function rebuild(sphere) {
    const radius = sphere.getBoundingClientRect().width / 2;
    const n = +document.getElementById("dots").value;
    const mul = +document.getElementById("mul").value;
    sphere.innerHTML = "";
    const items = [];
    for (let i = 0; i < n; i++) {
      const f = i / (n - 1);                 // 0..1
      const phi = f * Math.PI;               // 0..π
      const theta = f * TAU * mul;           // density wraps
      // base unit direction
      const ux = Math.sin(phi) * Math.cos(theta);
      const uy = Math.sin(phi) * Math.sin(theta);
      const uz = Math.cos(phi);
      const dot = document.createElement("span");
      sphere.appendChild(dot);
      items.push({ el: dot, f, ux, uy, uz });
    }
    orbs.set(sphere, { radius, items });
  }
  let t0 = performance.now();
  function frame(now) {
    const t = (now - t0) / 1000;
    const amp   = +document.getElementById("amp").value / 100;
    const k     = +document.getElementById("k").value;
    const speed = +document.getElementById("speed").value / 10;
    orbs.forEach(({ radius, items }) => {
      for (const it of items) {
        const wave = Math.sin(k * TAU * it.f - speed * t);     // -1..1
        const r = radius * (1 + amp * wave);
        const x = (it.ux * r).toFixed(2);
        const y = (it.uy * r).toFixed(2);
        const z = (it.uz * r).toFixed(2);
        it.el.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
        // brightness peaks sharply on crests
        const crest = Math.pow(0.5 + 0.5 * wave, 3);   // 0..1, sharpened
        it.el.style.opacity = (0.06 + 0.94 * crest).toFixed(3);
        it.el.style.setProperty("--glow", (0.4 + 5 * crest).toFixed(2));
        it.el.style.setProperty("--scale", (1 + 1.6 * crest).toFixed(2));
      }
    });
    requestAnimationFrame(frame);
  }
  function setAccent(c) { document.documentElement.style.setProperty("--orb-accent", c); }
  function bind(id, valId, suffix = "") { document.getElementById(id).addEventListener("input", e => { document.getElementById(valId).textContent = e.target.value + suffix; }); }
  bind("amp","ampVal","%"); bind("k","kVal"); bind("speed","speedVal");
  ["dots","mul"].forEach(id => document.getElementById(id).addEventListener("input", e => {
    document.getElementById(id+"Val").textContent = e.target.value;
    document.querySelectorAll("[data-orb]").forEach(rebuild);
  }));
  document.getElementById("spin").addEventListener("input", e => {
    document.getElementById("spinVal").textContent = e.target.value + "s";
    document.querySelectorAll(".sphere").forEach(s => s.style.setProperty("--spin", e.target.value + "s"));
  });
  window.addEventListener("load", () => {
    document.querySelectorAll("[data-orb]").forEach(rebuild);
    requestAnimationFrame(frame);
  });
</script>
</body>
</html>
