<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Orb E — Wavy density (chaotic dot sphere)</title>
<style>
  :root {
    --bg: #06070d;
    --fg: #d8e4ff;
    --muted: #5a6a8a;
    --grid: #0f1626;
    --color-accent: #00f0ff;
    --orb-accent: var(--color-accent);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100%; background: var(--bg); color: var(--fg);
    font-family: "JetBrains Mono", ui-monospace, monospace;
  }
  body {
    display: grid; place-items: center;
    background-image:
      radial-gradient(var(--grid) 1px, transparent 1px),
      radial-gradient(var(--grid) 1px, transparent 1px);
    background-size: 24px 24px, 24px 24px;
    background-position: 0 0, 12px 12px;
    overflow: hidden;
  }
  .stage { display: grid; gap: 48px; justify-items: center; perspective: 1200px; }
  h1 {
    font-weight: 500; font-size: 13px; letter-spacing: .28em; text-transform: uppercase;
    color: var(--orb-accent); margin: 0 0 10px;
    text-shadow: 0 0 12px var(--orb-accent);
  }
  .desc { color: var(--muted); font-size: 12px; max-width: 560px; text-align: center; line-height: 1.6; }
  .controls {
    display: flex; gap: 22px; align-items: center; flex-wrap: wrap;
    justify-content: center; margin-top: 18px;
    color: var(--muted); font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  }
  .controls label { display: inline-flex; align-items: center; gap: 8px; }
  .controls input[type=range] { accent-color: var(--orb-accent); }
  .controls .val { color: var(--orb-accent); min-width: 3.2em; text-align: right; }
  .accents { display: flex; gap: 10px; }
  .accents button {
    width: 22px; height: 22px; border-radius: 50%; border: 1px solid #222a3d;
    cursor: pointer; padding: 0; background: var(--c); box-shadow: 0 0 8px var(--c);
  }
  .row { display: flex; gap: 80px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .swatch { display: grid; justify-items: center; }
  .label { color: var(--muted); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; margin-top: 18px; text-align: center; }

  .scene {
    width: var(--s, 220px);
    height: var(--s, 220px);
    perspective: 1000px;
    transform: rotateZ(28deg);
    color: var(--orb-accent);
  }
  .sphere {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: e-spin var(--spin, 8s) linear infinite;
  }

  /* dot is fully driven by JS-provided custom properties:
     --t (translate3d), --dur (sweep duration), --life (lifetime fade in/out) */
  .sphere span {
    --d: calc(var(--s, 220px) / 70);
    position: absolute;
    top: calc(50% - var(--d) / 2);
    left: calc(50% - var(--d) / 2);
    width: calc(var(--d) * var(--scale, 1));
    height: calc(var(--d) * var(--scale, 1));
    margin: calc(var(--d) * (1 - var(--scale, 1)) / 2) 0 0 calc(var(--d) * (1 - var(--scale, 1)) / 2);
    border-radius: 50%;
    background: currentColor;
    box-shadow:
      0 0 calc(var(--d) * 2.2) currentColor,
      0 0 calc(var(--d) * 5.5) color-mix(in srgb, currentColor 80%, transparent),
      0 0 calc(var(--d) * 9)   color-mix(in srgb, currentColor 40%, transparent);
    transform-style: preserve-3d;
    transform: var(--t);
    animation:
      e-sweep var(--dur, 1.6s) linear infinite,
      e-life  var(--life, 3s)  ease-in-out 1 forwards;
  }

  @keyframes e-spin {
    0%   { transform: rotateY(0); }
    100% { transform: rotateY(360deg); }
  }
  /* sweep: sharp peak so unlit dots fade hard, lit dots flare */
  @keyframes e-sweep {
    0%   { filter: brightness(0.18); transform: scale(0.6); }
    6%   { filter: brightness(3.6);  transform: scale(2.4); }
    14%  { filter: brightness(1);    transform: scale(1);   }
    100% { filter: brightness(0.18); transform: scale(0.6); }
  }
  /* life: dot fades in, lives, fades out — JS removes it on animationend */
  @keyframes e-life {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .xs { --s: 80px; }
  .sm { --s: 120px; }
  .md { --s: 180px; }
  .lg { --s: 280px; }
</style>
</head>
<body>
  <div class="stage">
    <div style="text-align:center">
      <h1>Orb E · Wavy density</h1>
      <p class="desc">Particles spawn at random points on a sphere, each with a random lifetime, sweep phase, and size. The total count drifts on a slow sine wave so the orb breathes — sparse, then dense, then sparse again.</p>
      <div class="controls">
        <label>base dots <input id="base" type="range" min="40" max="500" step="10" value="220" /> <span class="val" id="baseVal">220</span></label>
        <label>swing ± <input id="swing" type="range" min="0" max="200" step="10" value="120" /> <span class="val" id="swingVal">120</span></label>
        <label>chaos <input id="chaos" type="range" min="0" max="100" step="1" value="80" /> <span class="val" id="chaosVal">80%</span></label>
        <label>spin <input id="spin" type="range" min="2" max="30" step="1" value="8" /> <span class="val" id="spinVal">8s</span></label>
        <span class="accents">
          <button style="--c:#00f0ff" onclick="setAccent('#00f0ff')"></button>
          <button style="--c:#ff2bd6" onclick="setAccent('#ff2bd6')"></button>
          <button style="--c:#a855f7" onclick="setAccent('#a855f7')"></button>
          <button style="--c:#39ff7a" onclick="setAccent('#39ff7a')"></button>
          <button style="--c:#ffcc00" onclick="setAccent('#ffcc00')"></button>
          <button style="--c:#ff5555" onclick="setAccent('#ff5555')"></button>
        </span>
      </div>
    </div>

    <div class="row">
      <div class="swatch">
        <div class="scene lg"><div class="sphere" data-orb></div></div>
        <div class="label">primary · 280</div>
      </div>
    </div>

    <div class="row">
      <div class="swatch"><div class="scene xs"><div class="sphere" data-orb></div></div><div class="label">xs · 80</div></div>
      <div class="swatch"><div class="scene sm"><div class="sphere" data-orb></div></div><div class="label">sm · 120</div></div>
      <div class="swatch"><div class="scene md"><div class="sphere" data-orb></div></div><div class="label">md · 180</div></div>
    </div>
  </div>

<script>
  // ---- helpers ----------------------------------------------------------
  const rand = (a, b) => a + Math.random() * (b - a);

  /** Uniform random point on a unit sphere (no pole bunching) */
  function randomSpherePoint() {
    const u = Math.random();
    const v = Math.random();
    const phi   = Math.acos(2 * u - 1);   // 0..π, weighted by sin
    const theta = 2 * Math.PI * v;
    return { phi, theta };
  }

  /** Spiral point — deterministic, like the original Milleus pen */
  function spiralPoint(i, n, multiplier) {
    return {
      phi:   (i / n) * Math.PI,
      theta: (i / n) * Math.PI * 2 * multiplier,
    };
  }

  // chaos = 0..1; mixes spiral position toward random
  function pointFor(i, n, multiplier, chaos) {
    const s = spiralPoint(i, n, multiplier);
    if (chaos <= 0) return s;
    const r = randomSpherePoint();
    return {
      phi:   s.phi   * (1 - chaos) + r.phi   * chaos,
      theta: s.theta * (1 - chaos) + r.theta * chaos,
    };
  }

  // ---- per-orb state ----------------------------------------------------
  /** @type {Map<HTMLElement, {radius:number, alive:Set<HTMLElement>, idx:number}>} */
  const orbs = new Map();

  function ensureOrb(sphere) {
    let st = orbs.get(sphere);
    if (!st) {
      st = { radius: sphere.getBoundingClientRect().width / 2, alive: new Set(), idx: 0 };
      orbs.set(sphere, st);
    } else {
      st.radius = sphere.getBoundingClientRect().width / 2;
    }
    return st;
  }

  function spawnDot(sphere) {
    const st = ensureOrb(sphere);
    const { radius } = st;
    const chaos = +document.getElementById("chaos").value / 100;
    const multiplier = 23;
    st.idx = (st.idx + 1) % 1000;
    const { phi, theta } = pointFor(st.idx, 250, multiplier, chaos);

    const x = radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.sin(phi) * Math.sin(theta);
    const z = radius * Math.cos(phi);

    const dot = document.createElement("span");
    const t = `translate3d(${x.toFixed(2)}px, ${y.toFixed(2)}px, ${z.toFixed(2)}px)`;
    dot.style.setProperty("--t", t);
    dot.style.setProperty("--scale", rand(0.6, 1.6).toFixed(2));
    dot.style.setProperty("--dur",   rand(1.0, 2.4).toFixed(2) + "s");
    const life = rand(1.6, 4.2);
    dot.style.setProperty("--life",  life.toFixed(2) + "s");
    dot.style.animationDelay = `${(-Math.random() * 2.4).toFixed(2)}s, 0s`;

    sphere.appendChild(dot);
    st.alive.add(dot);

    // remove on life-end
    dot.addEventListener("animationend", (e) => {
      if (e.animationName === "e-life") {
        st.alive.delete(dot);
        dot.remove();
      }
    });
  }

  function killDot(sphere) {
    const st = ensureOrb(sphere);
    if (st.alive.size === 0) return;
    // pick a random victim
    const pick = Math.floor(Math.random() * st.alive.size);
    let i = 0;
    for (const d of st.alive) {
      if (i === pick) {
        // accelerate its fade-out by shortening remaining life via inline transition
        d.style.transition = "opacity .35s ease-out";
        d.style.opacity = "0";
        setTimeout(() => { st.alive.delete(d); d.remove(); }, 380);
        return;
      }
      i++;
    }
  }

  // ---- the breathing target loop ---------------------------------------
  let t0 = performance.now();
  function tick(now) {
    const elapsed = (now - t0) / 1000;
    const base  = +document.getElementById("base").value;
    const swing = +document.getElementById("swing").value;
    // slow ~12s breathing cycle
    const target = Math.max(0, base + Math.sin(elapsed * (Math.PI * 2 / 12)) * swing);

    document.querySelectorAll("[data-orb]").forEach(sphere => {
      const st = ensureOrb(sphere);
      const diff = target - st.alive.size;
      // spawn / cull a few per frame (rate scales with diff)
      const rate = Math.min(8, Math.max(1, Math.ceil(Math.abs(diff) / 12)));
      if (diff > 0) for (let k = 0; k < rate; k++) spawnDot(sphere);
      else if (diff < 0) for (let k = 0; k < rate; k++) killDot(sphere);
      // some natural churn even at steady state
      if (Math.random() < 0.18) { killDot(sphere); spawnDot(sphere); }
    });

    requestAnimationFrame(tick);
  }

  function setSpin(seconds) {
    document.querySelectorAll(".sphere").forEach(s => s.style.setProperty("--spin", seconds + "s"));
  }

  function setAccent(c) {
    document.documentElement.style.setProperty("--orb-accent", c);
  }

  // ---- wire controls ---------------------------------------------------
  function bindNumeric(id, valId, suffix = "") {
    const el = document.getElementById(id);
    el.addEventListener("input", e => {
      document.getElementById(valId).textContent = e.target.value + suffix;
    });
  }
  bindNumeric("base",  "baseVal");
  bindNumeric("swing", "swingVal");
  bindNumeric("chaos", "chaosVal", "%");
  document.getElementById("spin").addEventListener("input", e => {
    document.getElementById("spinVal").textContent = e.target.value + "s";
    setSpin(+e.target.value);
  });

  window.addEventListener("load", () => {
    setSpin(+document.getElementById("spin").value);
    requestAnimationFrame(tick);
  });
</script>
</body>
</html>
