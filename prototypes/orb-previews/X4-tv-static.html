<!doctype html>
<html><head><meta charset="utf-8"/><title>Orb X4 — TV static</title>
<style>
:root{--bg:#06070d;--fg:#d8e4ff;--muted:#5a6a8a;--grid:#0f1626;--orb-accent:#39ff7a}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--fg);font-family:"JetBrains Mono",ui-monospace,monospace}
body{display:grid;place-items:center;overflow:hidden;background-image:radial-gradient(var(--grid) 1px,transparent 1px),radial-gradient(var(--grid) 1px,transparent 1px);background-size:24px 24px,24px 24px;background-position:0 0,12px 12px}
.stage{display:grid;gap:48px;justify-items:center}
h1{font-weight:500;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--orb-accent);margin:0 0 10px;text-shadow:0 0 12px var(--orb-accent)}
.desc{color:var(--muted);font-size:12px;max-width:600px;text-align:center;line-height:1.6}
.controls{display:flex;gap:22px;align-items:center;flex-wrap:wrap;justify-content:center;margin-top:18px;color:var(--muted);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.controls label{display:inline-flex;align-items:center;gap:8px}.controls input[type=range]{accent-color:var(--orb-accent)}.controls .val{color:var(--orb-accent);min-width:3.2em;text-align:right}
.row{display:flex;gap:80px;align-items:center;flex-wrap:wrap;justify-content:center}.swatch{display:grid;justify-items:center}
.label{color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:18px;text-align:center}
.scene{width:var(--s,380px);height:var(--s,380px);perspective:1200px;color:var(--orb-accent)}
.sphere{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:s var(--spin,18s) linear infinite}
.sphere span{--d:calc(var(--s,380px)/130);--scale:1;position:absolute;top:50%;left:50%;width:calc(var(--d)*var(--scale));height:calc(var(--d)*var(--scale));margin:calc(var(--d)*var(--scale)*-.5) 0 0 calc(var(--d)*var(--scale)*-.5);border-radius:50%;background:currentColor;transform-style:preserve-3d;transform:var(--t);opacity:var(--br,.4);box-shadow:0 0 calc(2px*var(--glow,.6)) currentColor,0 0 calc(5px*var(--glow,.6)) color-mix(in srgb,currentColor 50%,transparent)}
@keyframes s{to{transform:rotateY(360deg)}}
.lg{--s:380px}.md{--s:180px}.sm{--s:120px}.xs{--s:80px}
</style></head><body>
<div class="stage">
<div style="text-align:center"><h1>Orb X4 · TV static</h1>
<p class="desc">Fibonacci sphere where each dot is independently flickering on a fast random per-frame schedule, with a slow band of "signal" sweeping through that boosts brightness — like analog TV interference inside a globe.</p>
<div class="controls">
<label>dots <input id="n" type="range" min="200" max="2000" step="100" value="1000"/><span class="val" id="nVal">1000</span></label>
<label>noise <input id="ns" type="range" min="0" max="100" step="5" value="60"/><span class="val" id="nsVal">60%</span></label>
<label>band <input id="bw" type="range" min="2" max="50" step="1" value="18"/><span class="val" id="bwVal">18%</span></label>
</div></div>
<div class="row"><div class="swatch"><div class="scene lg"><div class="sphere" data-orb></div></div><div class="label">primary · 380</div></div></div>
<div class="row"><div class="swatch"><div class="scene xs"><div class="sphere" data-orb></div></div><div class="label">xs · 80</div></div>
<div class="swatch"><div class="scene sm"><div class="sphere" data-orb></div></div><div class="label">sm · 120</div></div>
<div class="swatch"><div class="scene md"><div class="sphere" data-orb></div></div><div class="label">md · 180</div></div></div>
</div>
<script>
const TAU=Math.PI*2;
function fib(n){const p=[],phi=(1+Math.sqrt(5))/2;for(let i=0;i<n;i++){const y=1-(i/(n-1))*2,r=Math.sqrt(1-y*y),t=TAU*i/phi;p.push({x:Math.cos(t)*r,y,z:Math.sin(t)*r})}return p}
const orbs=new Map();
function build(s){const r=s.getBoundingClientRect().width/2,n=+document.getElementById('n').value,pts=fib(n);s.innerHTML='';const items=[];for(let i=0;i<n;i++){const dot=document.createElement('span');const x=pts[i].x*r,y=pts[i].y*r,z=pts[i].z*r;dot.style.transform=`translate3d(${x.toFixed(2)}px,${y.toFixed(2)}px,${z.toFixed(2)}px)`;s.appendChild(dot);items.push({el:dot,lat:(pts[i].y+1)/2,seed:Math.random()*1000})}orbs.set(s,items)}
let t0=performance.now();
function frame(now){const t=(now-t0)/1000,ns=+document.getElementById('ns').value/100,bw=+document.getElementById('bw').value/100;
const cursor=(t*0.1)%1;
orbs.forEach(items=>{for(const it of items){let d=Math.abs(it.lat-cursor);if(d>0.5)d=1-d;const k=Math.max(0,1-d/bw);const band=k*k;const flicker=ns*Math.random();const base=0.05+0.4*flicker;const peak=Math.max(base,band);it.el.style.opacity=(0.04+0.96*peak).toFixed(3);it.el.style.setProperty('--glow',(0.3+4*peak).toFixed(2));it.el.style.setProperty('--scale',(0.7+1.8*peak).toFixed(2))}});requestAnimationFrame(frame)}
['ns','bw'].forEach(id=>document.getElementById(id).addEventListener('input',e=>{document.getElementById(id+'Val').textContent=e.target.value+'%'}));
document.getElementById('n').addEventListener('input',e=>{document.getElementById('nVal').textContent=e.target.value;document.querySelectorAll('[data-orb]').forEach(build)});
window.addEventListener('load',()=>{document.querySelectorAll('[data-orb]').forEach(build);requestAnimationFrame(frame)});
</script></body></html>
