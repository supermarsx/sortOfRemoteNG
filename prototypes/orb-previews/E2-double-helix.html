<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Orb E2 — Double helix</title>
<style>
  :root {
    --bg: #06070d; --fg: #d8e4ff; --muted: #5a6a8a; --grid: #0f1626;
    --color-accent: #00f0ff; --orb-accent: var(--color-accent);
    --orb-accent-2: #ff2bd6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--fg); font-family: "JetBrains Mono", ui-monospace, monospace; }
  body {
    display: grid; place-items: center; overflow: hidden;
    background-image: radial-gradient(var(--grid) 1px, transparent 1px), radial-gradient(var(--grid) 1px, transparent 1px);
    background-size: 24px 24px, 24px 24px; background-position: 0 0, 12px 12px;
  }
  .stage { display: grid; gap: 48px; justify-items: center; }
  h1 { font-weight: 500; font-size: 13px; letter-spacing: .28em; text-transform: uppercase; color: var(--orb-accent); margin: 0 0 10px; text-shadow: 0 0 12px var(--orb-accent); }
  .desc { color: var(--muted); font-size: 12px; max-width: 580px; text-align: center; line-height: 1.6; }
  .controls { display: flex; gap: 22px; align-items: center; flex-wrap: wrap; justify-content: center; margin-top: 18px; color: var(--muted); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; }
  .controls label { display: inline-flex; align-items: center; gap: 8px; }
  .controls input[type=range] { accent-color: var(--orb-accent); }
  .controls .val { color: var(--orb-accent); min-width: 3.2em; text-align: right; }
  .accents { display: flex; gap: 10px; }
  .accents button { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #222a3d; cursor: pointer; padding: 0; background: var(--c); box-shadow: 0 0 8px var(--c); }
  .row { display: flex; gap: 80px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .swatch { display: grid; justify-items: center; }
  .label { color: var(--muted); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; margin-top: 18px; text-align: center; }

  .scene { width: var(--s, 320px); height: var(--s, 320px); perspective: 1100px; transform: rotateZ(28deg); color: var(--orb-accent); }
  .sphere { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: e2-spin var(--spin, 10s) linear infinite; }
  .sphere span {
    --d: calc(var(--s, 320px) / 100);
    --scale: 1;
    position: absolute; top: 50%; left: 50%;
    width: calc(var(--d) * var(--scale));
    height: calc(var(--d) * var(--scale));
    margin: calc(var(--d) * var(--scale) * -0.5) 0 0 calc(var(--d) * var(--scale) * -0.5);
    border-radius: 50%;
    background: var(--c, currentColor);
    transform-style: preserve-3d;
    transform: var(--t);
    opacity: var(--br, .08);
    box-shadow: 0 0 calc(var(--d) * var(--glow, .8)) var(--c, currentColor),
                0 0 calc(var(--d) * var(--glow, .8) * 2.6) color-mix(in srgb, var(--c, currentColor) 70%, transparent),
                0 0 calc(var(--d) * var(--glow, .8) * 5)   color-mix(in srgb, var(--c, currentColor) 35%, transparent);
    will-change: opacity, width, height;
  }
  @keyframes e2-spin { 0% { transform: rotateY(0); } 100% { transform: rotateY(360deg); } }
  .lg { --s: 360px; } .md { --s: 180px; } .sm { --s: 120px; } .xs { --s: 80px; }
</style>
</head>
<body>
  <div class="stage">
    <div style="text-align:center">
      <h1>Orb E2 · Double helix</h1>
      <p class="desc">Two counter-rotating spirals interleaved on the sphere — one accent color, one alt. A brightness wavefront travels in opposite directions along each strand.</p>
      <div class="controls">
        <label>turns <input id="turns" type="range" min="3" max="40" step="1" value="14" /> <span class="val" id="turnsVal">14</span></label>
        <label>per strand <input id="dots" type="range" min="60" max="500" step="20" value="240" /> <span class="val" id="dotsVal">240</span></label>
        <label>trail <input id="trail" type="range" min="3" max="50" step="1" value="14" /> <span class="val" id="trailVal">14%</span></label>
        <label>speed <input id="speed" type="range" min="1" max="40" step="1" value="14" /> <span class="val" id="speedVal">14</span></label>
        <label>spin <input id="spin" type="range" min="3" max="40" step="1" value="10" /> <span class="val" id="spinVal">10s</span></label>
        <span class="accents">
          <button style="--c:#00f0ff" onclick="setPair('#00f0ff','#ff2bd6')"></button>
          <button style="--c:#ff2bd6" onclick="setPair('#ff2bd6','#00f0ff')"></button>
          <button style="--c:#a855f7" onclick="setPair('#a855f7','#39ff7a')"></button>
          <button style="--c:#39ff7a" onclick="setPair('#39ff7a','#a855f7')"></button>
          <button style="--c:#ffcc00" onclick="setPair('#ffcc00','#ff5555')"></button>
        </span>
      </div>
    </div>
    <div class="row">
      <div class="swatch"><div class="scene lg"><div class="sphere" data-orb></div></div><div class="label">primary · 360</div></div>
    </div>
    <div class="row">
      <div class="swatch"><div class="scene xs"><div class="sphere" data-orb></div></div><div class="label">xs · 80</div></div>
      <div class="swatch"><div class="scene sm"><div class="sphere" data-orb></div></div><div class="label">sm · 120</div></div>
      <div class="swatch"><div class="scene md"><div class="sphere" data-orb></div></div><div class="label">md · 180</div></div>
    </div>
  </div>
<script>
  const TAU = Math.PI * 2;
  const orbs = new Map();
  function rebuild(sphere) {
    const radius = sphere.getBoundingClientRect().width / 2;
    const n = +document.getElementById("dots").value;
    const turns = +document.getElementById("turns").value;
    sphere.innerHTML = "";
    const items = [];
    for (let strand = 0; strand < 2; strand++) {
      for (let i = 0; i < n; i++) {
        const f = i / (n - 1);                 // 0..1
        const phi = f * Math.PI;               // 0..π (pole to pole)
        const theta = f * TAU * turns + (strand ? Math.PI : 0);  // strand 2 offset by π
        const x = radius * Math.sin(phi) * Math.cos(theta);
        const y = radius * Math.sin(phi) * Math.sin(theta);
        const z = radius * Math.cos(phi);
        const dot = document.createElement("span");
        dot.style.transform = `translate3d(${x.toFixed(2)}px, ${y.toFixed(2)}px, ${z.toFixed(2)}px)`;
        dot.style.setProperty("--c", strand === 0 ? "var(--orb-accent)" : "var(--orb-accent-2)");
        sphere.appendChild(dot);
        items.push({ el: dot, f, strand });
      }
    }
    orbs.set(sphere, items);
  }
  let t0 = performance.now();
  function frame(now) {
    const t = (now - t0) / 1000;
    const trailW = +document.getElementById("trail").value / 100;
    const speed  = +document.getElementById("speed").value / 10;
    orbs.forEach(items => {
      for (const it of items) {
        // strand 0 sweep forward, strand 1 backward
        const cursor = ((it.strand === 0 ? 1 : -1) * t * speed * 0.1 + (it.strand === 0 ? 0 : 0.5)) % 1;
        const c = (cursor + 1) % 1;
        let d = Math.abs(it.f - c); if (d > 0.5) d = 1 - d;
        const k = Math.max(0, 1 - d / trailW);
        const peak = Math.pow(k, 2);
        it.el.style.opacity = (0.06 + 0.94 * peak).toFixed(3);
        it.el.style.setProperty("--glow", (0.4 + 5 * peak).toFixed(2));
        it.el.style.setProperty("--scale", (1 + 1.8 * peak).toFixed(2));
      }
    });
    requestAnimationFrame(frame);
  }
  function setPair(a, b) {
    document.documentElement.style.setProperty("--orb-accent", a);
    document.documentElement.style.setProperty("--orb-accent-2", b);
  }
  function bind(id, valId, suffix = "") { document.getElementById(id).addEventListener("input", e => { document.getElementById(valId).textContent = e.target.value + suffix; }); }
  bind("trail","trailVal","%"); bind("speed","speedVal");
  ["turns","dots"].forEach(id => document.getElementById(id).addEventListener("input", e => {
    document.getElementById(id+"Val").textContent = e.target.value;
    document.querySelectorAll("[data-orb]").forEach(rebuild);
  }));
  document.getElementById("spin").addEventListener("input", e => {
    document.getElementById("spinVal").textContent = e.target.value + "s";
    document.querySelectorAll(".sphere").forEach(s => s.style.setProperty("--spin", e.target.value + "s"));
  });
  window.addEventListener("load", () => {
    document.querySelectorAll("[data-orb]").forEach(rebuild);
    requestAnimationFrame(frame);
  });
</script>
</body>
</html>
