<!doctype html>
<html><head><meta charset="utf-8"/><title>Orb X3 — Vortex</title>
<style>
:root{--bg:#06070d;--fg:#d8e4ff;--muted:#5a6a8a;--grid:#0f1626;--orb-accent:#a855f7}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--fg);font-family:"JetBrains Mono",ui-monospace,monospace}
body{display:grid;place-items:center;overflow:hidden;background-image:radial-gradient(var(--grid) 1px,transparent 1px),radial-gradient(var(--grid) 1px,transparent 1px);background-size:24px 24px,24px 24px;background-position:0 0,12px 12px}
.stage{display:grid;gap:48px;justify-items:center}
h1{font-weight:500;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--orb-accent);margin:0 0 10px;text-shadow:0 0 12px var(--orb-accent)}
.desc{color:var(--muted);font-size:12px;max-width:600px;text-align:center;line-height:1.6}
.controls{display:flex;gap:22px;align-items:center;flex-wrap:wrap;justify-content:center;margin-top:18px;color:var(--muted);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.controls label{display:inline-flex;align-items:center;gap:8px}
.controls input[type=range]{accent-color:var(--orb-accent)}.controls .val{color:var(--orb-accent);min-width:3.2em;text-align:right}
.row{display:flex;gap:80px;align-items:center;flex-wrap:wrap;justify-content:center}.swatch{display:grid;justify-items:center}
.label{color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:18px;text-align:center}
.scene{width:var(--s,380px);height:var(--s,380px);perspective:1200px;transform:rotateX(60deg);color:var(--orb-accent)}
.sphere{width:100%;height:100%;position:relative;transform-style:preserve-3d}
.sphere span{--d:calc(var(--s,380px)/120);--scale:1;position:absolute;top:50%;left:50%;width:calc(var(--d)*var(--scale));height:calc(var(--d)*var(--scale));margin:calc(var(--d)*var(--scale)*-.5) 0 0 calc(var(--d)*var(--scale)*-.5);border-radius:50%;background:currentColor;transform-style:preserve-3d;transform:var(--t);opacity:var(--br,.6);box-shadow:0 0 calc(3px*var(--glow,1)) currentColor,0 0 calc(8px*var(--glow,1)) color-mix(in srgb,currentColor 60%,transparent)}
.lg{--s:380px}.md{--s:180px}.sm{--s:120px}.xs{--s:80px}
</style></head><body>
<div class="stage">
<div style="text-align:center"><h1>Orb X3 · Vortex</h1>
<p class="desc">Disc-shaped vortex viewed at a tilt. Particles spawn at the rim, spiral inward while spinning faster (angular momentum), brighten as they approach the singularity, and respawn outward.</p>
<div class="controls">
<label>particles <input id="n" type="range" min="100" max="1200" step="50" value="500"/><span class="val" id="nVal">500</span></label>
<label>swirl <input id="sw" type="range" min="1" max="30" step="1" value="14"/><span class="val" id="swVal">14</span></label>
<label>fall <input id="fa" type="range" min="1" max="30" step="1" value="10"/><span class="val" id="faVal">10</span></label>
</div></div>
<div class="row"><div class="swatch"><div class="scene lg"><div class="sphere" data-orb></div></div><div class="label">primary · 380</div></div></div>
<div class="row"><div class="swatch"><div class="scene xs"><div class="sphere" data-orb></div></div><div class="label">xs · 80</div></div>
<div class="swatch"><div class="scene sm"><div class="sphere" data-orb></div></div><div class="label">sm · 120</div></div>
<div class="swatch"><div class="scene md"><div class="sphere" data-orb></div></div><div class="label">md · 180</div></div></div>
</div>
<script>
const TAU=Math.PI*2;const orbs=new Map();
function build(sphere){const radius=sphere.getBoundingClientRect().width/2;const n=+document.getElementById('n').value;sphere.innerHTML='';const items=[];for(let i=0;i<n;i++){const dot=document.createElement('span');sphere.appendChild(dot);items.push({el:dot,phase:Math.random(),theta0:Math.random()*TAU})}orbs.set(sphere,{radius,items})}
let t0=performance.now();
function frame(now){const t=(now-t0)/1000,sw=+document.getElementById('sw').value/10,fa=+document.getElementById('fa').value/10;
orbs.forEach(({radius,items})=>{for(const it of items){const u=(it.phase+t*fa*0.05)%1;const r=radius*(1-Math.pow(u,1.4));const theta=it.theta0+u*sw*TAU;const x=r*Math.cos(theta),z=r*Math.sin(theta);const yJitter=Math.sin(theta*3+t)*radius*0.04*(1-u);it.el.style.transform=`translate3d(${x.toFixed(2)}px,${yJitter.toFixed(2)}px,${z.toFixed(2)}px)`;const peak=Math.pow(1-u,3);it.el.style.opacity=(0.04+0.96*peak).toFixed(3);it.el.style.setProperty('--glow',(0.3+5*peak).toFixed(2));it.el.style.setProperty('--scale',(0.6+2.2*peak).toFixed(2))}});requestAnimationFrame(frame)}
['sw','fa'].forEach(id=>document.getElementById(id).addEventListener('input',e=>{document.getElementById(id+'Val').textContent=e.target.value}));
document.getElementById('n').addEventListener('input',e=>{document.getElementById('nVal').textContent=e.target.value;document.querySelectorAll('[data-orb]').forEach(build)});
window.addEventListener('load',()=>{document.querySelectorAll('[data-orb]').forEach(build);requestAnimationFrame(frame)});
</script></body></html>
