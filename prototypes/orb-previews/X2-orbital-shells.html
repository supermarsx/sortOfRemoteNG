<!doctype html>
<html><head><meta charset="utf-8"/><title>Orb X2 — Orbital shells</title>
<style>
:root{--bg:#06070d;--fg:#d8e4ff;--muted:#5a6a8a;--grid:#0f1626;--orb-accent:#ff2bd6;--orb-accent-2:#00f0ff;--orb-accent-3:#ffcc00}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--fg);font-family:"JetBrains Mono",ui-monospace,monospace}
body{display:grid;place-items:center;overflow:hidden;background-image:radial-gradient(var(--grid) 1px,transparent 1px),radial-gradient(var(--grid) 1px,transparent 1px);background-size:24px 24px,24px 24px;background-position:0 0,12px 12px}
.stage{display:grid;gap:48px;justify-items:center}
h1{font-weight:500;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--orb-accent);margin:0 0 10px;text-shadow:0 0 12px var(--orb-accent)}
.desc{color:var(--muted);font-size:12px;max-width:600px;text-align:center;line-height:1.6}
.controls{display:flex;gap:22px;align-items:center;flex-wrap:wrap;justify-content:center;margin-top:18px;color:var(--muted);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.controls label{display:inline-flex;align-items:center;gap:8px}
.controls input[type=range]{accent-color:var(--orb-accent)}.controls .val{color:var(--orb-accent);min-width:3.2em;text-align:right}
.row{display:flex;gap:80px;align-items:center;flex-wrap:wrap;justify-content:center}.swatch{display:grid;justify-items:center}
.label{color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin-top:18px;text-align:center}
.scene{width:var(--s,380px);height:var(--s,380px);perspective:1300px;color:var(--orb-accent)}
.sphere{width:100%;height:100%;position:relative;transform-style:preserve-3d}
.sphere .nucleus{position:absolute;inset:46%;border-radius:50%;background:radial-gradient(circle,#fff 0%,var(--orb-accent) 50%,transparent 100%);box-shadow:0 0 calc(var(--s,380px)*0.12) var(--orb-accent),0 0 calc(var(--s,380px)*0.25) var(--orb-accent);animation:pulse 2.4s ease-in-out infinite}
.sphere .ring{position:absolute;inset:0;transform-style:preserve-3d;animation:r linear infinite}
.sphere .ring.r1{animation-duration:8s;transform:rotateX(0)}
.sphere .ring.r2{animation-duration:11s;transform:rotateX(75deg) rotateY(40deg);animation-direction:reverse}
.sphere .ring.r3{animation-duration:14s;transform:rotateX(45deg) rotateY(-60deg)}
.sphere span{--d:calc(var(--s,380px)/130);--scale:1;position:absolute;top:50%;left:50%;width:calc(var(--d)*var(--scale));height:calc(var(--d)*var(--scale));margin:calc(var(--d)*var(--scale)*-.5) 0 0 calc(var(--d)*var(--scale)*-.5);border-radius:50%;background:var(--c,currentColor);transform-style:preserve-3d;transform:var(--t);opacity:var(--br,.6);box-shadow:0 0 calc(3px*var(--glow,1)) var(--c,currentColor),0 0 calc(8px*var(--glow,1)) color-mix(in srgb,var(--c,currentColor) 60%,transparent)}
@keyframes r{to{transform:rotateX(var(--rx,0)) rotateY(360deg)}}
.sphere .ring.r2{--rx:75deg}.sphere .ring.r3{--rx:45deg}
@keyframes pulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.18);filter:brightness(1.6)}}
.lg{--s:380px}.md{--s:180px}.sm{--s:120px}.xs{--s:80px}
</style></head><body>
<div class="stage">
<div style="text-align:center"><h1>Orb X2 · Orbital shells</h1>
<p class="desc">Atomic-style: a glowing nucleus surrounded by three orbital rings on different axes, each populated by dots traveling around at different rates with brightness pulses traveling along each shell.</p>
<div class="controls">
<label>per shell <input id="n" type="range" min="20" max="200" step="10" value="80"/><span class="val" id="nVal">80</span></label>
<label>trail <input id="trail" type="range" min="3" max="40" step="1" value="14"/><span class="val" id="trailVal">14%</span></label>
<label>speed <input id="speed" type="range" min="1" max="30" step="1" value="12"/><span class="val" id="speedVal">12</span></label>
</div></div>
<div class="row"><div class="swatch">
<div class="scene lg"><div class="sphere" data-orb><div class="nucleus"></div><div class="ring r1" data-ring data-c="var(--orb-accent)"></div><div class="ring r2" data-ring data-c="var(--orb-accent-2)"></div><div class="ring r3" data-ring data-c="var(--orb-accent-3)"></div></div></div>
<div class="label">primary · 380</div></div></div>
<div class="row">
<div class="swatch"><div class="scene xs"><div class="sphere" data-orb><div class="nucleus"></div><div class="ring r1" data-ring data-c="var(--orb-accent)"></div><div class="ring r2" data-ring data-c="var(--orb-accent-2)"></div><div class="ring r3" data-ring data-c="var(--orb-accent-3)"></div></div></div><div class="label">xs · 80</div></div>
<div class="swatch"><div class="scene sm"><div class="sphere" data-orb><div class="nucleus"></div><div class="ring r1" data-ring data-c="var(--orb-accent)"></div><div class="ring r2" data-ring data-c="var(--orb-accent-2)"></div><div class="ring r3" data-ring data-c="var(--orb-accent-3)"></div></div></div><div class="label">sm · 120</div></div>
<div class="swatch"><div class="scene md"><div class="sphere" data-orb><div class="nucleus"></div><div class="ring r1" data-ring data-c="var(--orb-accent)"></div><div class="ring r2" data-ring data-c="var(--orb-accent-2)"></div><div class="ring r3" data-ring data-c="var(--orb-accent-3)"></div></div></div><div class="label">md · 180</div></div>
</div></div>
<script>
const TAU=Math.PI*2;const orbs=new Map();
function buildRing(ring,radius){const n=+document.getElementById('n').value;ring.innerHTML='';const items=[];const c=ring.dataset.c;for(let i=0;i<n;i++){const f=i/n,theta=f*TAU;const x=radius*Math.cos(theta),z=radius*Math.sin(theta);const dot=document.createElement('span');dot.style.transform=`translate3d(${x.toFixed(2)}px,0,${z.toFixed(2)}px)`;dot.style.setProperty('--c',c);ring.appendChild(dot);items.push({el:dot,f})}return items}
function build(sphere){const radius=sphere.getBoundingClientRect().width/2*0.9;const rings=sphere.querySelectorAll('[data-ring]');const all=[];rings.forEach((r,i)=>{const rad=radius*(0.55+i*0.22);all.push(buildRing(r,rad))});orbs.set(sphere,all)}
let t0=performance.now();
function frame(now){const t=(now-t0)/1000,trailW=+document.getElementById('trail').value/100,speed=+document.getElementById('speed').value/10;
orbs.forEach(rings=>{rings.forEach((items,ringIdx)=>{const dir=ringIdx%2?-1:1;const cursor=((dir*t*speed*0.15+ringIdx*0.31)%1+1)%1;for(const it of items){let d=Math.abs(it.f-cursor);if(d>0.5)d=1-d;const k=Math.max(0,1-d/trailW);const peak=Math.pow(k,2);it.el.style.opacity=(0.08+0.92*peak).toFixed(3);it.el.style.setProperty('--glow',(0.3+5*peak).toFixed(2));it.el.style.setProperty('--scale',(1+1.8*peak).toFixed(2))}})});requestAnimationFrame(frame)}
document.getElementById('n').addEventListener('input',e=>{document.getElementById('nVal').textContent=e.target.value;document.querySelectorAll('[data-orb]').forEach(build)});
['trail','speed'].forEach(id=>document.getElementById(id).addEventListener('input',e=>{document.getElementById(id+'Val').textContent=e.target.value+(id==='trail'?'%':'')}));
window.addEventListener('load',()=>{document.querySelectorAll('[data-orb]').forEach(build);requestAnimationFrame(frame)});
</script></body></html>
