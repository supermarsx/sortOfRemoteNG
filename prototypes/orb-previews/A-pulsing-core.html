<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Orb A — Dot pulse core</title>
<style>
  :root {
    --bg: #06070d;
    --fg: #d8e4ff;
    --muted: #5a6a8a;
    --grid: #0f1626;
    --color-accent: #00f0ff;        /* cyan */
    --orb-accent: var(--color-accent);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font-family: "JetBrains Mono", ui-monospace, monospace; }
  body {
    display: grid; place-items: center;
    background-image:
      radial-gradient(var(--grid) 1px, transparent 1px),
      radial-gradient(var(--grid) 1px, transparent 1px);
    background-size: 24px 24px, 24px 24px;
    background-position: 0 0, 12px 12px;
  }
  .stage { display: grid; gap: 56px; justify-items: center; }
  .row { display: flex; gap: 64px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .label { color: var(--muted); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; margin-top: 14px; text-align: center; }
  .swatch { display: grid; justify-items: center; }
  h1 { font-weight: 500; font-size: 13px; letter-spacing: .28em; text-transform: uppercase; color: var(--orb-accent); margin: 0 0 10px; text-shadow: 0 0 12px var(--orb-accent); }
  .desc { color: var(--muted); font-size: 12px; max-width: 540px; text-align: center; line-height: 1.6; }
  .accents { display: flex; gap: 10px; margin-top: 18px; }
  .accents button {
    width: 22px; height: 22px; border-radius: 50%; border: 1px solid #222a3d;
    cursor: pointer; padding: 0; background: var(--c);
    box-shadow: 0 0 8px var(--c);
  }

  /* ======================  Orb A — dot pulse core  ====================== */
  .orb-a {
    position: relative;
    width: var(--s, 96px);
    height: var(--s, 96px);
    color: var(--orb-accent);
    display: inline-block;
  }
  /* halftone background ring (dot grid clipped to a circle) */
  .orb-a::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle, currentColor 1px, transparent 1.4px) 0 0 / calc(var(--s, 96px) * 0.11) calc(var(--s, 96px) * 0.11);
    -webkit-mask: radial-gradient(circle at 50% 50%, black 35%, transparent 72%);
            mask: radial-gradient(circle at 50% 50%, black 35%, transparent 72%);
    opacity: .55;
    animation: a-rot 14s linear infinite;
  }
  /* outer ring of dashes (scanline ring) */
  .orb-a::after {
    content: "";
    position: absolute; inset: 4%;
    border-radius: 50%;
    border: 1px dashed currentColor;
    opacity: .35;
    animation: a-rot-rev 9s linear infinite;
  }
  /* the bright dot core */
  .orb-a .core {
    position: absolute; left: 50%; top: 50%;
    width: calc(var(--s, 96px) * 0.18); height: calc(var(--s, 96px) * 0.18);
    margin: calc(var(--s, 96px) * -0.09) 0 0 calc(var(--s, 96px) * -0.09);
    border-radius: 50%;
    background: currentColor;
    box-shadow:
      0 0 calc(var(--s, 96px) * 0.18) currentColor,
      0 0 calc(var(--s, 96px) * 0.45) currentColor;
    animation: a-pulse 1.6s ease-in-out infinite;
  }
  /* concentric dot rings — radial pulse */
  .orb-a .ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px solid currentColor;
    opacity: 0;
    animation: a-shock 2.4s linear infinite;
  }
  .orb-a .ring.r2 { animation-delay: .8s; }
  .orb-a .ring.r3 { animation-delay: 1.6s; }

  @keyframes a-pulse {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50%      { transform: scale(1.25); filter: brightness(1.3); }
  }
  @keyframes a-shock {
    0%   { transform: scale(0.35); opacity: .9; border-style: dotted; }
    80%  { opacity: 0; }
    100% { transform: scale(1); opacity: 0; }
  }
  @keyframes a-rot     { to { transform: rotate(360deg); } }
  @keyframes a-rot-rev { to { transform: rotate(-360deg); } }

  .xs { --s: 24px; }
  .sm { --s: 40px; }
  .md { --s: 64px; }
  .lg { --s: 96px; }
  .xl { --s: 144px; }
</style>
</head>
<body>
  <div class="stage">
    <div style="text-align:center">
      <h1>Orb A · Dot pulse core</h1>
      <p class="desc">Halftone dot disc rotates behind a hot bright core; concentric dotted shockwaves ripple outward. Reads as "broadcast / scanning".</p>
      <div class="accents">
        <button style="--c:#00f0ff" onclick="document.documentElement.style.setProperty('--orb-accent','#00f0ff')"></button>
        <button style="--c:#ff2bd6" onclick="document.documentElement.style.setProperty('--orb-accent','#ff2bd6')"></button>
        <button style="--c:#a855f7" onclick="document.documentElement.style.setProperty('--orb-accent','#a855f7')"></button>
        <button style="--c:#39ff7a" onclick="document.documentElement.style.setProperty('--orb-accent','#39ff7a')"></button>
        <button style="--c:#ffcc00" onclick="document.documentElement.style.setProperty('--orb-accent','#ffcc00')"></button>
      </div>
    </div>
    <div class="row">
      <div class="swatch"><span class="orb-a xs"><span class="ring"></span><span class="ring r2"></span><span class="ring r3"></span><span class="core"></span></span><div class="label">xs · 24</div></div>
      <div class="swatch"><span class="orb-a sm"><span class="ring"></span><span class="ring r2"></span><span class="ring r3"></span><span class="core"></span></span><div class="label">sm · 40</div></div>
      <div class="swatch"><span class="orb-a md"><span class="ring"></span><span class="ring r2"></span><span class="ring r3"></span><span class="core"></span></span><div class="label">md · 64</div></div>
      <div class="swatch"><span class="orb-a lg"><span class="ring"></span><span class="ring r2"></span><span class="ring r3"></span><span class="core"></span></span><div class="label">lg · 96</div></div>
      <div class="swatch"><span class="orb-a xl"><span class="ring"></span><span class="ring r2"></span><span class="ring r3"></span><span class="core"></span></span><div class="label">xl · 144</div></div>
    </div>
  </div>
</body>
</html>
