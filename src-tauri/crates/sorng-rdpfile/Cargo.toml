[package]
name = "sorng-rdpfile"
version = "0.1.0"
edition = "2021"
description = "RDP file parser and generator for SortOfRemote NG — import/export Microsoft .rdp files with full setting coverage, batch generation, and round-trip fidelity"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
