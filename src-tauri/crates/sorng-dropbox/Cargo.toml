[package]
name = "sorng-dropbox"
version = "0.1.0"
edition = "2021"
description = "Dropbox API v2 integration — files, folders, sharing, team, paper, sync, backup and account management for SortOfRemote NG"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["multipart", "stream"] }
base64 = { workspace = true }
url = { workspace = true }
regex = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
futures = { workspace = true }
