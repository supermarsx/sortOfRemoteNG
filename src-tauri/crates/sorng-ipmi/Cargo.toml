[package]
name = "sorng-ipmi"
version = "0.1.0"
edition = "2021"
description = "Comprehensive IPMI 1.5/2.0 integration — authenticated sessions, raw commands, SOL, SDR, SEL, chassis control, FRU, sensor monitoring, watchdog timer, LAN configuration, user management, firewall, and PEF alerting"

[dependencies]
sorng-core = { path = "../sorng-core" }
sorng-bmc-common = { path = "../sorng-bmc-common" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
sha1 = "0.10"
sha2 = { workspace = true }
hmac = { workspace = true }
md-5 = "0.10"
md2 = "0.10"
rand = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
serde_json = { workspace = true }
