[package]
name = "sorng-ipmi"
version = "0.1.0"
edition = "2021"
description = "Comprehensive IPMI 1.5/2.0 integration — authenticated sessions, raw commands, SOL, SDR, SEL, chassis control, FRU, sensor monitoring, watchdog timer, LAN configuration, user management, firewall, and PEF alerting"

[dependencies]
sorng-core = { path = "../sorng-core" }
sorng-bmc-common = { path = "../sorng-bmc-common" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
sha1 = "0.10"
sha2 = "0.10"
hmac = "0.12"
md-5 = "0.10"
rand = "0.8"
thiserror = "1"
async-trait = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
serde_json = "1.0"
