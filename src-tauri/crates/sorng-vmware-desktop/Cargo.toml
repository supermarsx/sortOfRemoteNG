[package]
name = "sorng-vmware-desktop"
version = "0.1.0"
edition = "2021"
description = "VMware Player / Workstation / Fusion desktop hypervisor management — vmrun CLI, vmrest REST API, VMX config, VMDK disks, snapshots, clones, shared folders, virtual networks, OVF/OVA, guest operations, NAT/port-forwarding, USB, teams"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
reqwest = { version = "0.11", features = ["json"] }
url = "2.5"
base64 = "0.21"

[target.'cfg(windows)'.dependencies]
winreg = "0.52"
