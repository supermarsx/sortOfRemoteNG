[package]
name = "sorng-vmware-desktop"
version = "0.1.0"
edition = "2021"
description = "VMware Player / Workstation / Fusion desktop hypervisor management — vmrun CLI, vmrest REST API, VMX config, VMDK disks, snapshots, clones, shared folders, virtual networks, OVF/OVA, guest operations, NAT/port-forwarding, USB, teams"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true }
url = { workspace = true }
base64 = { workspace = true }

[target.'cfg(windows)'.dependencies]
winreg = "0.52"
