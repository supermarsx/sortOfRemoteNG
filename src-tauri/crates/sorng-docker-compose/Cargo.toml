[package]
name = "sorng-docker-compose"
version = "0.1.0"
edition = "2021"
rust-version = "1.77.2"
description = "Docker Compose management crate for SortOfRemoteNG – compose file parsing, full CLI orchestration, service lifecycle, health monitoring, dependency graphs, profiles, environment management, and Tauri command bindings"
publish = false

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9"
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
base64 = { workspace = true }
sha2 = { workspace = true }
regex = "1.10"
dirs = "5.0"
async-trait = "0.1"
futures = "0.3"
indexmap = { version = "2.2", features = ["serde"] }
petgraph = "0.6"
which = "6.0"
shellexpand = "3.1"
glob = "0.3"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.0"
pretty_assertions = "1.4"
