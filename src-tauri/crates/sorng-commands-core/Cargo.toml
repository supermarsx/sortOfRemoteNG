[package]
name = "sorng-commands-core"
version = "0.1.0"
edition = "2021"
description = "Core command handlers — split from app crate to reduce coherence checking time"

[dependencies]
sorng-app-domains = { path = "../sorng-app-domains" }
sorng-app-shell = { path = "../sorng-app-shell" }
sorng-core = { path = "../sorng-core" }
tauri = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
log = { workspace = true }
tokio = { workspace = true }
ssh2 = { workspace = true }
reqwest = { workspace = true }
chrono = { workspace = true }
base64 = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }
uuid = { workspace = true }
regex = { workspace = true }
tokio-rustls = { workspace = true }
axum = "0.7"
tauri-plugin-autostart = "=2.5.1"

[target.'cfg(windows)'.dependencies]
windows = { workspace = true, features = ["Win32_UI_Input_KeyboardAndMouse"] }

[features]
default = []
rdp = ["sorng-app-domains/rdp"]
script-engine = []
