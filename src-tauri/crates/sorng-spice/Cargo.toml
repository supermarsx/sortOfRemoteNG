[package]
name = "sorng-spice"
version.workspace = true
edition = "2021"
rust-version = "1.77.2"
description = "SPICE (Simple Protocol for Independent Computing Environments) remote display client – channel management, display/input/USB/clipboard support, TLS, streaming, and Tauri command bindings."
publish = false

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
bytes = { workspace = true }
byteorder = "1"
which = "6.0"
zeroize = { workspace = true }
url = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
tempfile = { workspace = true }
