[package]
publish = false
name = "sorng-letsencrypt"
version = "0.1.0"
edition = "2021"
description = "Let's Encrypt / ACME certificate management for SortOfRemote NG gateway — automated issuance, renewal, HTTP-01/DNS-01 challenges, certificate storage, and monitoring"

[features]
default = []
dns-resolver = ["dep:hickory-resolver"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
log = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
base64 = { workspace = true }
reqwest = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
p256 = { version = "0.13", features = ["ecdsa", "pem"] }
rcgen = "=0.12.1"
# Optional DNS resolver for DNS-01 challenge propagation checks.
# When disabled, the crate falls back to spawning `nslookup`.
hickory-resolver = { version = "0.26.1", default-features = false, features = ["tokio", "system-config"], optional = true }
