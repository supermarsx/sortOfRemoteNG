[package]
name = "sorng-letsencrypt"
version = "0.1.0"
edition = "2021"
description = "Let's Encrypt / ACME certificate management for SortOfRemote NG gateway — automated issuance, renewal, HTTP-01/DNS-01 challenges, certificate storage, and monitoring"

[features]
default = []
dns-resolver = ["dep:trust-dns-resolver"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
log = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
base64 = { workspace = true }
reqwest = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
# Optional DNS resolver for DNS-01 challenge propagation checks.
# When disabled, the crate falls back to spawning `nslookup`.
trust-dns-resolver = { version = "0.23", default-features = false, features = ["tokio-runtime", "system-config"], optional = true }
