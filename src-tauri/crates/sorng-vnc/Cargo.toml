[package]
name = "sorng-vnc"
version = "0.1.0"
edition = "2021"
description = "VNC/RFB protocol engine with authentication, framebuffer updates, input handling, and session management."

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
bytes = { workspace = true }
byteorder = "1"
des = "0.8"
cipher = "0.4"
aes = "0.8"
md-5 = "0.10"
num-bigint = "0.4"
num-traits = "0.2"
num-integer = "0.1"
rand = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
