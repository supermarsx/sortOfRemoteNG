[package]
name = "sorng-time-ntp"
version = "0.1.0"
edition = "2021"
rust-version = "1.77.2"
description = "Time, timezone, and NTP management for SortOfRemoteNG — timedatectl management, chronyd/ntpd configuration, NTP peer/server management, timezone configuration, RTC (hardware clock) management, PTP support, and time synchronization monitoring."
publish = false

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
log = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
tauri = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
