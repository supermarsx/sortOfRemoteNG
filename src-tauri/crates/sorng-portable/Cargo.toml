[package]
name = "sorng-portable"
version = "0.1.0"
edition = "2021"
description = "Portable mode support for SortOfRemote NG — relative data storage, USB-friendly deployment, data directory management, migration between portable and installed modes, and environment detection"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
