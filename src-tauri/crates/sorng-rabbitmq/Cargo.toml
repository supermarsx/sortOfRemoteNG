[package]
name = "sorng-rabbitmq"
version = "0.1.0"
edition = "2021"
description = "RabbitMQ message broker integration — vhost, exchange, queue, binding, user, permission, policy, shovel, federation, cluster, and monitoring management via the HTTP Management API"

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
reqwest = { version = "0.11", features = ["json", "cookies"] }
url = "2.5"
base64 = "0.21"
thiserror = "1"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
serde_json = "1.0"
