[package]
name = "sorng-rabbitmq"
version = "0.1.0"
edition = "2021"
description = "RabbitMQ message broker integration — vhost, exchange, queue, binding, user, permission, policy, shovel, federation, cluster, and monitoring management via the HTTP Management API"

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["cookies"] }
url = { workspace = true }
base64 = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
serde_json = { workspace = true }
