[package]
name = "sorng-redis"
version = "0.1.0"
edition = "2021"
description = "Redis connection management, key-value operations, data structure commands, pub/sub, server admin, and session lifecycle."

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
redis = { version = "0.27", features = ["tokio-comp", "tokio-rustls-comp"] }
ssh2 = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
