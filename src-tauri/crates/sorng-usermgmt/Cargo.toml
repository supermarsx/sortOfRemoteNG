[package]
name = "sorng-usermgmt"
version = "0.1.0"
edition = "2021"
rust-version = "1.77.2"
description = "Linux/Unix user and group management for SortOfRemoteNG — useradd/usermod/userdel, groupadd/groupmod/groupdel, passwd, chage, /etc/passwd, /etc/shadow, /etc/group, /etc/gshadow, /etc/login.defs, /etc/skel, sudo/sudoers, user quotas, home directory management, shell management, and bulk operations."
publish = false

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
log = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
tokio-test = "0.4"
