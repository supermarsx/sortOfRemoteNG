[package]
name = "sorng-telegram"
version = "0.1.0"
edition = "2021"
description = "Telegram Bot API integration — messaging, notifications, monitoring alerts, file sharing, chat management, inline keyboards, webhooks"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["multipart", "stream"] }
base64 = { workspace = true }
url = { workspace = true }
regex = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
rand = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }
hex = { workspace = true }
