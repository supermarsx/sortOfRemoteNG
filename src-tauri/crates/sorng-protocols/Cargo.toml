[package]
name = "sorng-protocols"
version = "0.1.0"
edition = "2021"
description = "VNC, Telnet, Serial, Rlogin, Raw Socket, FTP, DB, and HTTP protocols"

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
vnc-rs = "0.5"
suppaftp = "4.5"
ssh2 = { workspace = true }
sqlx = { version = "0.7", features = ["mysql", "runtime-tokio"] }
uuid = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
serialport = "4.2"
socket2 = "0.5"
reqwest = { workspace = true, features = ["cookies", "blocking"] }
regex = { workspace = true }
rustls = "0.21"
rustls-pemfile = "1.0"
x509-parser = "0.15"
native-tls = { workspace = true }
tokio-native-tls = { workspace = true }
base64 = { workspace = true }
log = { workspace = true }
rand = { workspace = true }
tokio-tungstenite = "0.21"
futures-util = "0.3"
axum = "0.7"
image = "0.24"
flate2 = "1.0"
hex = { workspace = true }
