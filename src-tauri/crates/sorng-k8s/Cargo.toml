[package]
name = "sorng-k8s"
version = "0.1.0"
edition = "2021"
description = "Kubernetes cluster management (contexts, namespaces, pods, deployments, services, configmaps, secrets, ingress, jobs, RBAC, Helm, logs, exec, port-forward, events, metrics)"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["cookies", "native-tls"] }
base64 = { workspace = true }
url = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
native-tls = { workspace = true }
tokio-native-tls = { workspace = true }
regex = { workspace = true }
dirs = { workspace = true }
