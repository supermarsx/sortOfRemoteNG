[package]
name = "sorng-storage"
version = "0.1.0"
edition = "2021"
description = "Secure storage and backup management"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
flate2 = "1.0"
aes-gcm = { workspace = true }
rand = { workspace = true }
chrono = { workspace = true }
base64 = { workspace = true }
pbkdf2 = { workspace = true }
hmac = { workspace = true }
log = { workspace = true }
dirs = { workspace = true }
uuid = { workspace = true }
# Phase 3a — v2 envelope codec for backups, for the new sornG-v1::backups
# sub-key path. The legacy SORNG1 (PBKDF2/600k) format remains supported
# on read for one release so users can restore old backups.
sorng-encryption = { path = "../sorng-encryption" }

[dev-dependencies]
tempfile = { workspace = true }
