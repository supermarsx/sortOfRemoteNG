[package]
publish = false
name = "sorng-ssh-agent"
version.workspace = true
edition = "2021"
description = "Full OpenSSH agent implementation for SortOfRemote NG — built-in agent, system agent bridge, key management, agent forwarding, key constraints, and PKCS#11/FIDO2 support"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
log = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
base64 = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
ssh-key = { version = "0.6", features = ["rsa", "ed25519", "encryption", "std", "getrandom"] }
rsa = "0.9"
signature = "2"
sha1 = { version = "0.10", features = ["oid"] }
