[package]
name = "sorng-gpo"
version = "0.1.0"
edition = "2021"
description = "Windows Group Policy Object (GPO) management for SortOfRemote NG"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
log = { workspace = true }

[target.'cfg(windows)'.dependencies]
windows-sys = { workspace = true, features = ["Win32_System_Registry", "Win32_Foundation", "Win32_Security"] }
