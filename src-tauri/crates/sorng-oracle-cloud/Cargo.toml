[package]
name = "sorng-oracle-cloud"
version = "0.1.0"
edition = "2021"
publish = false
description = "Oracle Cloud Infrastructure integration for SortOfRemote NG — compute, networking, storage, IAM, database, load balancers, container engine, functions, and Tauri integration"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
reqwest = { version = "0.11", features = ["json"] }
sha2 = "0.10"
base64 = "0.21"
