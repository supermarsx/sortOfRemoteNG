[package]
name = "sorng-sqlite"
version = "0.1.0"
edition = "2021"
description = "SQLite connection management, query execution, schema introspection, import/export, and session lifecycle."

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
sqlx = { workspace = true, features = ["sqlite", "runtime-tokio"] }
thiserror = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
