[package]
name = "sorng-updater"
version = "0.1.0"
edition = "2021"
description = "Application auto-updater for SortOfRemote NG — GitHub releases integration, semantic version comparison, update channels (stable/beta/nightly), download with progress tracking, signature verification, differential updates, rollback support, release notes display, and update scheduling"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
reqwest = { version = "0.11", features = ["json", "stream"] }
sha2 = "0.10"
