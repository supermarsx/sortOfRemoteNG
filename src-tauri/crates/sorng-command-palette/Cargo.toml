[package]
name = "sorng-command-palette"
version = "0.1.0"
edition = "2021"
description = "SSH command palette with memory, AI completions, snippets, and fuzzy search"

[dependencies]
sorng-llm = { path = "../sorng-llm" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4"] }
regex = "1.10"
fuzzy-matcher = "0.3"
log = "0.4"
sha2 = "0.10"
