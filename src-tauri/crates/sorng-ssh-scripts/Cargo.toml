[package]
name = "sorng-ssh-scripts"
version = "0.1.0"
edition = "2021"
description = "Action-based and event-based SSH script execution engine"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
regex = "1"
cron = "0.12"
