[package]
name = "sorng-kafka"
version = "0.1.0"
edition = "2021"
description = "Apache Kafka integration — cluster management, topic operations, consumer groups, producer/consumer, ACLs, Schema Registry, Kafka Connect, quotas, reassignment, and performance monitoring"

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
rdkafka = { version = "0.36", features = ["cmake-build", "ssl", "sasl"] }
reqwest = { version = "0.11", features = ["json", "cookies"] }
url = "2.5"
base64 = "0.21"
thiserror = "1"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
serde_json = "1.0"
