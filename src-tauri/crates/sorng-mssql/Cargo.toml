[package]
name = "sorng-mssql"
version = "0.1.0"
edition = "2021"
description = "Microsoft SQL Server connection management, query execution, schema introspection, import/export, and session lifecycle."

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-util = { version = "0.7", features = ["compat"] }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
tiberius = { version = "0.12", default-features = false, features = ["tds73", "chrono", "rustls"] }
ssh2 = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
