[package]
name = "sorng-jira"
version = "0.1.0"
edition = "2021"
description = "Jira / Jira Cloud integration crate for SortOfRemoteNG"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2", features = [] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
reqwest = { version = "0.12", features = ["json", "cookies", "blocking", "native-tls", "multipart"] }
url = "2"
base64 = "0.22"
