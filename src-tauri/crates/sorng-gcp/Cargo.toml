[package]
name = "sorng-gcp"
version = "0.1.0"
edition = "2021"
description = "Comprehensive Google Cloud Platform integration crate with OAuth2/JWT auth, Compute Engine, Cloud Storage, IAM, Cloud SQL, Cloud Functions, GKE, Cloud DNS, Pub/Sub, Cloud Run, Secret Manager, Logging, and Monitoring"

[dependencies]
sorng-dns = { path = "../sorng-dns" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
reqwest = { workspace = true, features = ["cookies"] }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
base64 = { workspace = true }
sha2 = { workspace = true }
jsonwebtoken = "9"
url = { workspace = true }
percent-encoding = "2.3"
