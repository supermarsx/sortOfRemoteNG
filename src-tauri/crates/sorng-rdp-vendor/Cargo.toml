[package]
publish = false
name = "sorng-rdp-vendor"
version.workspace = true
edition = "2021"
description = "Grouped vendor dependencies for the RDP stack"

[lib]
# Keep this as an rlib-only Rust dependency. Cargo-built executables prefer the
# rlib when both forms are available, so the former companion dylib was unused
# by the app and was not bundled. On MSVC, emitting that unused Rust dylib also
# generated an import library with more than 65,535 exported members and failed
# with LNK1189 before the application could be linked.
crate-type = ["rlib"]

[features]
default = ["software-decode"]
software-decode = ["dep:openh264"]

[dependencies]
ironrdp = { version = "0.14", features = ["connector", "session", "graphics", "input", "core", "displaycontrol"] }
ironrdp-blocking = "0.8"
ironrdp-svc = "0.6"
ironrdp-dvc = "0.5"
ironrdp-core = "0.1"
ironrdp-cliprdr = "0.5"
ironrdp-cliprdr-native = "0.5"
log = "0.4"
openh264 = { version = "0.8", optional = true }
