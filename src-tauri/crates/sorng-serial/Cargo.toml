[package]
name = "sorng-serial"
version = "0.1.0"
edition = "2021"
description = "Serial / RS-232 port communication — port discovery, session management, modem AT commands, line protocols (XMODEM, YMODEM, ZMODEM), and data logging."

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
bytes = { workspace = true }
crc = "3"
hex = { workspace = true }
regex = { workspace = true }
base64 = { workspace = true }
async-trait = { workspace = true }
serialport = "4"

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
