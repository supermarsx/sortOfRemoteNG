[package]
name = "sorng-serial"
version = "0.1.0"
edition = "2021"
description = "Serial / RS-232 port communication — port discovery, session management, modem AT commands, line protocols (XMODEM, YMODEM, ZMODEM), and data logging."

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
bytes = { workspace = true }
crc = "3"
hex = { workspace = true }
regex = { workspace = true }
base64 = { workspace = true }
async-trait = { workspace = true }
# `serialport` backs the transport for both feature variants. What
# differs between the two features is the runtime probe semantics
# wired in `serial/runtime_check.rs` — not the transport crate itself.
serialport = "4"

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }

[features]
# Default to the dynamic-linked variant — this is what release bundles
# ship. Dev/test images that know they have the driver pre-provisioned
# can build with `--no-default-features --features protocol-serial` to
# skip the runtime probe.
default = ["protocol-serial-dynamic"]

# Static / vendored variant (dev/test). The driver is assumed present
# at build time — the runtime probe is a no-op that unconditionally
# returns Ok(()).
protocol-serial = []

# Dynamic-linked variant — the driver stack is probed at runtime
# (libserialport.so.* / setserial on Linux, SetupAPI on Windows, IOKit
# on macOS). Missing driver surfaces a typed `DriverMissing` error
# with a per-OS install hint. Default shipped in release bundles.
protocol-serial-dynamic = []
