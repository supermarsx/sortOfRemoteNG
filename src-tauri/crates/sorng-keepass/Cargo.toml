[package]
name = "sorng-keepass"
version = "0.1.0"
edition = "2021"
description = "Comprehensive KeePass KDBX database integration: entries, groups, attachments, password generation, auto-type, import/export, search, merge"

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
lazy_static = { workspace = true }
base64 = { workspace = true }
dirs = { workspace = true }
rand = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
csv = "1.3"
quick-xml = { version = "0.31", features = ["serialize"] }
