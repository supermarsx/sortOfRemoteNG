[package]
name = "sorng-synology"
version = "0.1.0"
edition = "2021"
description = "Synology NAS management — DSM 6.x/7.x via the SYNO.API REST interface (system, storage, file station, docker, surveillance, backup, and more)"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
reqwest = { version = "0.11", features = ["json", "cookies", "multipart", "stream"] }
base64 = "0.21"
url = "2.5"
async-trait = "0.1"
futures = "0.3"
native-tls = "0.2"
tokio-native-tls = "0.3"
