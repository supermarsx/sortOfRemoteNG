[package]
name = "sorng-replay"
version = "0.1.0"
edition = "2021"
description = "Session replay engine for SortOfRemote NG — timeline scrubbing, multi-protocol playback (SSH terminal asciicast, RDP/VNC video frames, HTTP HAR waterfall), searchable transcripts, bookmarks/annotations, speed control, frame-accurate seeking, and export"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
base64 = "0.21"
regex = "1"
