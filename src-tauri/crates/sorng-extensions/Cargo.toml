[package]
name = "sorng-extensions"
version = "0.1.0"
edition = "2021"
description = "Extensions engine — manifest-driven plugin system with sandboxed script runtime, permission model, hook/event system, per-extension storage, and full lifecycle management"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
sha2 = "0.10"
regex = "1"
