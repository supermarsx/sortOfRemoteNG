[package]
name = "sorng-fail2ban"
version = "0.1.0"
edition = "2021"
publish = false
description = "Fail2ban management crate for SortOfRemote NG — jail management, ban/unban operations, filter rules, log monitoring, whitelist/blacklist, status, statistics, and Tauri integration"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
regex = "1"
