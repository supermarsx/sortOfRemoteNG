[package]
name = "sorng-onedrive"
version = "0.1.0"
edition = "2021"
description = "Microsoft OneDrive / SharePoint integration for SortOfRemote NG – OAuth2 auth, file CRUD, large-file upload (resumable), download, sharing links, permissions, delta sync, search, webhooks (subscriptions), thumbnails, drives, special folders, and trash management via the Microsoft Graph v1.0 API."

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["multipart", "stream"] }
base64 = { workspace = true }
url = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
tokio-util = { version = "0.7", features = ["io"] }
futures-util = "0.3"
percent-encoding = "2.3"
mime_guess = "2.0"
