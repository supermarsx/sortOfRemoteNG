[package]
name = "sorng-nextcloud"
version = "0.1.0"
edition = "2021"
description = "Nextcloud integration — WebDAV files/folders, OCS sharing, users, activity, sync, backup and watcher for SortOfRemote NG"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["multipart", "stream"] }
base64 = { workspace = true }
url = { workspace = true }
regex = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
futures = { workspace = true }
quick-xml = { version = "0.31", features = ["serialize"] }
