[package]
name = "sorng-llm"
version = "0.1.0"
edition = "2021"
description = "Unified LLM backend management — provider registry, model catalog, rate limiting, caching, cost tracking, load balancing, and agent tool-calling normalization"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
reqwest = { version = "0.11", features = ["json", "stream"] }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
async-trait = "0.1"
futures = "0.3"
tokio-stream = "0.1"
bytes = "1"
sha2 = "0.10"
hex = "0.4"
base64 = "0.21"
rand = "0.8"
regex = "1"
lazy_static = "1.4"
