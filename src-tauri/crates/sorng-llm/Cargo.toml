[package]
name = "sorng-llm"
version = "0.1.0"
edition = "2021"
description = "Unified LLM backend management — provider registry, model catalog, rate limiting, caching, cost tracking, load balancing, and agent tool-calling normalization"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
reqwest = { workspace = true, features = ["stream"] }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
tokio-stream = { workspace = true }
bytes = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
regex = { workspace = true }
lazy_static = { workspace = true }
