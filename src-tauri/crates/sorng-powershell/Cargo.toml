[package]
publish = false
name = "sorng-powershell"
version.workspace = true
edition = "2021"
description = "PowerShell Remoting (WinRM, PSSession, CIM, DSC, JEA) services"

[features]
default = []
# The live contract is ignored and opt-in because it builds a pinned Docker
# fixture. The strict SSH transport and its unit tests are always compiled.
psrp-ssh-e2e = []

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["cookies", "blocking"] }
base64 = { workspace = true }
rand = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }
md-5 = "0.10"
quick-xml = { version = "0.41", features = ["serialize"] }
url = { workspace = true }
lazy_static = { workspace = true }
regex = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
hex = { workspace = true }
dirs = { workspace = true }
psrp-rs = { path = "../../vendor/psrp-rs-core", default-features = false }
russh = { version = "=0.49.2", default-features = false }
ssh-key = { version = "0.6", features = ["ed25519", "encryption", "std"] }
zeroize = { workspace = true }

# Route WinRM/PowerShell TLS certificate decisions through the backend Trust
# Center with TOFU as the default (replaces blind danger_accept_invalid_certs).
sorng-tls-trust = { path = "../sorng-tls-trust" }
sorng-storage = { path = "../sorng-storage" }

# sspi-rs for CredSSP / Negotiate / NTLM / Kerberos.
# Default features pull in aws-lc-rs which installs the rustls default
# crypto provider globally — disable defaults since sorng-app installs
# the ring provider.  We only need base SSPI + Kerberos builder types.
sspi = { version = "0.18", default-features = false }

[dev-dependencies]
tokio-util = { workspace = true }
