[package]
name = "sorng-docker"
version = "0.1.0"
edition = "2021"
rust-version = "1.77.2"
description = "Docker daemon management crate for SortOfRemoteNG"
publish = false

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["cookies", "blocking"] }
base64 = { workspace = true }
url = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
dirs = { workspace = true }

[target.'cfg(unix)'.dependencies]
hyperlocal = "0.4"
http-body-util = "0.1"
