[package]
name = "sorng-docker"
version = "0.1.0"
edition = "2021"
rust-version = "1.77.2"
description = "Docker daemon management crate for SortOfRemoteNG"
publish = false

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true }
base64 = { workspace = true }
url = "2.5"
futures = "0.3"
async-trait = "0.1"
dirs = "5.0"

[target.'cfg(unix)'.dependencies]
hyperlocal = { version = "0.4", features = ["client"] }
hyper = "1.0"
hyper-util = { version = "0.1", features = ["client-legacy", "tokio"] }
http-body-util = "0.1"
tower-service = "0.3"
