[package]
name = "sorng-passbolt"
version = "0.1.0"
edition = "2021"
description = "Passbolt password manager integration with REST API client, GPGAuth/JWT authentication, OpenPGP crypto, resource/folder/user/group management, sharing, tags, comments, metadata, and MFA support."

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["cookies", "multipart"] }
base64 = { workspace = true }
url = { workspace = true }
regex = { workspace = true }
thiserror = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
tempfile = { workspace = true }
