[package]
name = "sorng-i18n"
version = "0.1.0"
edition = "2021"
description = "Backend i18n engine with hot-reload, SSR, pluralization, and Tauri commands"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
log = "0.4"
notify = { version = "7", features = ["macos_kqueue"] }
notify-debouncer-mini = "0.5"
arc-swap = "1.7"
dashmap = "6"
sys-locale = "0.3"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"

[dev-dependencies]
tempfile = "3.0"
tokio-test = "0.4"
