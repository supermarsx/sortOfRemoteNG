[package]
name = "sorng-rustdesk"
version = "0.1.0"
edition = "2021"
description = "Comprehensive RustDesk remote desktop integration: sessions, Server Pro API, address books, audits, file transfer, diagnostics"

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["cookies"] }
lazy_static = { workspace = true }
base64 = { workspace = true }
dirs = { workspace = true }
url = { workspace = true }
