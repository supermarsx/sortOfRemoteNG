[package]
name = "sorng-scheduler"
version = "0.1.0"
edition = "2021"
description = "Scheduled tasks and cron-like automation engine for SortOfRemote NG — cron expression parsing, one-shot and recurring schedules, task pipelines, connection auto-connect/disconnect, script scheduling, health check scheduling, report generation, calendar view, execution history, and retry policies"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
