[package]
name = "sorng-ssh"
version = "0.1.0"
edition = "2021"
description = "SSH, SSH3, and script execution services"

[features]
default = []
script-engine = ["dep:rquickjs"]
# Opt-in marker for e2e tests that talk to the openssh docker container
# defined in `e2e/docker-compose.yml` (see tests/golden_path.rs). Leaving
# this off compiles the test binary to empty; `cargo test -- --ignored`
# also skips it without the feature.
docker-e2e = []

[dependencies]
sorng-core = { path = "../sorng-core" }
sorng-dns = { path = "../sorng-dns" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
ssh2 = { workspace = true }
russh = "0.40"
russh-keys = "0.40"
futures = { workspace = true }
async-trait = { workspace = true }
shell-escape = "0.1"
uuid = { workspace = true }
chrono = { workspace = true }
rquickjs = { version = "0.6", features = ["full-async"], optional = true }
lazy_static = { workspace = true }
ssh-key = { version = "0.6", features = ["rsa", "ed25519", "encryption", "std", "getrandom"] }
rsa = "0.9"
dirs = { workspace = true }
log = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }
base64 = { workspace = true }
totp-rs = "5.4"
data-encoding = "2.5"
regex = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
tempfile = { workspace = true }
