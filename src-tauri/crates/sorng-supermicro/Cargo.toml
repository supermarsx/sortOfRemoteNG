[package]
publish = false
name = "sorng-supermicro"
version = "0.1.0"
edition = "2021"
description = "Supermicro BMC/IPMI management with Redfish (X11+), legacy CGI web API, and IPMI support"

[dependencies]
sorng-bmc-common = { path = "../sorng-bmc-common" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["cookies"] }
base64 = { workspace = true }
url = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
sorng-tls-trust = { path = "../sorng-tls-trust" }
sorng-storage = { path = "../sorng-storage" }
dirs = { workspace = true }

[dev-dependencies]
# Used in tests to install the process-global ring crypto provider (normally
# installed by sorng-app at startup) so `build_tofu_client` can construct a
# rustls ClientConfig under `cargo test`.
rustls = { workspace = true, features = ["ring"] }
