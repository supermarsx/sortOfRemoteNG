[package]
name = "sorng-lastpass"
version = "0.1.0"
edition = "2021"
description = "LastPass password manager integration with web vault API client, PBKDF2 authentication, vault decryption, AES-CBC/ECB item parsing, folder management, sharing centers, emergency access, MFA support, security challenge scoring, and import/export."

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["cookies", "multipart"] }
base64 = { workspace = true }
url = { workspace = true }
thiserror = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
hmac = { workspace = true }
pbkdf2 = "0.12"
aes = "0.8"
cbc = "0.1"
hex = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
tempfile = { workspace = true }
