[package]
name = "sorng-encryption"
version = "0.1.0"
edition = "2021"
description = "Application-wide encryption-at-rest orchestration: master DEK, per-artifact sub-keys, file envelope codec, unlock state"

[dependencies]
# Crypto primitives.
aes-gcm = { workspace = true }
hkdf = "0.12"
sha2 = { workspace = true }
rand = { workspace = true }
zeroize = "1.7"
argon2 = "0.5"

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }
thiserror = { workspace = true }

# Log redaction
regex = { workspace = true }

# Async
tokio = { workspace = true }

# Vault for master DEK storage + password-wrap envelope
sorng-vault = { path = "../sorng-vault" }

# Tauri command surface
tauri = { workspace = true }

[dev-dependencies]
tempfile = "3"
