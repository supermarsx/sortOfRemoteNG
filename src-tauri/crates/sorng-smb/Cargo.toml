[package]
name = "sorng-smb"
version = "0.1.0"
edition = "2021"
description = "SMB/CIFS client — platform-split implementation. Windows uses native UNC paths (\\\\server\\share) with std::fs + `net view` for share enumeration. Unix uses smbclient subprocess. The `pavao` crate was evaluated but rejected because pavao-sys links to libsmbclient (Samba's C library), unavailable on Windows without bundling Samba dev libs."

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
lazy_static = { workspace = true }
log = { workspace = true }
thiserror = { workspace = true }
regex = { workspace = true }
