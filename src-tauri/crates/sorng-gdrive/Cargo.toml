[package]
name = "sorng-gdrive"
version = "0.1.0"
edition = "2021"
description = "Google Drive API v3 integration — file management, uploads/downloads, sharing, revisions, comments, shared drives, change tracking, search"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["multipart", "stream"] }
base64 = { workspace = true }
url = { workspace = true }
mime_guess = "2.0"
