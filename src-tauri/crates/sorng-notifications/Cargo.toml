[package]
publish = false
name = "sorng-notifications"
version.workspace = true
edition = "2021"
description = "Notification rules engine for SortOfRemote NG — rule-based alerting with multi-channel delivery (in-app, desktop, webhook, email, Slack, Discord, Teams), template rendering, throttling, escalation chains, and notification history"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true }
regex = { workspace = true }
lettre = { version = "0.11", default-features = false, features = ["smtp-transport", "tokio1-rustls-tls", "builder", "hostname"] }
