[package]
name = "sorng-remote-backup"
version = "0.1.0"
edition = "2021"
publish = false
description = "SSH-based remote backup and sync crate for SortOfRemote NG — rsync, rclone, restic, borg, sftp, scp, unison, and duplicity integration with scheduling, progress tracking, bandwidth limiting, integrity verification, and retention policies"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
regex = { workspace = true }
which = "7"
sha2 = { workspace = true }
sha1 = "0.10"
md-5 = "0.10"
blake2 = "0.10"
hex = { workspace = true }
xxhash-rust = { version = "0.8", features = ["xxh64"] }
cron = "0.12"

[dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros", "fs", "io-util"] }
tempfile = { workspace = true }
