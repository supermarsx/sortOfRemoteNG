[package]
name = "sorng-remote-backup"
version = "0.1.0"
edition = "2021"
publish = false
description = "SSH-based remote backup and sync crate for SortOfRemote NG — rsync, rclone, restic, borg, sftp, scp, unison, and duplicity integration with scheduling, progress tracking, bandwidth limiting, integrity verification, and retention policies"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
regex = "1"
which = "7"
sha2 = "0.10"
