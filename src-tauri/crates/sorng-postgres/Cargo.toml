[package]
publish = false
name = "sorng-postgres"
version.workspace = true
edition = "2021"
description = "PostgreSQL connection management, query execution, schema introspection, import/export, and session lifecycle."

[dependencies]
sorng-core = { path = "../sorng-core" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
sqlx = { workspace = true, features = ["postgres", "runtime-tokio", "tls-rustls", "chrono", "json", "uuid", "bigdecimal"] }
thiserror = { workspace = true }
url = { workspace = true }
base64 = { workspace = true }
bigdecimal = "0.4"
zeroize = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
