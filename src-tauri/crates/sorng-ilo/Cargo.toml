[package]
name = "sorng-ilo"
version = "0.1.0"
edition = "2021"
description = "HP/HPE Integrated Lights-Out (iLO) management — iLO 1 through 7 with RIBCL, Redfish, IPMI, and HTML5 console support"

[dependencies]
sorng-bmc-common = { path = "../sorng-bmc-common" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["cookies"] }
base64 = { workspace = true }
url = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
quick-xml = { version = "0.31", features = ["serialize"] }
