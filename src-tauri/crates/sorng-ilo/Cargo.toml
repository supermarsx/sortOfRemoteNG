[package]
name = "sorng-ilo"
version = "0.1.0"
edition = "2021"
description = "HP/HPE Integrated Lights-Out (iLO) management — iLO 1 through 7 with RIBCL, Redfish, IPMI, and HTML5 console support"

[dependencies]
sorng-bmc-common = { path = "../sorng-bmc-common" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
reqwest = { version = "0.11", features = ["json", "cookies"] }
base64 = "0.21"
url = "2.5"
async-trait = "0.1"
futures = "0.3"
native-tls = "0.2"
tokio-native-tls = "0.3"
quick-xml = { version = "0.31", features = ["serialize"] }
