[package]
name = "sorng-lxd"
version = "0.1.0"
edition = "2021"
description = "LXD / Incus container and virtual machine management — instances, images, profiles, networks, storage pools, projects, certificates, cluster, snapshots, backups, migration, operations, configuration"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tauri = { version = "2.9.5", features = ["devtools"] }
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
reqwest = { version = "0.11", features = ["json", "multipart", "stream", "native-tls"] }
url = "2.5"
base64 = "0.21"
