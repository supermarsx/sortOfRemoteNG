[package]
name = "sorng-totp"
version = "0.1.0"
edition = "2021"
description = "Comprehensive TOTP/HOTP authenticator — RFC 6238/4226 code generation, otpauth:// URI handling, QR support, multi-format import (Google Authenticator, Aegis, 2FAS, andOTP, Authy, FreeOTP+, Bitwarden, RAIVO), encrypted vault storage, backup/restore, and Tauri command bindings"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
base32 = "0.5"
base64 = { workspace = true }
sha1 = "0.10"
sha2 = { workspace = true }
hmac = { workspace = true }
url = { workspace = true }
rand = { workspace = true }
aes-gcm = { workspace = true }
pbkdf2 = { workspace = true }
hex = { workspace = true }
regex = { workspace = true }
qrcode = "0.14"
image = { version = "0.25", default-features = false, features = ["png"] }
