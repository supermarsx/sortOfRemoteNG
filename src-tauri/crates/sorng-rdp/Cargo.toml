[package]
name = "sorng-rdp"
version = "0.1.0"
edition = "2021"
description = "RDP connectivity, graphics pipeline, and H.264 decoding"

[dependencies]
sorng-core = { path = "../sorng-core" }
sorng-dns = { path = "../sorng-dns" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tauri = { workspace = true }
ironrdp = { version = "0.14", features = ["connector", "session", "graphics", "input", "core"] }
ironrdp-blocking = "0.8"
ironrdp-svc = "0.6"
ironrdp-dvc = "0.5"
ironrdp-core = "0.1"
openh264 = "0.6"
bytes = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
softbuffer = "0.4"
wgpu = "24"
raw-window-handle = "0.6"
log = { workspace = true }
x509-cert = { version = "0.2", features = ["std"] }
sha2 = { workspace = true }
socket2 = "0.5"
reqwest = { workspace = true, features = ["cookies", "blocking"] }
rustls = { workspace = true }
rustls-native-certs = { workspace = true }
smallvec = "1"
base64 = { workspace = true }
png = "0.18"

[target.'cfg(windows)'.dependencies]
windows = { workspace = true, features = ["Win32_Graphics_Gdi", "Win32_UI_Input_KeyboardAndMouse", "Win32_System_Com", "Win32_Media_MediaFoundation", "Win32_Graphics_Direct3D11", "Win32_Graphics_Dxgi", "Win32_Graphics_Direct3D", "Win32_Foundation"] }

