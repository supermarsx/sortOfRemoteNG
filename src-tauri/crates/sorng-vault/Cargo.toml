[package]
name = "sorng-vault"
version = "0.1.0"
edition = "2021"
description = "Cross-platform native OS vault/keychain integration — Windows Credential Manager + DPAPI, macOS Keychain, Linux Secret Service"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
log = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
aes-gcm = { workspace = true }
argon2 = "0.5"
thiserror = { workspace = true }
dirs = { workspace = true }

# Sibling crate for biometric gating
sorng-biometrics = { path = "../sorng-biometrics" }

[target.'cfg(target_os = "windows")'.dependencies]
sorng-vault-windows = { path = "../sorng-vault-windows" }

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "2.11"

[target.'cfg(target_os = "linux")'.dependencies]
# For Secret Service D-Bus protocol (GNOME Keyring / KDE Wallet)
zbus = { version = "4", features = ["tokio"] }
