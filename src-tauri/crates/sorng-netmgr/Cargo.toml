[package]
name = "sorng-netmgr"
version = "0.1.0"
edition = "2021"
rust-version = "1.77.2"
description = "Extensive network management crate for SortOfRemoteNG — nmcli/NetworkManager, firewalld, iptables, nftables, ufw, pf (BSD), Windows Firewall (netsh advfirewall), interface management, VLAN, bonding/teaming, bridge, Wi-Fi (wpa_supplicant/iwconfig), and network profiles."
publish = false

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
log = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
tokio-test = "0.4"
