[package]
name = "sorng-smtp"
version = "0.1.0"
edition = "2021"
description = "Full-featured SMTP client — message building, MIME attachments, STARTTLS/SMTPS, DKIM signing, address books, templates, send queue, delivery diagnostics"

[dependencies]
sorng-dns = { path = "../sorng-dns" }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
log = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }
md-5 = "0.10"
hex = { workspace = true }
rsa = { version = "0.9", features = ["sha2"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["logging", "ring", "tls12"] }
rustls = { version = "0.23", default-features = false, features = ["logging", "ring", "std", "tls12"] }
rustls-pemfile = "2.0"
webpki-roots = "1"
trust-dns-resolver = "0.23"
mime_guess = "2.0"
quoted_printable = "0.5"
regex = { workspace = true }
