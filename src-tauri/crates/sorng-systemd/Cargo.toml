[package]
name = "sorng-systemd"
version = "0.1.0"
edition = "2021"
rust-version = "1.77.2"
description = "systemd service and init system management for SortOfRemoteNG — systemctl unit management, journalctl log viewing, unit file editing, boot target management, timer units, socket activation, systemd-analyze, cgroup resource control, and hostnamectl/timedatectl/localectl."
publish = false

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
log = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
tokio-test = "0.4"
