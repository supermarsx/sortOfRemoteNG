name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Enter the ordered rolling pipeline at workflow dispatch, before job duration
# can reorder main pushes. Other refs receive unique groups and remain parallel.
concurrency:
  group: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'rolling-main-ci-order' || format('ci-{0}', github.run_id) }}
  queue: max
  cancel-in-progress: false

jobs:
  docs:
    name: Documentation links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/ci/check-docs-links.mjs

  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Test rolling-version tooling
        run: npm run version:test
      - name: Check rolling-version synchronization
        run: npm run version:check
      - name: Test release metadata enforcement
        run: npm run release:test

  updater-signature-verifier:
    name: Updater signature verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test valid, wrong-key, and tampered updater signatures
        run: >-
          cargo test --locked --manifest-path src-tauri/Cargo.toml
          -p sorng-updater-signature-verifier

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run format
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: coverage
          path: coverage
      - name: Report coverage
        run: >-
          node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('coverage/coverage-final.json','utf8'));let total=0,covered=0;for(const f of Object.values(data)){total+=Object.keys(f.statementMap).length;for(const k in f.s){if(f.s[k])covered++;}}const pct=(covered/total*100).toFixed(2);console.log('Coverage: '+pct+'%');"

  # ── Rust workspace check ───────────────────────────────────────────
  # Kafka is off by default. On Windows we exclude `sorng-kafka` entirely
  # because the rdkafka-sys cmake build fails under MSYS64 (see
  # `src-tauri/crates/sorng-kafka/README.md`). On Linux we additionally
  # run with `--features kafka` to cover the Kafka surface area.
  rust-check-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install librdkafka build prerequisites
        # libcurl/sasl/zstd/zlib -dev are needed by the `kafka-static` cmake
        # build of librdkafka from source (see kafka step below).
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libssl-dev libdbus-1-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libasound2-dev libudev-dev libcurl4-openssl-dev libsasl2-dev libzstd-dev zlib1g-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo check (default features — no Kafka)
        run: cargo check --workspace --exclude sorng-kafka
      # Build librdkafka from source (cmake) via `kafka-static`: the runner's
      # system librdkafka (apt) is 2.3.0, but rdkafka-sys 4.10 requires 2.12.1,
      # so the dynamic `kafka` feature's pkg-config version probe fails. Static
      # is version-independent and matches this step's original intent.
      - name: cargo check (--features kafka-static — cmake librdkafka build)
        run: cargo check -p app --features kafka-static
  # MSVC host is REQUIRED on Windows — the GNU host triggers "export ordinal
  # too large" link errors in large crate chains (rdkafka-sys, ironrdp-*,
  # sspi-rs). `windows-latest` runners default to the MSVC host, but we pin
  # it explicitly so a future runner-image change or a contributor's
  # `rustup default stable-x86_64-pc-windows-gnu` on a self-hosted runner
  # cannot silently regress us. See `rust-toolchain.toml` and
  # `README.md` Toolchain section.
  rust-check-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Pin MSVC host toolchain (explicit)
        shell: pwsh
        run: rustup set default-host x86_64-pc-windows-msvc
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy
      - name: Verify MSVC host active
        shell: pwsh
        run: |
          rustc -vV
          rustup show active-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo check (default — Kafka excluded; MSYS64 cmake issue, see crate README)
        run: cargo check --workspace --exclude sorng-kafka

  # ── t8-e19 + t8-e21: wrapped OPKSSH contract + optional staging gate ──
  # Phase E is proceeding under the relaxed dylink recommendation. This
  # lane verifies both the default CLI-fallback contract and the explicit
  # metadata-wrapper build gate, then exercises the staging helper in both
  # disabled and enabled modes so Tauri resource-copy truth stays aligned
  # with the optional bundle contract.
  rust-opkssh-targeted:
    name: OPKSSH targeted (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      SORNG_OPKSSH_VENDOR_CHECKOUT: ${{ github.workspace }}/.ci/opkssh-source
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Check out pinned OPKSSH source (193d79871f3bad3cd27cfb94734c265773a99c9b)
        uses: actions/checkout@v4
        with:
          repository: openpubkey/opkssh
          ref: 193d79871f3bad3cd27cfb94734c265773a99c9b
          fetch-depth: 1
          path: .ci/opkssh-source
      - name: Install Go toolchain for embedded OPKSSH bridge
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache-dependency-path: .ci/opkssh-source/go.sum
      - name: Install Linux build prerequisites (app crate check)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libasound2-dev libudev-dev
      - name: Pin MSVC host toolchain (explicit)
        if: runner.os == 'Windows'
        shell: pwsh
        run: rustup set default-host x86_64-pc-windows-msvc
      - name: Install Rust toolchain (non-Windows)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable
      - name: Install Rust toolchain (Windows MSVC)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc
      - name: Verify MSVC host active
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rustc -vV
          rustup show active-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo test (OPKSSH default wrapper contract)
        run: cargo test -p sorng-opkssh --tests -- --nocapture
      - name: cargo test (OPKSSH vendored-wrapper feature contract)
        run: cargo test -p sorng-opkssh --tests --features vendored-wrapper -- --nocapture
      - name: cargo check (app feature forwards OPKSSH vendored wrapper)
        run: cargo check -p app --features opkssh-vendored-wrapper
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: verify OPKSSH vendor staging defaults to disabled cleanup
        run: node ../scripts/stage-opkssh-vendor.mjs --disable
      - name: stage OPKSSH vendor artifact into the Tauri resource tree
        run: node ../scripts/stage-opkssh-vendor.mjs --enable

  # ── t7-e19: targeted RDP gate across Linux + Windows ───────────────
  # This keeps the Phase C RDP surface blocking in normal CI without
  # depending on Docker: explicit app `rdp` feature build, input PDU
  # goldens, reconnect regression, and the deterministic RDPDR harness.
  # The live ignored RDP golden-path / RDPDR smoke stays in e2e.yml.
  rust-rdp-targeted:
    name: RDP targeted (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Pin MSVC host toolchain (explicit)
        if: runner.os == 'Windows'
        shell: pwsh
        run: rustup set default-host x86_64-pc-windows-msvc
      - name: Install Rust toolchain (Linux)
        if: runner.os == 'Linux'
        uses: dtolnay/rust-toolchain@stable
      - name: Install Rust toolchain (Windows MSVC)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc
      - name: Install Linux build prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libssl-dev libdbus-1-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libasound2-dev libudev-dev
      - name: Verify MSVC host active
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rustc -vV
          rustup show active-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo check (-p app --features rdp)
        run: cargo check -p app --features rdp
      - name: cargo test (RDP input goldens)
        run: cargo test -p sorng-rdp --lib input::tests
      - name: cargo test (RDP reconnect regression)
        run: cargo test -p sorng-rdp --test reconnect -- --nocapture
      - name: cargo test (RDPDR deterministic harness)
        run: cargo test -p sorng-rdp --features docker-e2e --test rdpdr_e2e -- --nocapture

  # ── t3-e2: feature-flag cleanup + -D warnings gate (R4) ────────────
  # The two jobs below gate the canonical shipping feature set. Keep this
  # blocking so Rust feature drift cannot pass CI unnoticed.
  rust-check-all-features-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install librdkafka build prerequisites
        # libcurl/sasl/zstd/zlib -dev feed the `kafka-static` cmake build of
        # librdkafka from source (the feature set below uses kafka-static).
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libssl-dev libdbus-1-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libasound2-dev libudev-dev libcurl4-openssl-dev libsasl2-dev libzstd-dev zlib1g-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # `--all-features` is INVALID for this workspace: it simultaneously
      # enables the mutually-exclusive kafka linking modes (`kafka`/
      # `kafka-dynamic` = dynamic-link vs `kafka-static` = cmake-build), which
      # collide at the rdkafka-sys layer, plus other "losing-fork" feature
      # combinations the app is not designed to build together. The canonical
      # shipping set is `--features full` (see release.yml). We check that set
      # here, substituting `kafka-static` for the default dynamic `kafka` so
      # librdkafka is built from source via cmake — version-independent and
      # self-contained on CI (the runner's system librdkafka is too old for the
      # dynamic version probe). Keep this list in sync with the `full` feature
      # in src-tauri/Cargo.toml (only `kafka` -> `kafka-static` differs).
      - name: cargo check (shipping feature set — full, static Kafka)
        run: >-
          cargo check -p app --no-default-features
          --features cert-auth,cloud,collab,db-mongo,db-mssql,db-mysql,db-postgres,db-redis,db-sqlite,kafka-static,logs-json,opkssh-vendored-wrapper,ops,platform,protocol-serial-dynamic,rdp,rdp-mf-decode,rdp-software-decode,rdp-snapshot,script-engine,tls-cert-details,vpn-softether

  rust-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install librdkafka build prerequisites
        # libcurl/sasl/zstd/zlib -dev feed the `kafka-static` cmake build of
        # librdkafka from source (the feature set below uses kafka-static).
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libssl-dev libdbus-1-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libasound2-dev libudev-dev libcurl4-openssl-dev libsasl2-dev libzstd-dev zlib1g-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # See rust-check-all-features-linux above: `--all-features` is invalid
      # (mutually-exclusive kafka linking modes + losing-fork combos). Lint the
      # canonical shipping `full` set instead, with `kafka-static` substituted
      # for the dynamic `kafka` so librdkafka builds from source on CI. `-p app`
      # still lints every workspace crate app pulls in under `full`. Keep the
      # feature list in sync with `full` in src-tauri/Cargo.toml.
      - name: cargo clippy (shipping feature set — full, static Kafka)
        run: >-
          cargo clippy -p app --no-default-features
          --features cert-auth,cloud,collab,db-mongo,db-mssql,db-mysql,db-postgres,db-redis,db-sqlite,kafka-static,logs-json,opkssh-vendored-wrapper,ops,platform,protocol-serial-dynamic,rdp,rdp-mf-decode,rdp-software-decode,rdp-snapshot,script-engine,tls-cert-details,vpn-softether
          --all-targets -- -D warnings

  rolling-release:
    name: Rolling release after exact-source gates
    if: ${{ success() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - docs
      - version
      - format
      - lint
      - test
      - coverage
      - updater-signature-verifier
      - rust-check-linux
      - rust-check-windows
      - rust-opkssh-targeted
      - rust-rdp-targeted
      - rust-check-all-features-linux
      - rust-lint
    permissions:
      actions: read
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      source_sha: ${{ github.sha }}
      mode: rolling
      release_tier: production
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      WINDOWS_CERT_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
