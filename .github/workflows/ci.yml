name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run format
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test -- --run --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coverage
      - name: Report coverage
        run: >-
          node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('coverage/coverage-final.json','utf8'));let total=0,covered=0;for(const f of Object.values(data)){total+=Object.keys(f.statementMap).length;for(const k in f.s){if(f.s[k])covered++;}}const pct=(covered/total*100).toFixed(2);console.log('Coverage: '+pct+'%');"

  # ── Rust workspace check ───────────────────────────────────────────
  # Kafka is off by default. On Windows we exclude `sorng-kafka` entirely
  # because the rdkafka-sys cmake build fails under MSYS64 (see
  # `src-tauri/crates/sorng-kafka/README.md`). On Linux we additionally
  # run with `--features kafka` to cover the Kafka surface area.
  rust-check-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install librdkafka build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo check (default features — no Kafka)
        run: cargo check --workspace --exclude sorng-kafka
      - name: cargo check (--features kafka — static librdkafka build)
        run: cargo check -p app --features kafka
  # MSVC host is REQUIRED on Windows — the GNU host triggers "export ordinal
  # too large" link errors in large crate chains (rdkafka-sys, ironrdp-*,
  # sspi-rs). `windows-latest` runners default to the MSVC host, but we pin
  # it explicitly so a future runner-image change or a contributor's
  # `rustup default stable-x86_64-pc-windows-gnu` on a self-hosted runner
  # cannot silently regress us. See `rust-toolchain.toml` and
  # `README.md` Toolchain section.
  rust-check-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Pin MSVC host toolchain (explicit)
        shell: pwsh
        run: rustup set default-host x86_64-pc-windows-msvc
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy
      - name: Verify MSVC host active
        shell: pwsh
        run: |
          rustc -vV
          rustup show active-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo check (default — Kafka excluded; MSYS64 cmake issue, see crate README)
        run: cargo check --workspace --exclude sorng-kafka

  # ── t8-e19 + t8-e21: wrapped OPKSSH contract + optional staging gate ──
  # Phase E is proceeding under the relaxed dylink recommendation. This
  # lane verifies both the default CLI-fallback contract and the explicit
  # metadata-wrapper build gate, then exercises the staging helper in both
  # disabled and enabled modes so Tauri resource-copy truth stays aligned
  # with the optional bundle contract.
  rust-opkssh-targeted:
    name: OPKSSH targeted (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      SORNG_OPKSSH_VENDOR_CHECKOUT: ${{ github.workspace }}/.ci/opkssh-source
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Check out pinned OPKSSH source (193d79871f3bad3cd27cfb94734c265773a99c9b)
        uses: actions/checkout@v4
        with:
          repository: openpubkey/opkssh
          ref: 193d79871f3bad3cd27cfb94734c265773a99c9b
          fetch-depth: 1
          path: .ci/opkssh-source
      - name: Install Go toolchain for embedded OPKSSH bridge
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache-dependency-path: .ci/opkssh-source/go.sum
      - name: Pin MSVC host toolchain (explicit)
        if: runner.os == 'Windows'
        shell: pwsh
        run: rustup set default-host x86_64-pc-windows-msvc
      - name: Install Rust toolchain (non-Windows)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable
      - name: Install Rust toolchain (Windows MSVC)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc
      - name: Verify MSVC host active
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rustc -vV
          rustup show active-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo test (OPKSSH default wrapper contract)
        run: cargo test -p sorng-opkssh --tests -- --nocapture
      - name: cargo test (OPKSSH vendored-wrapper feature contract)
        run: cargo test -p sorng-opkssh --tests --features vendored-wrapper -- --nocapture
      - name: cargo check (app feature forwards OPKSSH vendored wrapper)
        run: cargo check -p app --features opkssh-vendored-wrapper
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: verify OPKSSH vendor staging defaults to disabled cleanup
        run: node ../scripts/stage-opkssh-vendor.mjs --disable
      - name: stage OPKSSH vendor artifact into the Tauri resource tree
        run: node ../scripts/stage-opkssh-vendor.mjs --enable

  # ── t7-e19: targeted RDP gate across Linux + Windows ───────────────
  # This keeps the Phase C RDP surface blocking in normal CI without
  # depending on Docker: explicit app `rdp` feature build, input PDU
  # goldens, reconnect regression, and the deterministic RDPDR harness.
  # The live ignored RDP golden-path / RDPDR smoke stays in e2e.yml.
  rust-rdp-targeted:
    name: RDP targeted (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Pin MSVC host toolchain (explicit)
        if: runner.os == 'Windows'
        shell: pwsh
        run: rustup set default-host x86_64-pc-windows-msvc
      - name: Install Rust toolchain (Linux)
        if: runner.os == 'Linux'
        uses: dtolnay/rust-toolchain@stable
      - name: Install Rust toolchain (Windows MSVC)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc
      - name: Install Linux build prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libssl-dev
      - name: Verify MSVC host active
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rustc -vV
          rustup show active-toolchain
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo check (-p app --features rdp)
        run: cargo check -p app --features rdp
      - name: cargo test (RDP input goldens)
        run: cargo test -p sorng-rdp --lib input::tests
      - name: cargo test (RDP reconnect regression)
        run: cargo test -p sorng-rdp --test reconnect -- --nocapture
      - name: cargo test (RDPDR deterministic harness)
        run: cargo test -p sorng-rdp --features docker-e2e --test rdpdr_e2e -- --nocapture

  # ── t3-e2: feature-flag cleanup + -D warnings gate (R4) ────────────
  # The two jobs below are owned by executor t3-e2 and are DISJOINT
  # from t3-e1's windows-check job above. They are currently allowed
  # to fail (continue-on-error) while P2 cleanup executors (F5 vpn
  # warnings, t3-e9..e14 todo!-cleanup) land; the goal is to make them
  # blocking once the workspace is clean. Remove continue-on-error
  # when the Acceptance rows for t3-e2 flip to green locally.
  rust-check-all-features-linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install librdkafka build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libssl-dev librdkafka-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo check (--workspace --all-features --exclude sorng-kafka)
        run: cargo check --workspace --all-features --exclude sorng-kafka

  rust-lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: src-tauri
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install librdkafka build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libssl-dev librdkafka-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo clippy (--workspace --all-targets --all-features -D warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
