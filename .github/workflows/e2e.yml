name: Docker e2e (nightly)

# t3-e30 — Docker e2e nightly gating (R7).
#
# Spins up the full protocol compose stack (SSH, SFTP, RDP, VNC, HTTP,
# MySQL, FTP from e2e/docker-compose.yml + SMB and SoftEther from
# docker/compose.e2e.yml) and runs the `#[ignore]`-gated Rust
# integration tests from t3-e6 (SSH + SFTP), t3-e7 (SMB + RDP + VNC),
# and t3-e8 (SoftEther, under `vpn-softether,docker-e2e` features).
#
# Trigger:
#   - schedule: nightly at 03:00 UTC
#   - push: post-merge gate on `main`
#   - workflow_dispatch: manual run
#   - pull_request with the `e2e` label (opt-in per-PR run)

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main]
  workflow_dispatch: {}
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  # Shared credentials consumed by both compose files and by the Rust
  # test binaries via std::env::var.
  SSH_USER: testuser
  SSH_PASSWORD: testpass
  VNC_PASSWORD: testpass
  MYSQL_ROOT_PASSWORD: rootpass
  MYSQL_USER: testuser
  MYSQL_PASSWORD: testpass
  FTP_USER: testuser
  FTP_PASSWORD: testpass
  FTP_TEST_HOST: 127.0.0.1
  FTP_TEST_PORT: "2121"
  FTP_TEST_USER: testuser
  FTP_TEST_PASSWORD: testpass
  RDP_HOST: 127.0.0.1
  RDP_PORT: "13389"
  RDP_USER: ubuntu
  RDP_PASSWORD: ubuntu
  SMB_HOST: 127.0.0.1
  SMB_PORT: "1445"
  SMB_USER: sorngtest
  SMB_PASSWORD: sorngpass
  SMB_SHARE: public
  SOFTETHER_USER: testuser
  SOFTETHER_PASSWORD: testpass123
  SOFTETHER_ADMIN_PWD: test-admin-pwd-CHANGE-ME
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  e2e:
    name: Docker e2e suite
    # Gate PR-triggered runs on the `e2e` label; scheduled + manual runs
    # always execute.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: e2e-nightly

      - name: Install apt deps (Tauri + openssl + pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libsamba-policy-dev || true

      # ── t8-e19: wrapped-contract + packaging-truthfulness smoke ────
      # Keep nightly/manual evidence aligned with the relaxed dylink ADR:
      # the current product path is the wrapped Rust seam plus CLI fallback,
      # not a bundled OPKSSH shared-library artifact.
      - name: OPKSSH wrapped-contract smoke (t8-e19)
        id: test-opkssh-contract
        continue-on-error: true
        working-directory: src-tauri
        run: |
          cargo test -p sorng-opkssh --tests -- --nocapture \
            2>&1 | tee ../e2e-opkssh-contract.log

      - name: Prepare compose .env
        working-directory: e2e
        run: |
          cat > .env <<'EOF'
          SSH_USER=${{ env.SSH_USER }}
          SSH_PASSWORD=${{ env.SSH_PASSWORD }}
          VNC_PASSWORD=${{ env.VNC_PASSWORD }}
          MYSQL_ROOT_PASSWORD=${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_USER=${{ env.MYSQL_USER }}
          MYSQL_PASSWORD=${{ env.MYSQL_PASSWORD }}
          FTP_USER=${{ env.FTP_USER }}
          FTP_PASSWORD=${{ env.FTP_PASSWORD }}
          SMB_USER=${{ env.SMB_USER }}
          SMB_PASSWORD=${{ env.SMB_PASSWORD }}
          SMB_SHARE=${{ env.SMB_SHARE }}
          SOFTETHER_USER=${{ env.SOFTETHER_USER }}
          SOFTETHER_PASSWORD=${{ env.SOFTETHER_PASSWORD }}
          SOFTETHER_ADMIN_PWD=${{ env.SOFTETHER_ADMIN_PWD }}
          EOF

      - name: Docker compose up (all services)
        run: |
          docker compose \
            -f e2e/docker-compose.yml \
            -f docker/compose.e2e.yml \
            --env-file e2e/.env \
            up -d

      - name: Wait for service healthchecks
        run: |
          # Give the heaviest services (xrdp, SoftEther, MySQL) time to
          # settle. SoftEther's entrypoint re-provisions on first boot.
          for i in $(seq 1 30); do
            unhealthy=$(docker ps --filter health=unhealthy --format '{{.Names}}' || true)
            starting=$(docker ps --filter health=starting --format '{{.Names}}' || true)
            if [ -z "$unhealthy" ] && [ -z "$starting" ]; then
              echo "All services healthy."
              docker ps
              exit 0
            fi
            echo "waiting... unhealthy='$unhealthy' starting='$starting'"
            sleep 10
          done
          echo "::error::services did not become healthy within budget"
          docker ps
          exit 1

      # ── t3-e6: SSH + SFTP golden path ───────────────────────────────
      - name: SSH golden path (t3-e6)
        id: test-ssh
        continue-on-error: true
        working-directory: src-tauri
        run: |
          cargo test -p sorng-ssh --features docker-e2e \
            --test golden_path -- --include-ignored --nocapture \
            2>&1 | tee ../e2e-ssh.log

      - name: SFTP golden path (t3-e6)
        id: test-sftp
        continue-on-error: true
        working-directory: src-tauri
        run: |
          cargo test -p sorng-sftp --features docker-e2e \
            --test golden_path -- --include-ignored --nocapture \
            2>&1 | tee ../e2e-sftp.log

      # ── t3-e7: SMB + RDP + VNC golden path ─────────────────────────
      # t3-e7 intentionally did NOT add a docker-e2e feature to these
      # crates (see logs/t3-e7.md "Deviation" section); `#[ignore]` is
      # the sole gate. Use --ignored here.
      - name: SMB golden path (t3-e7)
        id: test-smb
        continue-on-error: true
        working-directory: src-tauri
        run: |
          cargo test -p sorng-smb --test golden_path \
            -- --ignored --nocapture 2>&1 | tee ../e2e-smb.log

      - name: RDP golden path (t3-e7)
        id: test-rdp
        working-directory: src-tauri
        run: |
          cargo test -p sorng-rdp --test golden_path \
            -- --ignored --nocapture 2>&1 | tee ../e2e-rdp.log

      - name: RDPDR live smoke (t7-e16)
        if: always()
        id: test-rdpdr-live
        working-directory: src-tauri
        run: |
          cargo test -p sorng-rdp --features docker-e2e \
            --test rdpdr_e2e live_rdpdr_docker_harness \
            -- --ignored --nocapture --test-threads=1 \
            2>&1 | tee ../e2e-rdpdr-live.log

      - name: VNC golden path (t3-e7)
        if: always()
        id: test-vnc
        continue-on-error: true
        working-directory: src-tauri
        run: |
          cargo test -p sorng-vnc --test golden_path \
            -- --ignored --nocapture 2>&1 | tee ../e2e-vnc.log

      # ── t3-e8: SoftEther e2e ───────────────────────────────────────
      - name: SoftEther e2e (t3-e8)
        if: always()
        id: test-softether
        continue-on-error: true
        working-directory: src-tauri
        run: |
          cargo test -p sorng-vpn --features vpn-softether,docker-e2e \
            --test softether_e2e -- --include-ignored --nocapture \
            --test-threads=1 2>&1 | tee ../e2e-softether.log

      # ── t3-e5: FTP wiring smoke ───────────────────────────────────
      - name: FTP wire smoke (t3-e5)
        if: always()
        id: test-ftp
        continue-on-error: true
        working-directory: src-tauri
        run: |
          cargo test -p sorng-ftp --features docker-e2e \
            --test golden_path -- --include-ignored --nocapture \
            2>&1 | tee ../e2e-ftp.log

      # ── Artifacts + failure capture ────────────────────────────────
      - name: Collect container logs (always)
        if: always()
        run: |
          mkdir -p container-logs
          for c in $(docker compose -f e2e/docker-compose.yml -f docker/compose.e2e.yml ps -q); do
            name=$(docker inspect --format '{{.Name}}' "$c" | sed 's|^/||')
            docker logs "$c" > "container-logs/${name}.log" 2>&1 || true
          done
          docker ps -a > container-logs/_docker-ps.txt || true

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-output
          path: |
            e2e-opkssh-contract.log
            e2e-ssh.log
            e2e-sftp.log
            e2e-smb.log
            e2e-rdp.log
            e2e-rdpdr-live.log
            e2e-vnc.log
            e2e-softether.log
            e2e-ftp.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload container logs (on failure or schedule)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-container-logs
          path: container-logs/
          if-no-files-found: warn
          retention-days: 14

      - name: Docker compose down
        if: always()
        run: |
          docker compose \
            -f e2e/docker-compose.yml \
            -f docker/compose.e2e.yml \
            down -v --remove-orphans || true

      - name: Aggregate test outcomes
        if: always()
        run: |
          echo "## t3-e30 nightly e2e results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| test | outcome |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| opkssh wrapped contract (t8-e19) | ${{ steps.test-opkssh-contract.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ssh (t3-e6) | ${{ steps.test-ssh.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| sftp (t3-e6) | ${{ steps.test-sftp.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| smb (t3-e7) | ${{ steps.test-smb.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| rdp (t3-e7) | ${{ steps.test-rdp.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| rdpdr live (t7-e16) | ${{ steps.test-rdpdr-live.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| vnc (t3-e7) | ${{ steps.test-vnc.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| softether (t3-e8) | ${{ steps.test-softether.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ftp (t3-e5) | ${{ steps.test-ftp.outcome }} |" >> $GITHUB_STEP_SUMMARY
          # Fail the job if any test step failed.
          fails=0
          for o in \
            "${{ steps.test-opkssh-contract.outcome }}" \
            "${{ steps.test-ssh.outcome }}" \
            "${{ steps.test-sftp.outcome }}" \
            "${{ steps.test-smb.outcome }}" \
            "${{ steps.test-rdp.outcome }}" \
            "${{ steps.test-rdpdr-live.outcome }}" \
            "${{ steps.test-vnc.outcome }}" \
            "${{ steps.test-softether.outcome }}" \
            "${{ steps.test-ftp.outcome }}"; do
            if [ "$o" = "failure" ]; then fails=$((fails+1)); fi
          done
          if [ "$fails" -gt 0 ]; then
            echo "::error::$fails e2e test step(s) failed"
            exit 1
          fi
