name: Backend Coverage

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Backend (Rust) physical-line coverage gates for the sorng workspace.
#
# The f629 baseline artifact (run 29742258784) reported 24.66% by summing LF/LH
# records, but that double-counted Rust sources reached through multiple
# `#[path]` spellings. Canonicalizing paths and unioning physical file+line DA
# records measures 25.83%, so 25.5% is the whole-workspace non-regression floor.
# The original 40% bar remains enforced for the combined critical runtime scope:
# src-tauri/src, sorng-vpn/src, and sorng-rdp/src. Raise either ratchet only with
# measured evidence; command, service, and integration code stays in scope.
# Kafka is excluded to stay consistent with `ci.yml` (rdkafka-sys/cmake on
# Windows; feature-gated elsewhere). See src-tauri/crates/sorng-kafka/README.md.

jobs:
  backend-coverage:
    name: cargo-llvm-cov (workspace, kafka excluded)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    env:
      WORKSPACE_COVERAGE_THRESHOLD: "25.5"
      CRITICAL_RUNTIME_COVERAGE_THRESHOLD: "40"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install librdkafka build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential pkg-config libssl-dev libdbus-1-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libasound2-dev libudev-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Test physical-line LCOV checker
        run: node --test ../tests/tooling/backendCoverageChecker.node-test.mjs

      - name: Generate lcov coverage report
        run: cargo llvm-cov --workspace --exclude sorng-kafka --lcov --output-path coverage.lcov

      - name: Upload lcov artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-lcov
          path: src-tauri/coverage.lcov

      - name: Enforce physical-line coverage ratchets
        run: >-
          node ../scripts/ci/check-backend-coverage.mjs coverage.lcov
          --workspace-threshold "$WORKSPACE_COVERAGE_THRESHOLD"
          --critical-threshold "$CRITICAL_RUNTIME_COVERAGE_THRESHOLD"
