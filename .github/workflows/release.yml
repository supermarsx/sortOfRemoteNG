name: Rolling Release

on:
  workflow_call:
    inputs:
      source_sha:
        description: "Exact successful main commit to release"
        required: true
        type: string
      mode:
        description: "rolling allocates/reuses by source; existing recovers an explicit tag"
        required: true
        type: string
      release_tier:
        description: "production publishes; staging/dry-run only validate existing snapshots"
        required: true
        type: string
      tag:
        description: "Bare YY.N tag required only in existing mode"
        required: false
        default: ""
        type: string
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        required: false
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: false
      APPLE_CERT_P12_BASE64:
        required: false
      APPLE_CERT_PASSWORD:
        required: false
      APPLE_ID:
        required: false
      APPLE_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false
      WINDOWS_CERT_THUMBPRINT:
        required: false
  workflow_dispatch:
    inputs:
      source_sha:
        description: "Exact successful main commit to release or recover"
        required: true
        type: string
      mode:
        description: "Release allocation/recovery mode"
        required: true
        type: choice
        default: existing
        options:
          - existing
          - rolling
      release_tier:
        description: "Publication tier"
        required: true
        type: choice
        default: production
        options:
          - production
          - staging
          - dry-run
      tag:
        description: "Bare YY.N tag (required in existing mode)"
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: rolling-release
  # GitHub supports queue:max; the repository actionlint config narrowly
  # suppresses the older v1.7.12 schema diagnostic for this exact key.
  queue: max
  cancel-in-progress: false

env:
  RELEASE_FEATURES: >-
    cert-auth,cloud,collab,db-mongo,db-mssql,db-mysql,db-postgres,db-redis,db-sqlite,kafka-static,logs-json,opkssh-vendored-wrapper,ops,platform,protocol-serial-dynamic,rdp,rdp-mf-decode,rdp-software-decode,rdp-snapshot,script-engine,tls-cert-details,vpn-softether
  FLATPAK_APP_ID: com.sortofremote.ng
  FLATPAK_BUILDER_PACKAGE: 1.4.2-1build2
  FLATPAK_BUILDER_VERSION: 1.4.2
  FLATPAK_MANIFEST: packaging/flatpak/com.sortofremote.ng.yml
  FLATPAK_RUNTIME_ID: org.gnome.Platform
  FLATPAK_RUNTIME_VERSION: "50"
  FLATPAK_SDK_ID: org.gnome.Sdk
  FLATHUB_REPOSITORY: https://dl.flathub.org/repo/flathub.flatpakrepo
  LINUX_PACKAGE_MAIN_BINARY: app
  LINUX_PACKAGE_PRODUCT_NAME: sortOfRemoteNG
  LINUX_STANDARD_RUNNER_DISK_GIB: "14"

jobs:
  metadata:
    name: Gate source and resolve rolling identity
    runs-on: ubuntu-latest
    timeout-minutes: 100
    permissions:
      actions: read
      contents: write
    outputs:
      machine_version: ${{ steps.release_version.outputs.machine_version }}
      public_tag: ${{ steps.release_version.outputs.public_tag }}
      public_version: ${{ steps.release_version.outputs.public_version }}
      release_action: ${{ steps.release_version.outputs.release_action }}
      source_guard: ${{ steps.release_version.outputs.source_guard }}
      latest_released_source: ${{ steps.release_version.outputs.latest_released_source }}
      latest_release_tag: ${{ steps.release_version.outputs.latest_release_tag }}
      snapshot_commit: ${{ steps.verify_snapshot.outputs.snapshot_commit }}
      snapshot_tree: ${{ steps.verify_snapshot.outputs.snapshot_tree }}
      source_sha: ${{ steps.verify_snapshot.outputs.source_sha }}
      updater_enabled: ${{ steps.updater.outputs.enabled }}
    steps:
      - name: Validate exact source SHA shape before checkout
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          if [[ ! "$SOURCE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::source_sha must be a full 40-character commit SHA."
            exit 1
          fi

      - name: Checkout the exact source commit
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node toolchain
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Validate invocation contract
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          RELEASE_TIER: ${{ inputs.release_tier }}
          REQUESTED_TAG: ${{ inputs.tag }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          case "$MODE" in
            rolling|existing) ;;
            *) echo "::error::mode must be rolling or existing."; exit 1 ;;
          esac
          case "$RELEASE_TIER" in
            production|staging|dry-run) ;;
            *) echo "::error::release_tier must be production, staging, or dry-run."; exit 1 ;;
          esac
          if [ "$MODE" = "existing" ] && [ -z "$REQUESTED_TAG" ]; then
            echo "::error::existing mode requires the bare YY.N tag input."
            exit 1
          fi
          if [ "$MODE" = "rolling" ] && [ -n "$REQUESTED_TAG" ]; then
            echo "::error::rolling mode allocates the tag; leave tag empty."
            exit 1
          fi
          if [ "$MODE" = "rolling" ] && [ "$RELEASE_TIER" != "production" ]; then
            echo "::error::rolling mode is production-only; validation tiers must recover an existing tag."
            exit 1
          fi
          if ! git merge-base --is-ancestor "$SOURCE_SHA" origin/main; then
            echo "::error::source_sha must be a commit on main."
            exit 1
          fi

      - name: Wait for exact-source release gates
        id: readiness
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: >-
          node scripts/ci/wait-for-release-readiness.mjs
          --repo "$GITHUB_REPOSITORY"
          --source-sha "$SOURCE_SHA"
          --github-output "$GITHUB_OUTPUT"

      - name: Resolve bare rolling release identity
        id: release_version
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          REQUESTED_TAG: ${{ inputs.tag }}
          SOURCE_SHA: ${{ steps.readiness.outputs.source_sha }}
        run: |
          set -euo pipefail
          args=(
            --source-sha "$SOURCE_SHA"
            --repo .
            --github-output "$GITHUB_OUTPUT"
          )
          if [ "$MODE" = "existing" ]; then
            args+=(--tag "$REQUESTED_TAG")
          fi
          node scripts/ci/resolve-release-version.mjs "${args[@]}"

      - name: Detect protected updater signing key
        id: updater
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY//[[:space:]]/}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Signed updater artifacts and latest.json are enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No updater key is configured. Public installers will be released without updater signatures or latest.json."
          fi

      - name: Install updater-key verification toolchain
        if: steps.updater.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Install protected signing CLI
        if: steps.updater.outputs.enabled == 'true'
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Sign updater trust challenge
        if: steps.updater.outputs.enabled == 'true'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          printf 'sortOfRemoteNG updater trust challenge\n' > "$RUNNER_TEMP/updater-key-challenge"
          npx --no-install tauri signer sign "$RUNNER_TEMP/updater-key-challenge"
          test -s "$RUNNER_TEMP/updater-key-challenge.sig"

      - name: Verify updater key matches embedded public key
        if: steps.updater.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          public_key=$(jq -er '.plugins.updater.pubkey | select(type == "string" and length > 0)' src-tauri/tauri.conf.json)
          cargo run --quiet --locked --manifest-path src-tauri/Cargo.toml \
            -p sorng-updater-signature-verifier -- \
            "$public_key" \
            "$RUNNER_TEMP/updater-key-challenge" \
            "$RUNNER_TEMP/updater-key-challenge.sig"
          rm -f "$RUNNER_TEMP/updater-key-challenge" "$RUNNER_TEMP/updater-key-challenge.sig"

      - name: Create or reuse immutable release snapshot
        id: snapshot
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MACHINE_VERSION: ${{ steps.release_version.outputs.machine_version }}
          PUBLIC_TAG: ${{ steps.release_version.outputs.public_tag }}
          PUBLIC_VERSION: ${{ steps.release_version.outputs.public_version }}
          RELEASE_ACTION: ${{ steps.release_version.outputs.release_action }}
          RESOLVED_SNAPSHOT: ${{ steps.release_version.outputs.snapshot_commit }}
          SOURCE_SHA: ${{ steps.readiness.outputs.source_sha }}
          SOURCE_GUARD: ${{ steps.release_version.outputs.source_guard }}
        run: |
          set -euo pipefail
          if [ "$SOURCE_GUARD" != "passed" ]; then
            echo "::error::Monotonic release source guard did not pass; refusing tag mutation."
            exit 1
          fi
          if [ "$RELEASE_ACTION" = "reuse" ]; then
            test -n "$RESOLVED_SNAPSHOT"
            echo "snapshot_commit=$RESOLVED_SNAPSHOT" >> "$GITHUB_OUTPUT"
            echo "Reusing $PUBLIC_TAG at $RESOLVED_SNAPSHOT for source $SOURCE_SHA."
            exit 0
          fi
          if [ "$RELEASE_ACTION" != "create" ]; then
            echo "::error::Unknown release action $RELEASE_ACTION."
            exit 1
          fi

          node scripts/sync-version.mjs --write --version "$PUBLIC_VERSION"
          node scripts/sync-version.mjs --check
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --allow-empty --no-gpg-sign \
            -m "chore(release): snapshot $PUBLIC_TAG" \
            -m "Release-Source-SHA: $SOURCE_SHA"
          snapshot_commit=$(git rev-parse HEAD)
          git update-ref \
            "refs/tags/$PUBLIC_TAG" \
            "$snapshot_commit" \
            "0000000000000000000000000000000000000000"
          node scripts/ci/verify-release-snapshot.mjs \
            --repo . \
            --tag "$PUBLIC_TAG" \
            --snapshot-commit "$snapshot_commit" \
            --source-sha "$SOURCE_SHA" \
            --public-version "$PUBLIC_VERSION"
          basic_auth=$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $basic_auth" \
            push origin "refs/tags/$PUBLIC_TAG:refs/tags/$PUBLIC_TAG"
          unset basic_auth
          echo "snapshot_commit=$snapshot_commit" >> "$GITHUB_OUTPUT"
          echo "Created $PUBLIC_TAG at $snapshot_commit for source $SOURCE_SHA ($MACHINE_VERSION)."

      - name: Verify immutable release snapshot integrity
        id: verify_snapshot
        shell: bash
        env:
          PUBLIC_TAG: ${{ steps.release_version.outputs.public_tag }}
          PUBLIC_VERSION: ${{ steps.release_version.outputs.public_version }}
          SNAPSHOT_COMMIT: ${{ steps.snapshot.outputs.snapshot_commit }}
          SOURCE_SHA: ${{ steps.readiness.outputs.source_sha }}
        run: >-
          node scripts/ci/verify-release-snapshot.mjs
          --repo .
          --tag "$PUBLIC_TAG"
          --snapshot-commit "$SNAPSHOT_COMMIT"
          --source-sha "$SOURCE_SHA"
          --public-version "$PUBLIC_VERSION"
          --github-output "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.artifact_id }}
    needs: metadata
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_id: linux-x86_64
            os: ubuntu-24.04
            platform: linux
            rust_target: x86_64-unknown-linux-gnu
            rust_toolchain: "stable"
            bundles: appimage,deb,rpm
            cargo_build_jobs: "1"
            release_lto: "off"
            release_codegen_units: "16"
            release_opt_level: "0"
          - artifact_id: linux-aarch64
            os: ubuntu-24.04-arm
            platform: linux
            rust_target: aarch64-unknown-linux-gnu
            rust_toolchain: "stable"
            bundles: appimage,deb,rpm
            cargo_build_jobs: "1"
            release_lto: "off"
            release_codegen_units: "16"
            release_opt_level: "0"
          - artifact_id: darwin-aarch64
            os: macos-15
            platform: macos
            rust_target: aarch64-apple-darwin
            rust_toolchain: "stable"
            bundles: dmg,app
            cargo_build_jobs: "1"
            release_lto: "off"
            release_codegen_units: "32"
            release_opt_level: "0"
          - artifact_id: darwin-x86_64
            os: macos-15-intel
            platform: macos
            rust_target: x86_64-apple-darwin
            rust_toolchain: "stable"
            bundles: dmg,app
            cargo_build_jobs: "1"
            release_lto: "off"
            release_codegen_units: "32"
            release_opt_level: "0"
          - artifact_id: windows-x86_64
            os: windows-2022
            platform: windows
            rust_target: x86_64-pc-windows-msvc
            # Hosted stable advanced to 1.97.1 and produced an app archive that
            # MSVC rejected with LNK4003. The production-equivalent archive
            # generated by 1.95.0 linked successfully with the same MSVC 14.44
            # toolset, so keep the distributed Windows compiler deterministic.
            rust_toolchain: "1.95.0"
            bundles: msi,nsis
            cargo_build_jobs: "1"
            release_lto: "off"
            release_codegen_units: "16"
            release_opt_level: "0"
            windows_sdk_arch: x64
          - artifact_id: windows-aarch64
            os: windows-11-arm
            platform: windows
            rust_target: aarch64-pc-windows-msvc
            rust_toolchain: "1.95.0"
            bundles: msi,nsis
            cargo_build_jobs: "1"
            release_lto: "off"
            release_codegen_units: "16"
            release_opt_level: "0"
            windows_sdk_arch: arm64
    runs-on: ${{ matrix.os }}
    env:
      # This wins over the repository's `stable` rust-toolchain.toml directory
      # override, so the Windows matrix pin also governs plain cargo/rustc calls.
      RUSTUP_TOOLCHAIN: ${{ matrix.rust_toolchain }}
      # QuickJS calls the POSIX spelling `alloca`, while MSVC ARM64 exposes the
      # stack-allocation intrinsic as `_alloca`. Use the compiler-neutral `-D`
      # spelling because this target also builds ring assembly with clang.
      CFLAGS_aarch64_pc_windows_msvc: -Dalloca=_alloca
      # The checked-in Cargo config is tuned for a 200 GB workstation. Hosted
      # release builds use bounded LLVM profiles instead:
      # Linux splits final codegen into 16 smaller units after repeated
      # 90-minute single-CGU builds ended in runner loss; it retains one job.
      # Windows also uses split codegen after a direct LLVM allocation failure
      # in the final app crate. Both macOS runners use 32 unoptimized units after
      # the arm64 final app crate was SIGKILLed with opt-level 1 and 16 units.
      CARGO_BUILD_JOBS: ${{ matrix.cargo_build_jobs }}
      CARGO_PROFILE_RELEASE_LTO: ${{ matrix.release_lto }}
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: ${{ matrix.release_codegen_units }}
      CARGO_PROFILE_RELEASE_OPT_LEVEL: ${{ matrix.release_opt_level }}
      SORNG_OPKSSH_VENDOR_CHECKOUT: ${{ github.workspace }}/.ci/opkssh-source
    steps:
      - name: Checkout immutable release snapshot
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ needs.metadata.outputs.snapshot_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node toolchain
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: ${{ matrix.rust_toolchain }}
          targets: ${{ matrix.rust_target }}

      - name: Verify pinned Windows release compiler
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          EXPECTED_RUST_HOST: ${{ matrix.rust_target }}
          EXPECTED_RUST_RELEASE: ${{ matrix.rust_toolchain }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = @(& rustc --version --verbose)
          if ($LASTEXITCODE -ne 0) {
            throw "rustc --version --verbose failed with exit code $LASTEXITCODE."
          }
          $version | ForEach-Object { Write-Host $_ }

          $release = @($version | Where-Object { $_ -match '^release:\s+' })
          $hostLines = @($version | Where-Object { $_ -match '^host:\s+' })
          if ($release.Count -ne 1 -or $hostLines.Count -ne 1) {
            throw "rustc did not report exactly one release and host."
          }
          $actualRelease = $release[0] -replace '^release:\s+', ''
          $actualHost = $hostLines[0] -replace '^host:\s+', ''
          if ($actualRelease -ne $env:EXPECTED_RUST_RELEASE) {
            throw "Expected rustc $env:EXPECTED_RUST_RELEASE, found $actualRelease."
          }
          if ($actualHost -ne $env:EXPECTED_RUST_HOST) {
            throw "Expected the MSVC release host $env:EXPECTED_RUST_HOST, found $actualHost."
          }

      - name: Check out pinned OPKSSH source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          repository: openpubkey/opkssh
          ref: 193d79871f3bad3cd27cfb94734c265773a99c9b
          fetch-depth: 1
          persist-credentials: false
          path: .ci/opkssh-source

      - name: Install Go toolchain for embedded OPKSSH bridge
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24.12"
          cache-dependency-path: .ci/opkssh-source/go.sum

      - name: Cache Cargo build
        if: matrix.platform != 'linux'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target
          key: release-${{ matrix.rust_target }}

      - name: Install native Linux build prerequisites
        if: matrix.platform == 'linux'
        run: >-
          sudo apt-get update && sudo apt-get install -y
          cmake build-essential pkg-config libssl-dev libdbus-1-dev
          libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
          librsvg2-dev libsoup-3.0-dev libasound2-dev libudev-dev
          libcurl4-openssl-dev libsasl2-dev libzstd-dev zlib1g-dev patchelf
          cpio rpm

      - name: Install macOS static Kafka prerequisites
        if: matrix.platform == 'macos'
        run: brew install cmake pkg-config openssl@3

      - name: Install JavaScript dependencies
        run: npm ci --no-audit --no-fund

      - name: Check macOS Developer ID signing inputs
        id: macos_signing
        if: matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          for name in APPLE_CERT_P12_BASE64 APPLE_CERT_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            value="${!name:-}"
            [ -n "${value//[[:space:]]/}" ] || missing+=("$name")
          done
          if [ "${#missing[@]}" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::macOS Developer ID signing/notarization disabled; missing: ${missing[*]}."
          fi

      - name: Import Apple Developer ID certificate
        id: apple_certificate
        if: matrix.platform == 'macos' && steps.macos_signing.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/release.keychain-db"
          password=$(openssl rand -base64 24)
          certificate="$RUNNER_TEMP/release.p12"
          printf '%s' "$APPLE_CERT_P12_BASE64" | base64 --decode > "$certificate"
          security create-keychain -p "$password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$password" "$keychain"
          security import "$certificate" -P "$APPLE_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$password" "$keychain"
          security list-keychain -d user -s "$keychain" $(security list-keychains -d user | tr -d '"')
          identity=$(security find-identity -v -p codesigning "$keychain" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)
          test -n "$identity"
          echo "identity=$identity" >> "$GITHUB_OUTPUT"
          rm -f "$certificate"

      - name: Check Windows Authenticode signing input
        id: windows_signing
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          WINDOWS_CERT_THUMBPRINT: ${{ secrets.WINDOWS_CERT_THUMBPRINT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_THUMBPRINT)) {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Warning "Windows Authenticode signing disabled; WINDOWS_CERT_THUMBPRINT is absent."
          } else {
            # MMC and certificate-provider copy operations commonly introduce
            # spaces, separators, or an invisible left-to-right mark. Compare
            # the canonical 40-hex SHA-1 thumbprint only.
            $thumbprint = ($env:WINDOWS_CERT_THUMBPRINT -replace '[^0-9A-Fa-f]', '').ToUpperInvariant()
            if ($thumbprint -notmatch '^[0-9A-F]{40}$') {
              throw "WINDOWS_CERT_THUMBPRINT must normalize to exactly 40 hexadecimal characters."
            }
            $certificate = Get-ChildItem Cert:\CurrentUser\My | Where-Object {
              (($_.Thumbprint -replace '[^0-9A-Fa-f]', '').ToUpperInvariant()) -eq $thumbprint
            } | Select-Object -First 1
            if (-not $certificate) {
              throw "WINDOWS_CERT_THUMBPRINT is configured, but no matching certificate is installed in Cert:\CurrentUser\My. Provision the certificate before enabling signing."
            }
            if (-not $certificate.HasPrivateKey) {
              throw "The configured Windows certificate has no accessible private key."
            }
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "thumbprint=$thumbprint" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Configure updater and OS signing
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          UPDATER_ENABLED: ${{ needs.metadata.outputs.updater_enabled }}
          WINDOWS_CERT_THUMBPRINT: ${{ steps.windows_signing.outputs.thumbprint || '' }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const bundle = {
            createUpdaterArtifacts: process.env.UPDATER_ENABLED === "true",
          };
          if (
            process.env.PLATFORM === "windows" &&
            process.env.WINDOWS_CERT_THUMBPRINT
          ) {
            bundle.windows = {
              certificateThumbprint: process.env.WINDOWS_CERT_THUMBPRINT,
              digestAlgorithm: "sha256",
              timestampUrl: "http://timestamp.digicert.com",
              tsp: true,
            };
          }
          fs.writeFileSync(
            "src-tauri/tauri.release.conf.json",
            JSON.stringify({ bundle }),
          );
          NODE

      - name: Export enabled macOS signing environment
        if: matrix.platform == 'macos' && steps.macos_signing.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple_certificate.outputs.identity }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const names = [
            "APPLE_ID",
            "APPLE_PASSWORD",
            "APPLE_TEAM_ID",
            "APPLE_SIGNING_IDENTITY",
          ];
          const lines = names.map((name) => {
            const value = process.env[name] ?? "";
            if (!value.trim()) {
              throw new Error(`${name} must be nonempty when macOS signing is enabled.`);
            }
            if (/[\r\n]/u.test(value)) {
              throw new Error(`${name} must be a single-line value.`);
            }
            return `${name}=${value}`;
          });
          fs.appendFileSync(
            process.env.GITHUB_ENV,
            `${lines.join("\n")}\n`,
            "utf8",
          );
          NODE

      - name: Bound and inspect Linux release resources
        if: matrix.platform == 'linux'
        shell: bash
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail
          linker_wrapper="$RUNNER_TEMP/sorng-linux-linker"
          linker_probe_source="$RUNNER_TEMP/sorng-linux-linker-probe.c"
          linker_probe_binary="$RUNNER_TEMP/sorng-linux-linker-probe"
          documented_capacity_bytes=$((LINUX_STANDARD_RUNNER_DISK_GIB * 1024 * 1024 * 1024))
          desired_swap_size_bytes=$((16 * 1024 * 1024 * 1024))
          minimum_swap_size_bytes=$((1 * 1024 * 1024 * 1024))
          swap_alignment_bytes=$((1024 * 1024))
          swap_file="$RUNNER_TEMP/sorng-release.swap"
          total_bytes=$(df -B1 --output=size "$RUNNER_TEMP" | tail -n 1 | tr -d '[:space:]')
          available_bytes=$(df -B1 --output=avail "$RUNNER_TEMP" | tail -n 1 | tr -d '[:space:]')
          [[ "$total_bytes" =~ ^[0-9]+$ ]]
          [[ "$available_bytes" =~ ^[0-9]+$ ]]
          test "$documented_capacity_bytes" -eq $((14 * 1024 * 1024 * 1024))
          test "$total_bytes" -gt 0
          test "$available_bytes" -gt 0
          printf 'documented_runner_disk_capacity_bytes=%s\n' "$documented_capacity_bytes"
          printf 'runner_temp_disk_total_bytes=%s\n' "$total_bytes"
          printf 'runner_temp_disk_available_bytes=%s\n' "$available_bytes"

          # Preserve the standard runner's documented disk capacity for build
          # outputs and later Flatpak work. Use only measured surplus capacity
          # for swap, capped at the 16 GiB that kept the final app crate alive
          # in the last successful x86_64 release build.
          disk_floor_bytes=$documented_capacity_bytes
          swappable_bytes=0
          if (( available_bytes > disk_floor_bytes )); then
            swappable_bytes=$((available_bytes - disk_floor_bytes))
          fi
          if (( swappable_bytes > desired_swap_size_bytes )); then
            swappable_bytes=$desired_swap_size_bytes
          fi
          swap_size_bytes=$((swappable_bytes / swap_alignment_bytes * swap_alignment_bytes))
          printf 'linux_release_disk_floor_bytes=%s\n' "$disk_floor_bytes"
          printf 'linux_release_adaptive_swap_bytes=%s\n' "$swap_size_bytes"

          if (( swap_size_bytes >= minimum_swap_size_bytes )); then
            if [ -e "$swap_file" ] || [ -L "$swap_file" ]; then
              echo "::error::Refusing to replace unexpected swap path $swap_file."
              exit 1
            fi
            sudo fallocate -l "$swap_size_bytes" "$swap_file"
            remaining_bytes=$(df -B1 --output=avail "$RUNNER_TEMP" | tail -n 1 | tr -d '[:space:]')
            [[ "$remaining_bytes" =~ ^[0-9]+$ ]]
            if (( remaining_bytes < disk_floor_bytes )); then
              echo "::error::Adaptive swap left $remaining_bytes free bytes, below the measured $disk_floor_bytes-byte floor."
              exit 1
            fi
            sudo chmod 0600 "$swap_file"
            test "$(stat -c '%a' "$swap_file")" = 600
            test "$(stat -c '%s' "$swap_file")" -eq "$swap_size_bytes"
            page_size_bytes=$(getconf PAGESIZE)
            [[ "$page_size_bytes" =~ ^[0-9]+$ ]]
            expected_active_swap_size=$((swap_size_bytes - page_size_bytes))
            sudo mkswap "$swap_file"
            sudo swapon "$swap_file"
            active_swap_size=$(
              sudo swapon --show=NAME,SIZE --bytes --noheadings --raw |
                awk -v path="$swap_file" '$1 == path { print $2 }'
            )
            test "$active_swap_size" -eq "$expected_active_swap_size"
            echo "LINUX_RELEASE_SWAP_FILE=$swap_file" >> "$GITHUB_ENV"
          else
            echo "::warning::Skipping adaptive release swap to preserve the measured $disk_floor_bytes-byte disk floor."
          fi

          command -v clang-18
          command -v ld.lld-18
          /usr/bin/clang-18 --version
          /usr/bin/ld.lld-18 --version

          cat > "$linker_wrapper" <<'LINKER'
          #!/usr/bin/env bash
          set -euo pipefail
          exec /usr/bin/clang-18 -fuse-ld=lld-18 -Wl,--threads=1 "$@"
          LINKER
          chmod 0755 "$linker_wrapper"

          printf '%s\n' 'int main(void) { return 0; }' > "$linker_probe_source"
          linker_probe_output=$(
            "$linker_wrapper" -Wl,-v "$linker_probe_source" -o "$linker_probe_binary" 2>&1
          )
          printf '%s\n' "$linker_probe_output"
          grep -Eq 'LLD 18(\.|[[:space:]])' <<< "$linker_probe_output"
          readelf -h "$linker_probe_binary" | grep -Eq 'Class:[[:space:]]+ELF64'
          "$linker_probe_binary"

          cargo_target_key=${RUST_TARGET^^}
          cargo_target_key=${cargo_target_key//-/_}
          [[ "$cargo_target_key" =~ ^[A-Z0-9_]+$ ]]
          echo "CARGO_TARGET_${cargo_target_key}_LINKER=$linker_wrapper" >> "$GITHUB_ENV"
          free -h
          df -h "$GITHUB_WORKSPACE"

      - name: Inspect Windows release resources
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $operatingSystem = Get-CimInstance -ClassName Win32_OperatingSystem
          $pageFiles = @(Get-CimInstance -ClassName Win32_PageFileUsage)
          $workspaceDriveName = (Get-Item -LiteralPath $env:GITHUB_WORKSPACE).PSDrive.Name + ":"
          $workspaceDrive = Get-CimInstance -ClassName Win32_LogicalDisk |
            Where-Object { $_.DeviceID -eq $workspaceDriveName } |
            Select-Object -First 1
          if (-not $workspaceDrive) {
            throw "Unable to inspect workspace drive $workspaceDriveName."
          }

          Write-Host "physical_total_bytes=$([uint64]$operatingSystem.TotalVisibleMemorySize * 1KB)"
          Write-Host "physical_free_bytes=$([uint64]$operatingSystem.FreePhysicalMemory * 1KB)"
          Write-Host "virtual_total_bytes=$([uint64]$operatingSystem.TotalVirtualMemorySize * 1KB)"
          Write-Host "virtual_free_bytes=$([uint64]$operatingSystem.FreeVirtualMemory * 1KB)"
          Write-Host "workspace_drive=$workspaceDriveName"
          Write-Host "workspace_drive_size_bytes=$([uint64]$workspaceDrive.Size)"
          Write-Host "workspace_drive_free_bytes=$([uint64]$workspaceDrive.FreeSpace)"
          Write-Host "pagefile_count=$($pageFiles.Count)"
          foreach ($pageFile in $pageFiles) {
            Write-Host "pagefile_name=$($pageFile.Name)"
            Write-Host "pagefile_allocated_bytes=$([uint64]$pageFile.AllocatedBaseSize * 1MB)"
            Write-Host "pagefile_current_usage_bytes=$([uint64]$pageFile.CurrentUsage * 1MB)"
            Write-Host "pagefile_peak_usage_bytes=$([uint64]$pageFile.PeakUsage * 1MB)"
          }

      - name: Build native bundles with static Kafka
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ needs.metadata.outputs.updater_enabled == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ needs.metadata.outputs.updater_enabled == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          includeUpdaterJson: false
          tauriScript: npm run tauri
          args: >-
            --target ${{ matrix.rust_target }}
            --bundles ${{ matrix.bundles }}
            --config src-tauri/tauri.release.conf.json
            --features ${{ env.RELEASE_FEATURES }}
            -- --no-default-features

      - name: Preserve native Linux outputs and prune build intermediates
        if: matrix.platform == 'linux'
        shell: bash
        env:
          ARTIFACT_ID: ${{ matrix.artifact_id }}
          RUST_TARGET: ${{ matrix.rust_target }}
          UPDATER_ENABLED: ${{ needs.metadata.outputs.updater_enabled }}
        run: |
          set -euo pipefail
          case "$ARTIFACT_ID" in
            linux-x86_64)
              expected_elf_machine="Advanced Micro Devices X86-64"
              rpm_arch=x86_64
              ;;
            linux-aarch64)
              expected_elf_machine=AArch64
              rpm_arch=aarch64
              ;;
            *)
              echo "::error::Unsupported Linux artifact ID $ARTIFACT_ID."
              exit 1
              ;;
          esac

          target_root=$(realpath -m "$GITHUB_WORKSPACE/src-tauri/target")
          release_root="$target_root/$RUST_TARGET/release"
          executable="$release_root/app"
          bundle="$release_root/bundle"
          payload="$GITHUB_WORKSPACE/.ci/flatpak-payload"
          preserved_bundles="$GITHUB_WORKSPACE/.ci/linux-native-bundles"

          test -x "$executable"
          readelf -h "$executable" | grep -F "Machine:" | grep -F "$expected_elf_machine"
          for staged_path in "$payload" "$preserved_bundles"; do
            if [ -e "$staged_path" ] || [ -L "$staged_path" ]; then
              echo "::error::Refusing to replace unexpected Linux staging path $staged_path."
              exit 1
            fi
          done

          opkssh_source="$GITHUB_WORKSPACE/src-tauri/crates/sorng-opkssh-vendor/bundle/opkssh"
          test -d "$opkssh_source"
          opkssh_file_count=$(find "$opkssh_source" -type f ! -name .gitkeep | wc -l | tr -d '[:space:]')
          [[ "$opkssh_file_count" =~ ^[0-9]+$ ]]
          test "$opkssh_file_count" -gt 0
          mkdir -p "$payload/resources" "$preserved_bundles"
          install -m 0755 "$executable" "$payload/sortOfRemoteNG"
          cp -a "$opkssh_source" "$payload/resources/opkssh"

          preserve_one() {
            local directory="$1" pattern="$2"
            local destination="$preserved_bundles/$directory" source count
            count=$(find "$bundle/$directory" -maxdepth 1 -type f -name "$pattern" | wc -l | tr -d '[:space:]')
            if [ "$count" -ne 1 ]; then
              echo "::error::Expected exactly one $pattern bundle in $bundle/$directory for $ARTIFACT_ID, found $count."
              exit 1
            fi
            source=$(find "$bundle/$directory" -maxdepth 1 -type f -name "$pattern" -print -quit)
            mkdir -p "$destination"
            cp --preserve=mode,timestamps "$source" "$destination/"
            cmp "$source" "$destination/$(basename "$source")"
            if [ "$directory" = appimage ] && [ "$UPDATER_ENABLED" = true ]; then
              test -s "${source}.sig"
              cp --preserve=mode,timestamps "${source}.sig" "$destination/"
              cmp "${source}.sig" "$destination/$(basename "$source").sig"
            fi
          }
          preserve_one appimage '*.AppImage'
          preserve_one deb '*.deb'
          preserve_one rpm '*.rpm'

          for intermediate in \
            "$target_root/$RUST_TARGET/release/build" \
            "$target_root/$RUST_TARGET/release/deps" \
            "$target_root/$RUST_TARGET/release/examples" \
            "$target_root/$RUST_TARGET/release/incremental" \
            "$target_root/$RUST_TARGET/release/.fingerprint" \
            "$target_root/release/build" \
            "$target_root/release/deps" \
            "$target_root/release/examples" \
            "$target_root/release/incremental" \
            "$target_root/release/.fingerprint"
          do
            resolved_intermediate=$(realpath -m "$intermediate")
            case "$resolved_intermediate" in
              "$target_root"/*/release/build | \
                "$target_root"/*/release/deps | \
                "$target_root"/*/release/examples | \
                "$target_root"/*/release/incremental | \
                "$target_root"/*/release/.fingerprint | \
                "$target_root"/release/build | \
                "$target_root"/release/deps | \
                "$target_root"/release/examples | \
                "$target_root"/release/incremental | \
                "$target_root"/release/.fingerprint) ;;
              *)
                echo "::error::Refusing to prune unexpected path $resolved_intermediate."
                exit 1
                ;;
            esac
            if [ -L "$intermediate" ]; then
              echo "::error::Refusing to prune symlinked intermediate path $intermediate."
              exit 1
            fi
            if [ -d "$intermediate" ]; then
              rm -rf -- "$intermediate"
            fi
          done

          test -x "$payload/sortOfRemoteNG"
          test -d "$payload/resources/opkssh"
          test "$(find "$payload/resources/opkssh" -type f ! -name .gitkeep | wc -l | tr -d '[:space:]')" -eq "$opkssh_file_count"
          find "$preserved_bundles" -maxdepth 2 -type f -print
          if [ -n "${LINUX_RELEASE_SWAP_FILE:-}" ]; then
            expected_swap_file="$RUNNER_TEMP/sorng-release.swap"
            test "$LINUX_RELEASE_SWAP_FILE" = "$expected_swap_file"
            test -f "$LINUX_RELEASE_SWAP_FILE"
            test ! -L "$LINUX_RELEASE_SWAP_FILE"
            sudo swapoff "$LINUX_RELEASE_SWAP_FILE"
            sudo rm -f -- "$LINUX_RELEASE_SWAP_FILE"
            test ! -e "$LINUX_RELEASE_SWAP_FILE"
          fi
          df -h "$GITHUB_WORKSPACE"
          echo "LINUX_RPM_ARCH=$rpm_arch" >> "$GITHUB_ENV"

      - name: Install pinned Flatpak toolchain and GNOME runtime
        if: matrix.platform == 'linux'
        shell: bash
        env:
          ARTIFACT_ID: ${{ matrix.artifact_id }}
        run: |
          set -euo pipefail
          sudo apt-get install -y --no-install-recommends \
            appstream \
            flatpak \
            "flatpak-builder=${FLATPAK_BUILDER_PACKAGE}"
          flatpak_builder_version_output=$(flatpak-builder --version)
          printf 'flatpak_builder_version_output=%s\n' "$flatpak_builder_version_output"
          flatpak_builder_version_pattern='^flatpak-builder([[:space:]]+|-)([0-9]+\.[0-9]+\.[0-9]+)([[:space:]]+\(libflatpak version [0-9]+\.[0-9]+\.[0-9]+\))?$'
          if [[ "$flatpak_builder_version_output" == *$'\n'* ]] ||
             [[ ! "$flatpak_builder_version_output" =~ $flatpak_builder_version_pattern ]]; then
            echo "::error::flatpak-builder returned an invalid version string: $flatpak_builder_version_output"
            exit 1
          fi
          actual_flatpak_builder_version=${BASH_REMATCH[2]}
          if [ "$actual_flatpak_builder_version" != "$FLATPAK_BUILDER_VERSION" ]; then
            echo "::error::Expected flatpak-builder $FLATPAK_BUILDER_VERSION, found $actual_flatpak_builder_version."
            exit 1
          fi
          case "$ARTIFACT_ID" in
            linux-x86_64) flatpak_arch=x86_64 ;;
            linux-aarch64) flatpak_arch=aarch64 ;;
            *)
              echo "::error::Unsupported Linux artifact ID $ARTIFACT_ID."
              exit 1
              ;;
          esac
          test "$(flatpak --default-arch)" = "$flatpak_arch"
          flatpak remote-add \
            --user \
            --if-not-exists \
            flathub \
            "$FLATHUB_REPOSITORY"
          flatpak install \
            --user \
            --noninteractive \
            --arch="$flatpak_arch" \
            flathub \
            "$FLATPAK_RUNTIME_ID//$FLATPAK_RUNTIME_VERSION" \
            "$FLATPAK_SDK_ID//$FLATPAK_RUNTIME_VERSION"

          runtime_ref=$(flatpak info \
            --user \
            --show-ref \
            "$FLATPAK_RUNTIME_ID//$FLATPAK_RUNTIME_VERSION")
          sdk_ref=$(flatpak info \
            --user \
            --show-ref \
            "$FLATPAK_SDK_ID//$FLATPAK_RUNTIME_VERSION")
          expected_runtime_ref="runtime/$FLATPAK_RUNTIME_ID/$flatpak_arch/$FLATPAK_RUNTIME_VERSION"
          expected_sdk_ref="runtime/$FLATPAK_SDK_ID/$flatpak_arch/$FLATPAK_RUNTIME_VERSION"
          test "$runtime_ref" = "$expected_runtime_ref"
          test "$sdk_ref" = "$expected_sdk_ref"

          runtime_commit=$(flatpak info \
            --user \
            --show-commit \
            "$FLATPAK_RUNTIME_ID//$FLATPAK_RUNTIME_VERSION")
          sdk_commit=$(flatpak info \
            --user \
            --show-commit \
            "$FLATPAK_SDK_ID//$FLATPAK_RUNTIME_VERSION")
          [[ "$runtime_commit" =~ ^[0-9a-f]{64}$ ]]
          [[ "$sdk_commit" =~ ^[0-9a-f]{64}$ ]]
          {
            echo "FLATPAK_ARCH=$flatpak_arch"
            echo "FLATPAK_RUNTIME_REF=$runtime_ref"
            echo "FLATPAK_RUNTIME_COMMIT=$runtime_commit"
            echo "FLATPAK_SDK_REF=$sdk_ref"
            echo "FLATPAK_SDK_COMMIT=$sdk_commit"
          } >> "$GITHUB_ENV"

      - name: Build and verify native Flatpak bundle
        if: matrix.platform == 'linux'
        shell: bash
        env:
          ARTIFACT_ID: ${{ matrix.artifact_id }}
          MACHINE_VERSION: ${{ needs.metadata.outputs.machine_version }}
        run: |
          set -euo pipefail
          payload="$GITHUB_WORKSPACE/.ci/flatpak-payload"
          test -x "$payload/sortOfRemoteNG"
          test -d "$payload/resources/opkssh"
          test "$(find "$payload/resources/opkssh" -type f ! -name .gitkeep | wc -l | tr -d '[:space:]')" -gt 0

          appstreamcli validate \
            --no-net \
            packaging/flatpak/com.sortofremote.ng.metainfo.xml
          canonical_manifest="$RUNNER_TEMP/sortofremoteng-flatpak-manifest.json"
          flatpak-builder --show-manifest "$FLATPAK_MANIFEST" > "$canonical_manifest"
          jq -e \
            --arg app_id "$FLATPAK_APP_ID" \
            --arg runtime "$FLATPAK_RUNTIME_ID" \
            --arg runtime_version "$FLATPAK_RUNTIME_VERSION" \
            --arg sdk "$FLATPAK_SDK_ID" \
            '
              .id == $app_id and
              .runtime == $runtime and
              ."runtime-version" == $runtime_version and
              .sdk == $sdk and
              .command == "sortOfRemoteNG"
            ' "$canonical_manifest" > /dev/null

          flatpak_build="$RUNNER_TEMP/sortofremoteng-flatpak-build"
          flatpak_repo="$RUNNER_TEMP/sortofremoteng-flatpak-repo"
          for target_path in "$flatpak_build" "$flatpak_repo"; do
            if [ -e "$target_path" ] || [ -L "$target_path" ]; then
              echo "::error::Refusing to replace unexpected Flatpak path $target_path."
              exit 1
            fi
          done
          flatpak-builder \
            --arch="$FLATPAK_ARCH" \
            --default-branch=stable \
            --disable-download \
            --disable-updates \
            --force-clean \
            --repo="$flatpak_repo" \
            --user \
            "$flatpak_build" \
            "$FLATPAK_MANIFEST"

          flatpak_bundle_dir="$GITHUB_WORKSPACE/.ci/linux-native-bundles/flatpak"
          mkdir -p "$flatpak_bundle_dir"
          flatpak_bundle="$flatpak_bundle_dir/sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}.flatpak"
          flatpak build-bundle \
            --arch="$FLATPAK_ARCH" \
            --runtime-repo="$FLATHUB_REPOSITORY" \
            "$flatpak_repo" \
            "$flatpak_bundle" \
            "$FLATPAK_APP_ID" \
            stable
          test -s "$flatpak_bundle"

          flatpak install \
            --user \
            --noninteractive \
            --reinstall \
            "$flatpak_bundle"
          app_ref=$(flatpak info --user --show-ref "$FLATPAK_APP_ID")
          expected_app_ref="app/$FLATPAK_APP_ID/$FLATPAK_ARCH/stable"
          test "$app_ref" = "$expected_app_ref"
          installed_runtime=$(flatpak info \
            --user \
            --show-runtime \
            "$FLATPAK_APP_ID")
          test "$installed_runtime" = \
            "$FLATPAK_RUNTIME_ID/$FLATPAK_ARCH/$FLATPAK_RUNTIME_VERSION"

          dbus-run-session -- flatpak run \
            --command=sh \
            "$FLATPAK_APP_ID" \
            -c '
              set -eu
              test "${FLATPAK_ID:-}" = com.sortofremote.ng
              test -x /app/bin/sortOfRemoteNG
              test -s /app/share/applications/com.sortofremote.ng.desktop
              test -s /app/share/metainfo/com.sortofremote.ng.metainfo.xml
              test -d /app/bin/resources/opkssh
              resource_count=$(find /app/bin/resources/opkssh -type f ! -name .gitkeep | wc -l)
              test "$resource_count" -gt 0
              ldd_output=$(ldd /app/bin/sortOfRemoteNG)
              printf "%s\n" "$ldd_output"
              ! printf "%s\n" "$ldd_output" | grep -F "not found"
            '

          manifest_sha256=$(sha256sum "$FLATPAK_MANIFEST" | awk '{ print $1 }')
          [[ "$manifest_sha256" =~ ^[0-9a-f]{64}$ ]]
          {
            echo "FLATPAK_APP_REF=$app_ref"
            echo "FLATPAK_MANIFEST_SHA256=$manifest_sha256"
          } >> "$GITHUB_ENV"

      - name: Notarize and staple macOS disk image
        if: matrix.platform == 'macos' && steps.macos_signing.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          dmg_dir="src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg"
          dmg_count=$(find "$dmg_dir" -maxdepth 1 -type f -name '*.dmg' | wc -l | tr -d '[:space:]')
          [ "$dmg_count" -eq 1 ] || {
            echo "::error::Expected exactly one macOS disk image for ${{ matrix.artifact_id }}, found $dmg_count."
            exit 1
          }
          dmg=$(find "$dmg_dir" -maxdepth 1 -type f -name '*.dmg' -print -quit)
          xcrun notarytool submit "$dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json > "$RUNNER_TEMP/notarization-result.json"
          jq -e '.status == "Accepted"' "$RUNNER_TEMP/notarization-result.json" > /dev/null || {
            jq . "$RUNNER_TEMP/notarization-result.json"
            echo "::error::Apple notarization did not return Accepted."
            exit 1
          }
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"

      - name: Verify Windows Authenticode signatures
        if: matrix.platform == 'windows' && steps.windows_signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
          WINDOWS_SDK_ARCH: ${{ matrix.windows_sdk_arch }}
        run: |
          $ErrorActionPreference = "Stop"
          $windowsKits = Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\bin"
          $signtool = (Get-ChildItem "$windowsKits\*\$env:WINDOWS_SDK_ARCH\signtool.exe" | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw "signtool.exe was not found." }
          $bundleDir = "src-tauri/target/$env:RUST_TARGET/release/bundle"
          $files = @(Get-ChildItem -Path $bundleDir -Recurse -Include *.msi,*.exe)
          if ($files.Count -eq 0) { throw "No Windows installers were produced." }
          $portableExecutable = Get-Item -LiteralPath "src-tauri/target/$env:RUST_TARGET/release/app.exe"
          $files += $portableExecutable
          foreach ($file in $files) {
            & $signtool verify /pa /tw $file.FullName
            if ($LASTEXITCODE -ne 0) { throw "signtool verification failed for $($file.FullName)" }
          }

      - name: Package portable Windows archive
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          ARTIFACT_ID: ${{ matrix.artifact_id }}
          MACHINE_VERSION: ${{ needs.metadata.outputs.machine_version }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          $ErrorActionPreference = "Stop"

          function Get-PeMachine {
            param([Parameter(Mandatory = $true)][string]$Path)

            $stream = [System.IO.File]::Open(
              $Path,
              [System.IO.FileMode]::Open,
              [System.IO.FileAccess]::Read,
              [System.IO.FileShare]::Read
            )
            $reader = [System.IO.BinaryReader]::new($stream)
            try {
              if ($reader.ReadUInt16() -ne 0x5A4D) {
                throw "$Path does not start with an MZ header."
              }
              $stream.Position = 0x3C
              $peOffset = $reader.ReadUInt32()
              if ($peOffset -gt ($stream.Length - 6)) {
                throw "$Path has an invalid PE header offset."
              }
              $stream.Position = $peOffset
              if ($reader.ReadUInt32() -ne 0x00004550) {
                throw "$Path does not contain a PE signature."
              }
              return $reader.ReadUInt16()
            } finally {
              $reader.Dispose()
              $stream.Dispose()
            }
          }

          function Get-RelativeFileHashes {
            param([Parameter(Mandatory = $true)][string]$Root)

            $resolvedRoot = (Resolve-Path -LiteralPath $Root).Path
            return @(
              Get-ChildItem -LiteralPath $resolvedRoot -Recurse -File |
                ForEach-Object {
                  $relativePath = [System.IO.Path]::GetRelativePath(
                    $resolvedRoot,
                    $_.FullName
                  ).Replace('\', '/')
                  $sha256 = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
                  "$relativePath`t$sha256"
                } |
                Sort-Object
            )
          }

          $expectedMachine = switch ($env:ARTIFACT_ID) {
            "windows-x86_64" { 0x8664 }
            "windows-aarch64" { 0xAA64 }
            default { throw "Unsupported portable Windows artifact $env:ARTIFACT_ID." }
          }
          $sourceExecutable = "src-tauri/target/$env:RUST_TARGET/release/app.exe"
          if (-not (Test-Path -LiteralPath $sourceExecutable -PathType Leaf)) {
            throw "Portable source executable was not found at $sourceExecutable."
          }
          $sourceMachine = Get-PeMachine -Path $sourceExecutable
          if ($sourceMachine -ne $expectedMachine) {
            throw (
              "Portable source executable for {0} has PE Machine 0x{1:X4}; expected 0x{2:X4}." -f
                $env:ARTIFACT_ID,
                $sourceMachine,
                $expectedMachine
            )
          }

          $opksshSource = "src-tauri/crates/sorng-opkssh-vendor/bundle/opkssh"
          $opksshFiles = @(Get-ChildItem -LiteralPath $opksshSource -Recurse -File)
          if ($opksshFiles.Count -eq 0) {
            throw "Portable OPKSSH resources were not staged at $opksshSource."
          }
          $expectedResourceHashes = @(Get-RelativeFileHashes -Root $opksshSource)
          if ($expectedResourceHashes.Count -eq 0) {
            throw "Portable OPKSSH resource manifest is empty."
          }

          $portableRoot = Join-Path $env:RUNNER_TEMP "sortOfRemoteNG-$($env:ARTIFACT_ID)-portable"
          if (Test-Path -LiteralPath $portableRoot) {
            throw "Refusing to replace unexpected portable staging path $portableRoot."
          }
          New-Item -ItemType Directory -Path $portableRoot | Out-Null
          Copy-Item -LiteralPath $sourceExecutable -Destination (Join-Path $portableRoot "sortOfRemoteNG.exe")
          New-Item -ItemType File -Path (Join-Path $portableRoot ".portable") | Out-Null

          $resourceRoot = Join-Path $portableRoot "resources"
          New-Item -ItemType Directory -Path $resourceRoot | Out-Null
          Copy-Item -LiteralPath $opksshSource -Destination (Join-Path $resourceRoot "opkssh") -Recurse

          $portableBundleDir = "src-tauri/target/$env:RUST_TARGET/release/bundle/portable"
          New-Item -ItemType Directory -Path $portableBundleDir -Force | Out-Null
          $archive = Join-Path $portableBundleDir "sortOfRemoteNG_$($env:MACHINE_VERSION)_$($env:ARTIFACT_ID)-portable.zip"
          $portableContents = @(
            (Join-Path $portableRoot "sortOfRemoteNG.exe"),
            (Join-Path $portableRoot ".portable"),
            (Join-Path $portableRoot "resources")
          )
          Compress-Archive -LiteralPath $portableContents -DestinationPath $archive -CompressionLevel Optimal

          $verificationRoot = Join-Path $env:RUNNER_TEMP "sortOfRemoteNG-$($env:ARTIFACT_ID)-portable-verification"
          if (Test-Path -LiteralPath $verificationRoot) {
            throw "Refusing to replace unexpected portable verification path $verificationRoot."
          }
          Expand-Archive -LiteralPath $archive -DestinationPath $verificationRoot
          foreach ($requiredFile in @(
            "sortOfRemoteNG.exe",
            ".portable"
          )) {
            if (-not (Test-Path -LiteralPath (Join-Path $verificationRoot $requiredFile) -PathType Leaf)) {
              throw "Portable archive is missing required file $requiredFile."
            }
          }
          $verifiedResourceRoot = Join-Path $verificationRoot "resources/opkssh"
          if (-not (Test-Path -LiteralPath $verifiedResourceRoot -PathType Container)) {
            throw "Portable archive is missing the resources/opkssh directory."
          }

          $verifiedExecutable = Join-Path $verificationRoot "sortOfRemoteNG.exe"
          $verifiedMachine = Get-PeMachine -Path $verifiedExecutable
          if ($verifiedMachine -ne $expectedMachine) {
            throw (
              "Extracted portable executable for {0} has PE Machine 0x{1:X4}; expected 0x{2:X4}." -f
                $env:ARTIFACT_ID,
                $verifiedMachine,
                $expectedMachine
            )
          }
          $sourceExecutableHash = (Get-FileHash -LiteralPath $sourceExecutable -Algorithm SHA256).Hash
          $verifiedExecutableHash = (Get-FileHash -LiteralPath $verifiedExecutable -Algorithm SHA256).Hash
          if ($verifiedExecutableHash -ne $sourceExecutableHash) {
            throw "Extracted portable executable does not match the $env:ARTIFACT_ID source executable."
          }

          $sourceMarker = Join-Path $portableRoot ".portable"
          $verifiedMarker = Join-Path $verificationRoot ".portable"
          $sourceMarkerHash = (Get-FileHash -LiteralPath $sourceMarker -Algorithm SHA256).Hash
          $verifiedMarkerHash = (Get-FileHash -LiteralPath $verifiedMarker -Algorithm SHA256).Hash
          if ($verifiedMarkerHash -ne $sourceMarkerHash) {
            throw "Extracted .portable marker does not match the staged marker."
          }

          $verifiedResourceHashes = @(Get-RelativeFileHashes -Root $verifiedResourceRoot)
          $resourceDifference = @(
            Compare-Object `
              -ReferenceObject $expectedResourceHashes `
              -DifferenceObject $verifiedResourceHashes
          )
          if ($resourceDifference.Count -ne 0) {
            $resourceDifference | Format-Table | Out-String | Write-Host
            throw "Extracted OPKSSH resources do not match the staged source manifest."
          }

      - name: Verify macOS Developer ID, notarization, and stapling
        if: matrix.platform == 'macos' && steps.macos_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          app=$(find "src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos" -maxdepth 1 -type d -name '*.app' -print -quit)
          dmg=$(find "src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg" -maxdepth 1 -type f -name '*.dmg' -print -quit)
          test -n "$app"
          test -n "$dmg"
          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=4 "$app"
          xcrun stapler validate "$dmg"

      - name: Stage architecture-specific release assets
        shell: bash
        env:
          ARTIFACT_ID: ${{ matrix.artifact_id }}
          MACHINE_VERSION: ${{ needs.metadata.outputs.machine_version }}
          PLATFORM: ${{ matrix.platform }}
          RUST_TARGET: ${{ matrix.rust_target }}
          UPDATER_ENABLED: ${{ needs.metadata.outputs.updater_enabled }}
          MACOS_SIGNED: ${{ steps.macos_signing.outputs.enabled || 'false' }}
          WINDOWS_SIGNED: ${{ steps.windows_signing.outputs.enabled || 'false' }}
        run: |
          set -euo pipefail
          bundle="src-tauri/target/$RUST_TARGET/release/bundle"
          if [ "$PLATFORM" = linux ]; then
            bundle="$GITHUB_WORKSPACE/.ci/linux-native-bundles"
          fi
          mkdir -p artifacts
          one() {
            local directory="$1" pattern="$2" destination="$3"
            local source count
            count=$(find "$directory" -maxdepth 1 -type f -name "$pattern" | wc -l | tr -d '[:space:]')
            if [ "$count" -ne 1 ]; then
              echo "::error::Expected exactly one $pattern bundle in $directory for $ARTIFACT_ID, found $count."
              exit 1
            fi
            source=$(find "$directory" -maxdepth 1 -type f -name "$pattern" -print -quit)
            cp "$source" "artifacts/$destination"
            printf '%s' "$source"
          }
          case "$PLATFORM" in
            linux)
              updater_source=$(one "$bundle/appimage" '*.AppImage' "sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}.AppImage")
              updater_name="sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}.AppImage"
              deb_source=$(one "$bundle/deb" '*.deb' "sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}.deb")
              rpm_source=$(one "$bundle/rpm" '*.rpm' "sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}.rpm")
              one "$bundle/flatpak" '*.flatpak' "sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}.flatpak" >/dev/null

              expected_binary_path="/usr/bin/$LINUX_PACKAGE_MAIN_BINARY"
              expected_resource_root="/usr/lib/$LINUX_PACKAGE_PRODUCT_NAME/opkssh"
              opkssh_source="$GITHUB_WORKSPACE/src-tauri/crates/sorng-opkssh-vendor/bundle/opkssh"
              expected_resource_files="$RUNNER_TEMP/${ARTIFACT_ID}-expected-opkssh-files.txt"
              (
                cd "$opkssh_source"
                find . -type f ! -name .gitkeep -printf '%P\n' | LC_ALL=C sort
              ) > "$expected_resource_files"
              test -s "$expected_resource_files"

              actual_rpm_arch=$(rpm -qp --qf '%{ARCH}' "$rpm_source")
              actual_rpm_version=$(rpm -qp --qf '%{VERSION}' "$rpm_source")
              test "$actual_rpm_arch" = "$LINUX_RPM_ARCH"
              test "$actual_rpm_version" = "$MACHINE_VERSION"
              rpm_file_list="$RUNNER_TEMP/${ARTIFACT_ID}-rpm-files.txt"
              rpm -qpl "$rpm_source" | tee "$rpm_file_list"
              grep -Fx "$expected_binary_path" "$rpm_file_list"
              grep -Eq "^${expected_resource_root}/.+[^/]$" "$rpm_file_list"
              rpm_resource_files="$RUNNER_TEMP/${ARTIFACT_ID}-rpm-opkssh-files.txt"
              rpm -qpvl "$rpm_source" |
                awk -v prefix="${expected_resource_root}/" \
                  '$1 ~ /^-/ && index($NF, prefix) == 1 { print substr($NF, length(prefix) + 1) }' |
                grep -Ev '(^|/)\.gitkeep$' |
                LC_ALL=C sort > "$rpm_resource_files"
              diff -u "$expected_resource_files" "$rpm_resource_files"

              deb_file_list="$RUNNER_TEMP/${ARTIFACT_ID}-deb-files.txt"
              dpkg-deb -c "$deb_source" | tee "$deb_file_list"
              grep -Eq "[[:space:]]\\.${expected_binary_path}$" "$deb_file_list"
              grep -Eq "[[:space:]]\\.${expected_resource_root}/.+[^/]$" "$deb_file_list"
              deb_resource_files="$RUNNER_TEMP/${ARTIFACT_ID}-deb-opkssh-files.txt"
              awk -v prefix=".${expected_resource_root}/" \
                '$1 ~ /^-/ && index($NF, prefix) == 1 { print substr($NF, length(prefix) + 1) }' \
                "$deb_file_list" |
                grep -Ev '(^|/)\.gitkeep$' |
                LC_ALL=C sort > "$deb_resource_files"
              diff -u "$expected_resource_files" "$deb_resource_files"

              appimage_extract_root="$RUNNER_TEMP/${ARTIFACT_ID}-appimage-extract"
              if [ -e "$appimage_extract_root" ] || [ -L "$appimage_extract_root" ]; then
                echo "::error::Refusing to replace unexpected AppImage extraction path $appimage_extract_root."
                exit 1
              fi
              mkdir -p "$appimage_extract_root"
              (
                cd "$appimage_extract_root"
                "$updater_source" --appimage-extract > /dev/null
              )
              appimage_root="$appimage_extract_root/squashfs-root"
              test -x "$appimage_root$expected_binary_path"
              test -d "$appimage_root$expected_resource_root"
              appimage_resource_count=$(find "$appimage_root$expected_resource_root" -type f ! -name .gitkeep | wc -l | tr -d '[:space:]')
              [[ "$appimage_resource_count" =~ ^[0-9]+$ ]]
              test "$appimage_resource_count" -gt 0
              appimage_resource_files="$RUNNER_TEMP/${ARTIFACT_ID}-appimage-opkssh-files.txt"
              (
                cd "$appimage_root$expected_resource_root"
                find . -type f ! -name .gitkeep -printf '%P\n' | LC_ALL=C sort
              ) > "$appimage_resource_files"
              diff -u "$expected_resource_files" "$appimage_resource_files"
              os_signing=not-applicable
              ;;
            macos)
              one "$bundle/dmg" '*.dmg' "sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}.dmg" >/dev/null
              updater_source=""
              os_signing=$([ "$MACOS_SIGNED" = true ] && echo developer-id-verified || echo unsigned)
              if [ "$UPDATER_ENABLED" = true ]; then
                updater_source=$(one "$bundle/macos" '*.app.tar.gz' "sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}.app.tar.gz")
                updater_name="sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}.app.tar.gz"
              fi
              ;;
            windows)
              one "$bundle/msi" '*.msi' "sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}.msi" >/dev/null
              updater_source=$(one "$bundle/nsis" '*-setup.exe' "sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}-setup.exe")
              updater_name="sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}-setup.exe"
              one "$bundle/portable" '*-portable.zip' "sortOfRemoteNG_${MACHINE_VERSION}_${ARTIFACT_ID}-portable.zip" >/dev/null
              os_signing=$([ "$WINDOWS_SIGNED" = true ] && echo authenticode-verified || echo unsigned)
              ;;
          esac
          if [ "$UPDATER_ENABLED" = true ]; then
            test -n "$updater_source"
            test -s "${updater_source}.sig"
            test -n "$updater_name"
            cp "${updater_source}.sig" "artifacts/${updater_name}.sig"
          fi
          OS_SIGNING="$os_signing" node <<'NODE'
          const fs = require("node:fs");
          const file = `artifacts/sortOfRemoteNG_${process.env.MACHINE_VERSION}_${process.env.ARTIFACT_ID}.provenance.json`;
          const provenance = {
            target: process.env.ARTIFACT_ID,
            os_signing: process.env.OS_SIGNING,
            updater_signing: process.env.UPDATER_ENABLED === "true",
          };
          if (process.env.ARTIFACT_ID.startsWith("linux-")) {
            const required = [
              "LINUX_RPM_ARCH",
              "FLATPAK_ARCH",
              "FLATPAK_APP_REF",
              "FLATPAK_RUNTIME_REF",
              "FLATPAK_RUNTIME_COMMIT",
              "FLATPAK_SDK_REF",
              "FLATPAK_SDK_COMMIT",
              "FLATPAK_BUILDER_VERSION",
              "FLATPAK_MANIFEST",
              "FLATPAK_MANIFEST_SHA256",
            ];
            for (const name of required) {
              if (!process.env[name]?.trim()) {
                throw new Error(`${name} is required for Linux provenance.`);
              }
            }
            provenance.linux_packages = {
              rpm: {
                filename: `sortOfRemoteNG_${process.env.MACHINE_VERSION}_${process.env.ARTIFACT_ID}.rpm`,
                version: process.env.MACHINE_VERSION,
                arch: process.env.LINUX_RPM_ARCH,
              },
              flatpak: {
                filename: `sortOfRemoteNG_${process.env.MACHINE_VERSION}_${process.env.ARTIFACT_ID}.flatpak`,
                arch: process.env.FLATPAK_ARCH,
                app_ref: process.env.FLATPAK_APP_REF,
                runtime_ref: process.env.FLATPAK_RUNTIME_REF,
                runtime_commit: process.env.FLATPAK_RUNTIME_COMMIT,
                sdk_ref: process.env.FLATPAK_SDK_REF,
                sdk_commit: process.env.FLATPAK_SDK_COMMIT,
                builder_version: process.env.FLATPAK_BUILDER_VERSION,
                manifest_path: process.env.FLATPAK_MANIFEST,
                manifest_sha256: process.env.FLATPAK_MANIFEST_SHA256,
                resource_path: "/app/bin/resources/opkssh",
              },
            };
          }
          fs.writeFileSync(
            file,
            `${JSON.stringify(provenance, null, 2)}\n`,
          );
          NODE
          ls -la artifacts

      - name: Validate staged version metadata
        run: >-
          node scripts/ci/validate-release-artifacts.mjs
          --dist-dir artifacts
          --expected-version "${{ needs.metadata.outputs.machine_version }}"

      - name: Upload validated target assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.artifact_id }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14

      - name: Remove ephemeral signing configuration
        if: ${{ always() }}
        shell: bash
        run: |
          rm -f src-tauri/tauri.release.conf.json
          if [ "${{ matrix.platform }}" = macos ]; then
            security delete-keychain "$RUNNER_TEMP/release.keychain-db" 2>/dev/null || true
          fi

  publish:
    name: Validate and publish rolling release
    needs: [metadata, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout immutable release snapshot
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ needs.metadata.outputs.snapshot_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Node toolchain
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install updater signature verification toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Build updater signature verifier
        if: inputs.release_tier == 'production' || needs.metadata.outputs.updater_enabled == 'true'
        run: >-
          cargo build --quiet --locked --manifest-path src-tauri/Cargo.toml
          -p sorng-updater-signature-verifier

      - name: Download all validated target assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Validate complete public installer set
        shell: bash
        env:
          MACHINE_VERSION: ${{ needs.metadata.outputs.machine_version }}
          UPDATER_ENABLED: ${{ needs.metadata.outputs.updater_enabled }}
        run: |
          set -euo pipefail
          node scripts/ci/validate-release-artifacts.mjs \
            --dist-dir dist \
            --expected-version "$MACHINE_VERSION"
          required=(
            "sortOfRemoteNG_${MACHINE_VERSION}_linux-x86_64.AppImage"
            "sortOfRemoteNG_${MACHINE_VERSION}_linux-x86_64.deb"
            "sortOfRemoteNG_${MACHINE_VERSION}_linux-x86_64.rpm"
            "sortOfRemoteNG_${MACHINE_VERSION}_linux-x86_64.flatpak"
            "sortOfRemoteNG_${MACHINE_VERSION}_linux-aarch64.AppImage"
            "sortOfRemoteNG_${MACHINE_VERSION}_linux-aarch64.deb"
            "sortOfRemoteNG_${MACHINE_VERSION}_linux-aarch64.rpm"
            "sortOfRemoteNG_${MACHINE_VERSION}_linux-aarch64.flatpak"
            "sortOfRemoteNG_${MACHINE_VERSION}_darwin-aarch64.dmg"
            "sortOfRemoteNG_${MACHINE_VERSION}_darwin-x86_64.dmg"
            "sortOfRemoteNG_${MACHINE_VERSION}_windows-x86_64.msi"
            "sortOfRemoteNG_${MACHINE_VERSION}_windows-x86_64-setup.exe"
            "sortOfRemoteNG_${MACHINE_VERSION}_windows-x86_64-portable.zip"
            "sortOfRemoteNG_${MACHINE_VERSION}_windows-aarch64.msi"
            "sortOfRemoteNG_${MACHINE_VERSION}_windows-aarch64-setup.exe"
            "sortOfRemoteNG_${MACHINE_VERSION}_windows-aarch64-portable.zip"
            "sortOfRemoteNG_${MACHINE_VERSION}_linux-x86_64.provenance.json"
            "sortOfRemoteNG_${MACHINE_VERSION}_linux-aarch64.provenance.json"
            "sortOfRemoteNG_${MACHINE_VERSION}_darwin-aarch64.provenance.json"
            "sortOfRemoteNG_${MACHINE_VERSION}_darwin-x86_64.provenance.json"
            "sortOfRemoteNG_${MACHINE_VERSION}_windows-x86_64.provenance.json"
            "sortOfRemoteNG_${MACHINE_VERSION}_windows-aarch64.provenance.json"
          )
          if [ "$UPDATER_ENABLED" = true ]; then
            required+=(
              "sortOfRemoteNG_${MACHINE_VERSION}_linux-x86_64.AppImage.sig"
              "sortOfRemoteNG_${MACHINE_VERSION}_linux-aarch64.AppImage.sig"
              "sortOfRemoteNG_${MACHINE_VERSION}_darwin-aarch64.app.tar.gz"
              "sortOfRemoteNG_${MACHINE_VERSION}_darwin-aarch64.app.tar.gz.sig"
              "sortOfRemoteNG_${MACHINE_VERSION}_darwin-x86_64.app.tar.gz"
              "sortOfRemoteNG_${MACHINE_VERSION}_darwin-x86_64.app.tar.gz.sig"
              "sortOfRemoteNG_${MACHINE_VERSION}_windows-x86_64-setup.exe.sig"
              "sortOfRemoteNG_${MACHINE_VERSION}_windows-aarch64-setup.exe.sig"
            )
          fi
          for asset in "${required[@]}"; do
            test -s "dist/$asset" || { echo "::error::Missing validated installer $asset."; exit 1; }
          done
          printf '%s\n' "${required[@]}" | sort > "$RUNNER_TEMP/expected-dist-assets.txt"
          find dist -maxdepth 1 -type f -printf '%f\n' | sort > "$RUNNER_TEMP/actual-dist-assets.txt"
          if ! diff -u "$RUNNER_TEMP/expected-dist-assets.txt" "$RUNNER_TEMP/actual-dist-assets.txt"; then
            echo "::error::Release staging contains missing or unexpected assets."
            exit 1
          fi
          provenance_count=$(find dist -maxdepth 1 -type f -name '*.provenance.json' | wc -l)
          [ "$provenance_count" -eq 6 ] || { echo "::error::Expected six provenance records, found $provenance_count."; exit 1; }
          if [ "$UPDATER_ENABLED" != true ] && find dist -maxdepth 1 -type f \( -name '*.sig' -o -name '*.app.tar.gz' \) | grep -q .; then
            echo "::error::Updater-only artifacts exist even though the updater key is absent."
            exit 1
          fi

      - name: Generate signed updater feed
        if: needs.metadata.outputs.updater_enabled == 'true'
        shell: bash
        env:
          MACHINE_VERSION: ${{ needs.metadata.outputs.machine_version }}
          PUBLIC_TAG: ${{ needs.metadata.outputs.public_tag }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: |
          set -euo pipefail
          base="https://github.com/$GITHUB_REPOSITORY/releases/download/$PUBLIC_TAG"
          pub_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          platforms='{}'
          add() {
            local target="$1" artifact="$2"
            test -s "dist/$artifact"
            test -s "dist/$artifact.sig"
            signature=$(tr -d '\r\n\t ' < "dist/$artifact.sig")
            test -n "$signature"
            platforms=$(jq \
              --arg target "$target" \
              --arg signature "$signature" \
              --arg url "$base/$artifact" \
              '. + {($target): {signature: $signature, url: $url}}' \
              <<<"$platforms")
          }
          add linux-x86_64 "sortOfRemoteNG_${MACHINE_VERSION}_linux-x86_64.AppImage"
          add linux-aarch64 "sortOfRemoteNG_${MACHINE_VERSION}_linux-aarch64.AppImage"
          add darwin-aarch64 "sortOfRemoteNG_${MACHINE_VERSION}_darwin-aarch64.app.tar.gz"
          add darwin-x86_64 "sortOfRemoteNG_${MACHINE_VERSION}_darwin-x86_64.app.tar.gz"
          add windows-x86_64 "sortOfRemoteNG_${MACHINE_VERSION}_windows-x86_64-setup.exe"
          add windows-aarch64 "sortOfRemoteNG_${MACHINE_VERSION}_windows-aarch64-setup.exe"
          jq -n \
            --arg version "$MACHINE_VERSION" \
            --arg pub_date "$pub_date" \
            --arg notes "Rolling release $PUBLIC_TAG from source $SOURCE_SHA" \
            --argjson platforms "$platforms" \
            '{version: $version, pub_date: $pub_date, notes: $notes, platforms: $platforms}' \
            > dist/latest.json
          node scripts/ci/validate-updater-feed.mjs dist/latest.json \
            --dist-dir dist \
            --expected-version "$MACHINE_VERSION" \
            --require-signature-files \
            --require-platform linux-x86_64 \
            --require-platform linux-aarch64 \
            --require-platform darwin-aarch64 \
            --require-platform darwin-x86_64 \
            --require-platform windows-x86_64 \
            --require-platform windows-aarch64

      - name: Cryptographically verify every updater payload
        if: needs.metadata.outputs.updater_enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          verifier=src-tauri/target/debug/sorng-updater-signature-verifier
          node scripts/ci/verify-published-release-assets.mjs \
            --asset-dir dist \
            --expected-version "${{ needs.metadata.outputs.machine_version }}" \
            --updater-mode signed \
            --public-key-config src-tauri/tauri.conf.json \
            --signature-verifier "$verifier"

      - name: Verify exact unsigned release asset set
        if: needs.metadata.outputs.updater_enabled != 'true'
        run: >-
          node scripts/ci/verify-published-release-assets.mjs
          --asset-dir dist
          --expected-version "${{ needs.metadata.outputs.machine_version }}"
          --updater-mode unsigned

      - name: Recheck live monotonic release state before publication
        id: promotion_guard
        if: inputs.release_tier == 'production'
        shell: bash
        env:
          PUBLIC_TAG: ${{ needs.metadata.outputs.public_tag }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
          SOURCE_GUARD: ${{ needs.metadata.outputs.source_guard }}
        run: |
          set -euo pipefail
          [ "$SOURCE_GUARD" = passed ] || {
            echo "::error::Metadata source guard did not pass."
            exit 1
          }
          git fetch --force --tags origin
          guard_output="$RUNNER_TEMP/live-release-guard.txt"
          node scripts/ci/resolve-release-version.mjs \
            --source-sha "$SOURCE_SHA" \
            --repo . \
            --tag "$PUBLIC_TAG" \
            --github-output "$guard_output"
          grep -qx 'source_guard=passed' "$guard_output" || {
            echo "::error::Live monotonic source guard did not pass."
            exit 1
          }
          cat "$guard_output" >> "$GITHUB_OUTPUT"
          echo "safe=true" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        if: inputs.release_tier == 'production'
        shell: bash
        env:
          PUBLIC_TAG: ${{ needs.metadata.outputs.public_tag }}
          SNAPSHOT_COMMIT: ${{ needs.metadata.outputs.snapshot_commit }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
          UPDATER_ENABLED: ${{ needs.metadata.outputs.updater_enabled }}
        run: |
          {
            echo "Rolling release $PUBLIC_TAG"
            echo
            echo "Source commit: \`$SOURCE_SHA\`"
            echo "Release snapshot: \`$SNAPSHOT_COMMIT\`"
            echo
            echo "Native Linux x64 and ARM64 AppImage, Debian, RPM, and Flatpak bundles are included, together with Windows x64 and ARM64 installers and portable archives."
            echo
            if [ "$UPDATER_ENABLED" = true ]; then
              echo "Signed automatic-update artifacts and \`latest.json\` are included."
            else
              echo "Public installers are included. The updater signing key was not configured, so no updater signatures or \`latest.json\` are published."
            fi
            echo
            echo "macOS Developer ID and Windows Authenticode status is recorded in the per-target provenance assets."
          } > release-notes.md

      - name: Install immutable release-ID helpers
        if: inputs.release_tier == 'production'
        shell: bash
        run: |
          set -euo pipefail
          helper="$RUNNER_TEMP/release-id-helpers.sh"
          cat > "$helper" <<'RELEASE_ID_HELPERS'
          require_release_id() {
            local release_id="$1"
            if [[ ! "$release_id" =~ ^[1-9][0-9]*$ ]]; then
              echo "::error::Invalid immutable GitHub release ID: ${release_id:-<empty>}."
              return 1
            fi
          }

          load_release_by_id() {
            local release_id="$1" expected_tag="$2" expected_target="$3" expected_visibility="$4" output_file="$5"
            require_release_id "$release_id"
            gh api "repos/$GITHUB_REPOSITORY/releases/$release_id" > "$output_file"
            jq -e \
              --argjson release_id "$release_id" \
              --arg tag "$expected_tag" \
              --arg target "$expected_target" \
              '.id == $release_id and
               .tag_name == $tag and
               .target_commitish == $target and
               .prerelease == false' \
              "$output_file" > /dev/null || {
                echo "::error::Release $release_id does not match the exact tag, snapshot target, and non-prerelease contract."
                return 1
              }
            case "$expected_visibility" in
              draft)
                jq -e '.draft == true' "$output_file" > /dev/null || {
                  echo "::error::Release $release_id must remain a hidden draft."
                  return 1
                }
                ;;
              public)
                jq -e '.draft == false' "$output_file" > /dev/null || {
                  echo "::error::Release $release_id must already be public."
                  return 1
                }
                ;;
              stable)
                ;;
              *)
                echo "::error::Unknown release visibility contract: $expected_visibility."
                return 1
                ;;
            esac
          }

          resolve_release_by_tag() {
            local expected_tag="$1" expected_target="$2" expected_visibility="$3" output_file="$4"
            local matches_file match_count release_id
            matches_file=$(mktemp)
            if ! gh api --paginate \
              "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
              --jq '.[]' |
              jq -s --arg tag "$expected_tag" \
                '[.[] | select(.tag_name == $tag)]' > "$matches_file"; then
              rm -f "$matches_file"
              return 1
            fi
            match_count=$(jq 'length' "$matches_file")
            if [ "$match_count" -eq 0 ]; then
              rm -f "$matches_file"
              return 44
            fi
            if [ "$match_count" -ne 1 ]; then
              echo "::error::Expected exactly one authenticated GitHub release for tag $expected_tag, found $match_count."
              rm -f "$matches_file"
              return 1
            fi
            release_id=$(jq -er '.[0].id' "$matches_file")
            rm -f "$matches_file"
            load_release_by_id \
              "$release_id" \
              "$expected_tag" \
              "$expected_target" \
              "$expected_visibility" \
              "$output_file"
          }

          list_release_assets() {
            local release_id="$1" output_file="$2"
            require_release_id "$release_id"
            if ! gh api --paginate \
              "repos/$GITHUB_REPOSITORY/releases/$release_id/assets?per_page=100" \
              --jq '.[]' |
              jq -s 'sort_by(.name)' > "$output_file"; then
              return 1
            fi
            jq -e \
              'all(.[];
                 (.id | type == "number") and
                 (.id > 0) and
                 (.name | type == "string") and
                 (.name | test("^[A-Za-z0-9][A-Za-z0-9._-]*$")) and
                 (.size | type == "number") and
                 (.size > 0) and
                 (.state == "uploaded") and
                 (.digest | type == "string") and
                 (.digest | test("^sha256:[0-9a-f]{64}$"))) and
               ([.[].id] | length) == ([.[].id] | unique | length) and
               ([.[].name] | length) == ([.[].name] | unique | length)' \
              "$output_file" > /dev/null || {
                echo "::error::Release $release_id has duplicate, empty, or non-checksummed assets."
                return 1
              }
          }

          download_release_assets() {
            local release_id="$1" asset_manifest="$2" destination="$3"
            local asset_id asset_name expected_size digest expected_sha actual_size actual_sha
            require_release_id "$release_id"
            mkdir -p "$destination"
            while IFS=$'\t' read -r asset_id asset_name expected_size digest; do
              [ -n "$asset_id" ] || continue
              if [[ ! "$asset_id" =~ ^[1-9][0-9]*$ ]] ||
                 [[ ! "$asset_name" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]] ||
                 [[ ! "$expected_size" =~ ^[1-9][0-9]*$ ]] ||
                 [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
                echo "::error::Release $release_id contains unsafe or incomplete asset metadata."
                return 1
              fi
              expected_sha=${digest#sha256:}
              gh api \
                -H "Accept: application/octet-stream" \
                "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" \
                > "$destination/$asset_name"
              actual_size=$(wc -c < "$destination/$asset_name" | tr -d '[:space:]')
              [ "$actual_size" = "$expected_size" ] || {
                echo "::error::Downloaded $asset_name has $actual_size bytes; GitHub recorded $expected_size."
                return 1
              }
              actual_sha=$(sha256sum "$destination/$asset_name" | awk '{print $1}')
              [ "$actual_sha" = "$expected_sha" ] || {
                echo "::error::Downloaded $asset_name does not match GitHub's SHA-256 digest."
                return 1
              }
            done < <(jq -r '.[] | [.id, .name, .size, .digest] | @tsv' "$asset_manifest")
          }

          promote_release_by_id() {
            local release_id="$1" expected_tag="$2" expected_target="$3" expected_visibility="$4" output_file="$5"
            local current_release
            current_release=$(mktemp)
            load_release_by_id \
              "$release_id" \
              "$expected_tag" \
              "$expected_target" \
              "$expected_visibility" \
              "$current_release"
            rm -f "$current_release"
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
              -F draft=false \
              -F prerelease=false \
              -f make_latest=true > "$output_file"
            jq -e \
              --argjson release_id "$release_id" \
              --arg tag "$expected_tag" \
              --arg target "$expected_target" \
              '.id == $release_id and
               .tag_name == $tag and
               .target_commitish == $target and
               .draft == false and
               .prerelease == false' \
              "$output_file" > /dev/null || {
                echo "::error::GitHub did not promote the exact validated release ID."
                return 1
              }
          }
          RELEASE_ID_HELPERS
          chmod 700 "$helper"

      - name: Inspect existing release and protect signed assets
        id: publication
        if: inputs.release_tier == 'production'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MACHINE_VERSION: ${{ needs.metadata.outputs.machine_version }}
          PUBLIC_TAG: ${{ needs.metadata.outputs.public_tag }}
          SNAPSHOT_COMMIT: ${{ needs.metadata.outputs.snapshot_commit }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
          UPDATER_ENABLED: ${{ needs.metadata.outputs.updater_enabled }}
        run: |
          set -euo pipefail
          source "$RUNNER_TEMP/release-id-helpers.sh"

          api_get() {
            local endpoint="$1" output_file="$2" error_file response_file command_status http_status
            error_file=$(mktemp)
            response_file=$(mktemp)
            if gh api --include "$endpoint" > "$response_file" 2> "$error_file"; then
              command_status=0
            else
              command_status=$?
            fi
            http_status=$(sed -n '1s/^HTTP\/[^ ]* \([0-9][0-9][0-9]\).*/\1/p' "$response_file")
            if [ "$http_status" = 404 ]; then
              rm -f "$error_file" "$response_file"
              return 44
            fi
            if [ "$command_status" -ne 0 ] || [[ ! "$http_status" =~ ^2[0-9][0-9]$ ]]; then
              echo "::error::GitHub API request failed for $endpoint (HTTP ${http_status:-unknown})."
              cat "$error_file" >&2
              rm -f "$error_file" "$response_file"
              if [ "$command_status" -ne 0 ]; then
                return "$command_status"
              fi
              return 1
            fi
            awk 'body { print } /^\r?$/ { body=1; next }' "$response_file" > "$output_file"
            rm -f "$error_file" "$response_file"
            return 0
          }

          release_json="$RUNNER_TEMP/existing-release.json"
          asset_manifest="$RUNNER_TEMP/existing-release-assets.json"
          latest_json="$RUNNER_TEMP/latest-release.json"
          release_exists=false
          latest_exists=false
          release_id=""
          if resolve_release_by_tag \
            "$PUBLIC_TAG" \
            "$SNAPSHOT_COMMIT" \
            stable \
            "$release_json"; then
            release_exists=true
            release_id=$(jq -er '.id' "$release_json")
          else
            status=$?
            [ "$status" -eq 44 ] || exit "$status"
          fi
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          if api_get "repos/$GITHUB_REPOSITORY/releases/latest" "$latest_json"; then
            latest_exists=true
          else
            status=$?
            [ "$status" -eq 44 ] || exit "$status"
          fi

          latest_tag=""
          latest_signed=false
          if [ "$latest_exists" = true ]; then
            latest_tag=$(jq -er '.tag_name' "$latest_json")
            if jq -e '[.assets[].name | select(. == "latest.json" or endswith(".sig") or endswith(".app.tar.gz"))] | length > 0' "$latest_json" > /dev/null; then
              latest_signed=true
            fi
          fi
          if [ -n "$latest_tag" ] && [ "$latest_tag" != "$PUBLIC_TAG" ]; then
            git fetch --force origin "refs/tags/$latest_tag:refs/tags/$latest_tag"
            latest_commit=$(git rev-parse "refs/tags/$latest_tag^{commit}")
            latest_source=$(git log -1 --format='%(trailers:key=Release-Source-SHA,valueonly)' "$latest_commit" | tr -d '[:space:]')
            if [[ ! "$latest_source" =~ ^[0-9a-f]{40}$ ]]; then
              latest_source="$latest_commit"
            fi
            git merge-base --is-ancestor "$latest_source" "$SOURCE_SHA" || {
              echo "::error::Current source is not a descendant of the live latest release source; refusing rollback promotion."
              exit 1
            }
          fi
          latest_provenance_dir="$RUNNER_TEMP/latest-release-provenance"
          mkdir -p "$latest_provenance_dir"
          if [ "$latest_exists" = true ] && [ "$latest_tag" != "$PUBLIC_TAG" ]; then
            if jq -e '[.assets[].name | select(endswith(".provenance.json"))] | length > 0' "$latest_json" > /dev/null; then
              gh release download "$latest_tag" \
                --dir "$latest_provenance_dir" \
                --pattern '*.provenance.json' \
                --clobber
            fi
          fi
          protect_latest_downgrade() {
            local candidate_updater_mode="$1" candidate_dir="$2"
            [ "$latest_exists" = true ] || return 0
            [ "$latest_tag" != "$PUBLIC_TAG" ] || return 0
            if [ "$candidate_updater_mode" != signed ] && [ "$latest_signed" = true ]; then
              echo "::error::The current latest release is updater-signed; refusing to promote an unsigned release over it."
              exit 1
            fi
            protect_latest_os_downgrade() {
              local target="$1" signed_state="$2" candidate_file candidate_os latest_has_assets latest_file_count latest_file latest_os
              candidate_file="$candidate_dir/sortOfRemoteNG_${MACHINE_VERSION}_${target}.provenance.json"
              candidate_os=$(jq -er '.os_signing' "$candidate_file") || {
                echo "::error::Candidate $target provenance is missing or invalid."
                exit 1
              }
              [ "$candidate_os" = unsigned ] || return 0
              latest_has_assets=$(jq -r --arg target "$target" '[.assets[].name | select(contains($target))] | length' "$latest_json")
              [ "$latest_has_assets" -gt 0 ] || return 0
              latest_file_count=$(find "$latest_provenance_dir" -maxdepth 1 -type f -name "*_${target}.provenance.json" | wc -l | tr -d '[:space:]')
              if [ "$latest_file_count" -ne 1 ]; then
                echo "::error::The latest release has $target assets but not exactly one provenance record; refusing a possible OS-signing downgrade."
                exit 1
              fi
              latest_file=$(find "$latest_provenance_dir" -maxdepth 1 -type f -name "*_${target}.provenance.json" -print -quit)
              latest_os=$(jq -r '.os_signing // "unknown"' "$latest_file" 2> /dev/null || printf 'unknown')
              if [ "$latest_os" != unsigned ]; then
                echo "::error::The latest $target release has $latest_os signing state; refusing to replace it with unsigned assets (protected signed state: $signed_state)."
                exit 1
              fi
            }
            protect_latest_os_downgrade darwin-aarch64 developer-id-verified
            protect_latest_os_downgrade darwin-x86_64 developer-id-verified
            protect_latest_os_downgrade windows-x86_64 authenticode-verified
            protect_latest_os_downgrade windows-aarch64 authenticode-verified
          }

          if [ "$release_exists" != true ]; then
            candidate_updater_mode=$([ "$UPDATER_ENABLED" = true ] && echo signed || echo unsigned)
            protect_latest_downgrade "$candidate_updater_mode" dist
            echo "no_op=false" >> "$GITHUB_OUTPUT"
            echo "upload=true" >> "$GITHUB_OUTPUT"
            echo "promote=true" >> "$GITHUB_OUTPUT"
            echo "reconcile=false" >> "$GITHUB_OUTPUT"
            echo "public_promotion=false" >> "$GITHUB_OUTPUT"
            echo "candidate_updater_mode=$candidate_updater_mode" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          remote_dir="$RUNNER_TEMP/existing-release-assets"
          mkdir -p "$remote_dir"
          list_release_assets "$release_id" "$asset_manifest"
          asset_count=$(jq 'length' "$asset_manifest")
          if [ "$asset_count" -gt 0 ]; then
            download_release_assets "$release_id" "$asset_manifest" "$remote_dir"
          fi

          remote_updater_mode=unsigned
          if jq -e '[.[].name | select(. == "latest.json" or endswith(".sig") or endswith(".app.tar.gz"))] | length > 0' "$asset_manifest" > /dev/null; then
            remote_updater_mode=signed
          fi
          verifier=src-tauri/target/debug/sorng-updater-signature-verifier
          verify_args=(
            --asset-dir "$remote_dir"
            --expected-version "$MACHINE_VERSION"
            --updater-mode "$remote_updater_mode"
          )
          if [ "$remote_updater_mode" = signed ]; then
            verify_args+=(
              --public-key-config src-tauri/tauri.conf.json
              --signature-verifier "$verifier"
            )
          fi
          remote_valid=false
          if node scripts/ci/verify-published-release-assets.mjs "${verify_args[@]}"; then
            remote_valid=true
          fi

          is_draft=$(jq -r '.draft' "$release_json")
          is_prerelease=$(jq -r '.prerelease' "$release_json")
          if [ "$is_draft" != true ] && \
             [ "$is_prerelease" = false ] && \
             [ "$remote_valid" = true ]; then
            protect_latest_downgrade "$remote_updater_mode" "$remote_dir"
            if [ "$latest_tag" = "$PUBLIC_TAG" ]; then
              echo "no_op=true" >> "$GITHUB_OUTPUT"
              echo "upload=false" >> "$GITHUB_OUTPUT"
              echo "promote=false" >> "$GITHUB_OUTPUT"
              echo "reconcile=false" >> "$GITHUB_OUTPUT"
              echo "public_promotion=false" >> "$GITHUB_OUTPUT"
              echo "candidate_updater_mode=$remote_updater_mode" >> "$GITHUB_OUTPUT"
              echo "Existing published release is complete, current, and cryptographically valid; no mutation is needed."
            else
              echo "no_op=false" >> "$GITHUB_OUTPUT"
              echo "upload=false" >> "$GITHUB_OUTPUT"
              echo "promote=true" >> "$GITHUB_OUTPUT"
              echo "reconcile=false" >> "$GITHUB_OUTPUT"
              echo "public_promotion=true" >> "$GITHUB_OUTPUT"
              echo "candidate_updater_mode=$remote_updater_mode" >> "$GITHUB_OUTPUT"
              echo "Existing published release is complete and valid; retrying latest promotion without asset mutation."
            fi
            exit 0
          fi

          if [ "$is_draft" != true ]; then
            echo "::error::Existing public release is incomplete or is not the latest release. Refusing a non-atomic in-place overwrite; recover through a new rolling release."
            exit 1
          fi

          local_state() {
            local target="$1"
            jq -er '.os_signing' "dist/sortOfRemoteNG_${MACHINE_VERSION}_${target}.provenance.json"
          }
          remote_state() {
            local target="$1" file
            file="$remote_dir/sortOfRemoteNG_${MACHINE_VERSION}_${target}.provenance.json"
            if [ ! -s "$file" ]; then
              printf 'unknown'
              return
            fi
            jq -r '.os_signing // "unknown"' "$file" 2> /dev/null || printf 'unknown'
          }
          remote_has_target_assets() {
            local target="$1"
            jq -e --arg target "$target" '[.[].name | select(contains($target))] | length > 0' "$asset_manifest" > /dev/null
          }
          protect_os_downgrade() {
            local target="$1" signed_state="$2" local_os remote_os
            local_os=$(local_state "$target")
            [ "$local_os" = unsigned ] || return 0
            remote_has_target_assets "$target" || return 0
            remote_os=$(remote_state "$target")
            if [ "$remote_os" != unsigned ]; then
              echo "::error::Existing $target assets have $remote_os signing state; refusing to overwrite them with unsigned assets (expected preserved state: $signed_state)."
              exit 1
            fi
          }

          needs_upgrade=false
          if [ "$UPDATER_ENABLED" = true ] && [ "$remote_updater_mode" != signed ]; then
            needs_upgrade=true
          fi
          for target in darwin-aarch64 darwin-x86_64 windows-x86_64 windows-aarch64; do
            local_os=$(local_state "$target")
            remote_os=$(remote_state "$target")
            if [ "$local_os" != unsigned ] && [ "$local_os" != "$remote_os" ]; then
              needs_upgrade=true
            fi
          done

          if [ "$remote_valid" = true ] && [ "$needs_upgrade" != true ]; then
            protect_latest_downgrade "$remote_updater_mode" "$remote_dir"
            echo "no_op=false" >> "$GITHUB_OUTPUT"
            echo "upload=false" >> "$GITHUB_OUTPUT"
            echo "promote=true" >> "$GITHUB_OUTPUT"
            echo "reconcile=false" >> "$GITHUB_OUTPUT"
            echo "public_promotion=false" >> "$GITHUB_OUTPUT"
            echo "candidate_updater_mode=$remote_updater_mode" >> "$GITHUB_OUTPUT"
            echo "Existing draft is already complete and valid; it will be promoted without asset replacement."
            exit 0
          fi

          if [ "$remote_updater_mode" = signed ] && [ "$UPDATER_ENABLED" != true ]; then
            echo "::error::Existing draft contains signed updater assets; the updater private key is required for any repair."
            exit 1
          fi
          protect_os_downgrade darwin-aarch64 developer-id-verified
          protect_os_downgrade darwin-x86_64 developer-id-verified
          protect_os_downgrade windows-x86_64 authenticode-verified
          protect_os_downgrade windows-aarch64 authenticode-verified
          candidate_updater_mode=$([ "$UPDATER_ENABLED" = true ] && echo signed || echo unsigned)
          protect_latest_downgrade "$candidate_updater_mode" dist

          echo "no_op=false" >> "$GITHUB_OUTPUT"
          echo "upload=true" >> "$GITHUB_OUTPUT"
          echo "promote=true" >> "$GITHUB_OUTPUT"
          echo "reconcile=true" >> "$GITHUB_OUTPUT"
          echo "public_promotion=false" >> "$GITHUB_OUTPUT"
          echo "candidate_updater_mode=$candidate_updater_mode" >> "$GITHUB_OUTPUT"
          echo "Existing draft requires a validated asset repair before promotion."

      - name: Reconcile stale assets in the hidden draft
        if: >-
          inputs.release_tier == 'production' &&
          steps.promotion_guard.outputs.safe == 'true' &&
          steps.publication.outputs.reconcile == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_TAG: ${{ needs.metadata.outputs.public_tag }}
          RELEASE_ID: ${{ steps.publication.outputs.release_id }}
          SNAPSHOT_COMMIT: ${{ needs.metadata.outputs.snapshot_commit }}
        run: |
          set -euo pipefail
          source "$RUNNER_TEMP/release-id-helpers.sh"
          release_json="$RUNNER_TEMP/draft-reconciliation.json"
          load_release_by_id \
            "$RELEASE_ID" \
            "$PUBLIC_TAG" \
            "$SNAPSHOT_COMMIT" \
            draft \
            "$release_json"
          asset_list="$RUNNER_TEMP/draft-assets.tsv"
          asset_manifest="$RUNNER_TEMP/draft-assets.json"
          list_release_assets "$RELEASE_ID" "$asset_manifest"
          jq -r '.[] | [.id, .name] | @tsv' "$asset_manifest" > "$asset_list"
          while IFS=$'\t' read -r asset_id asset_name; do
            [ -n "$asset_id" ] || continue
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
            echo "Removed stale hidden-draft asset $asset_name before deterministic replacement."
          done < "$asset_list"

      - name: Upload exact unsigned assets to draft release
        id: upload_unsigned
        if: >-
          inputs.release_tier == 'production' &&
          steps.promotion_guard.outputs.safe == 'true' &&
          steps.publication.outputs.upload == 'true' &&
          needs.metadata.outputs.updater_enabled != 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.metadata.outputs.public_tag }}
          target_commitish: ${{ needs.metadata.outputs.snapshot_commit }}
          name: ${{ needs.metadata.outputs.public_version }}
          body_path: release-notes.md
          draft: true
          prerelease: false
          make_latest: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-x86_64.AppImage
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-x86_64.deb
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-x86_64.rpm
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-x86_64.flatpak
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-aarch64.AppImage
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-aarch64.deb
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-aarch64.rpm
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-aarch64.flatpak
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_darwin-aarch64.dmg
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_darwin-x86_64.dmg
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-x86_64.msi
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-x86_64-setup.exe
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-x86_64-portable.zip
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-aarch64.msi
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-aarch64-setup.exe
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-aarch64-portable.zip
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-x86_64.provenance.json
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-aarch64.provenance.json
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_darwin-aarch64.provenance.json
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_darwin-x86_64.provenance.json
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-x86_64.provenance.json
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-aarch64.provenance.json

      - name: Upload exact signed assets and root updater feed to draft release
        id: upload_signed
        if: >-
          inputs.release_tier == 'production' &&
          steps.promotion_guard.outputs.safe == 'true' &&
          steps.publication.outputs.upload == 'true' &&
          needs.metadata.outputs.updater_enabled == 'true'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.metadata.outputs.public_tag }}
          target_commitish: ${{ needs.metadata.outputs.snapshot_commit }}
          name: ${{ needs.metadata.outputs.public_version }}
          body_path: release-notes.md
          draft: true
          prerelease: false
          make_latest: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-x86_64.AppImage
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-x86_64.AppImage.sig
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-x86_64.deb
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-x86_64.rpm
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-x86_64.flatpak
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-aarch64.AppImage
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-aarch64.AppImage.sig
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-aarch64.deb
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-aarch64.rpm
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-aarch64.flatpak
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_darwin-aarch64.dmg
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_darwin-aarch64.app.tar.gz
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_darwin-aarch64.app.tar.gz.sig
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_darwin-x86_64.dmg
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_darwin-x86_64.app.tar.gz
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_darwin-x86_64.app.tar.gz.sig
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-x86_64.msi
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-x86_64-setup.exe
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-x86_64-setup.exe.sig
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-x86_64-portable.zip
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-aarch64.msi
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-aarch64-setup.exe
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-aarch64-setup.exe.sig
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-aarch64-portable.zip
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-x86_64.provenance.json
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_linux-aarch64.provenance.json
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_darwin-aarch64.provenance.json
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_darwin-x86_64.provenance.json
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-x86_64.provenance.json
            dist/sortOfRemoteNG_${{ needs.metadata.outputs.machine_version }}_windows-aarch64.provenance.json
            dist/latest.json

      - name: Resolve immutable staged release identity
        id: staged_release
        if: >-
          inputs.release_tier == 'production' &&
          steps.promotion_guard.outputs.safe == 'true' &&
          steps.publication.outputs.promote == 'true'
        shell: bash
        env:
          EXISTING_RELEASE_ID: ${{ steps.publication.outputs.release_id }}
          GH_TOKEN: ${{ github.token }}
          PUBLIC_PROMOTION: ${{ steps.publication.outputs.public_promotion }}
          PUBLIC_TAG: ${{ needs.metadata.outputs.public_tag }}
          SIGNED_UPLOAD_RELEASE_ID: ${{ steps.upload_signed.outputs.id }}
          SNAPSHOT_COMMIT: ${{ needs.metadata.outputs.snapshot_commit }}
          UNSIGNED_UPLOAD_RELEASE_ID: ${{ steps.upload_unsigned.outputs.id }}
        run: |
          set -euo pipefail
          source "$RUNNER_TEMP/release-id-helpers.sh"

          upload_release_id=""
          upload_id_count=0
          for candidate in "$UNSIGNED_UPLOAD_RELEASE_ID" "$SIGNED_UPLOAD_RELEASE_ID"; do
            if [ -n "$candidate" ]; then
              upload_release_id="$candidate"
              upload_id_count=$((upload_id_count + 1))
            fi
          done
          [ "$upload_id_count" -le 1 ] || {
            echo "::error::Both mutually exclusive draft upload steps returned release IDs."
            exit 1
          }

          release_id="$EXISTING_RELEASE_ID"
          if [ -n "$upload_release_id" ]; then
            if [ -n "$release_id" ] && [ "$release_id" != "$upload_release_id" ]; then
              echo "::error::The upload action selected release $upload_release_id instead of the authenticated existing release $release_id."
              exit 1
            fi
            release_id="$upload_release_id"
          fi
          require_release_id "$release_id"

          expected_visibility=draft
          if [ "$PUBLIC_PROMOTION" = true ]; then
            expected_visibility=public
          fi
          release_json="$RUNNER_TEMP/staged-release-identity.json"
          load_release_by_id \
            "$release_id" \
            "$PUBLIC_TAG" \
            "$SNAPSHOT_COMMIT" \
            "$expected_visibility" \
            "$release_json"

          resolved_json="$RUNNER_TEMP/staged-release-list-match.json"
          list_release_id=""
          for attempt in 1 2 3 4 5; do
            if resolve_release_by_tag \
              "$PUBLIC_TAG" \
              "$SNAPSHOT_COMMIT" \
              "$expected_visibility" \
              "$resolved_json"; then
              list_release_id=$(jq -er '.id' "$resolved_json")
              break
            else
              status=$?
              [ "$status" -eq 44 ] || exit "$status"
              [ "$attempt" -lt 5 ] && sleep 2
            fi
          done
          [ -n "$list_release_id" ] || {
            echo "::error::Release $release_id was not discoverable through the authenticated release list."
            exit 1
          }
          [ "$list_release_id" = "$release_id" ] || {
            echo "::error::The authenticated release list resolved $list_release_id, but the immutable staged release is $release_id."
            exit 1
          }
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

      - name: Re-download and validate complete draft release
        if: >-
          inputs.release_tier == 'production' &&
          steps.promotion_guard.outputs.safe == 'true' &&
          steps.publication.outputs.promote == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MACHINE_VERSION: ${{ needs.metadata.outputs.machine_version }}
          PUBLIC_TAG: ${{ needs.metadata.outputs.public_tag }}
          RELEASE_ID: ${{ steps.staged_release.outputs.release_id }}
          SNAPSHOT_COMMIT: ${{ needs.metadata.outputs.snapshot_commit }}
          PUBLIC_PROMOTION: ${{ steps.publication.outputs.public_promotion }}
          UPDATER_MODE: ${{ steps.publication.outputs.candidate_updater_mode }}
        run: |
          set -euo pipefail
          source "$RUNNER_TEMP/release-id-helpers.sh"
          release_json="$RUNNER_TEMP/staged-release.json"
          expected_visibility=draft
          if [ "$PUBLIC_PROMOTION" = true ]; then
            expected_visibility=public
          fi
          load_release_by_id \
            "$RELEASE_ID" \
            "$PUBLIC_TAG" \
            "$SNAPSHOT_COMMIT" \
            "$expected_visibility" \
            "$release_json"
          asset_manifest="$RUNNER_TEMP/staged-release-assets.json"
          list_release_assets "$RELEASE_ID" "$asset_manifest"
          expected_asset_count=22
          if [ "$UPDATER_MODE" = signed ]; then
            expected_asset_count=31
          fi
          actual_asset_count=$(jq 'length' "$asset_manifest")
          [ "$actual_asset_count" -eq "$expected_asset_count" ] || {
            echo "::error::Release $RELEASE_ID has $actual_asset_count assets; $UPDATER_MODE mode requires exactly $expected_asset_count."
            exit 1
          }
          remote_dir="$RUNNER_TEMP/staged-release-assets"
          mkdir -p "$remote_dir"
          download_release_assets "$RELEASE_ID" "$asset_manifest" "$remote_dir"
          verify_args=(
            --asset-dir "$remote_dir"
            --expected-version "$MACHINE_VERSION"
            --updater-mode "$UPDATER_MODE"
          )
          if [ "$UPDATER_MODE" = signed ]; then
            verify_args+=(
              --public-key-config src-tauri/tauri.conf.json
              --signature-verifier src-tauri/target/debug/sorng-updater-signature-verifier
            )
          fi
          node scripts/ci/verify-published-release-assets.mjs "${verify_args[@]}"

      - name: Publish and promote the validated draft atomically
        if: >-
          inputs.release_tier == 'production' &&
          steps.promotion_guard.outputs.safe == 'true' &&
          steps.publication.outputs.promote == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_TAG: ${{ needs.metadata.outputs.public_tag }}
          PUBLIC_PROMOTION: ${{ steps.publication.outputs.public_promotion }}
          RELEASE_ID: ${{ steps.staged_release.outputs.release_id }}
          SNAPSHOT_COMMIT: ${{ needs.metadata.outputs.snapshot_commit }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: |
          set -euo pipefail
          source "$RUNNER_TEMP/release-id-helpers.sh"
          api_get() {
            local endpoint="$1" output_file="$2" error_file response_file command_status http_status
            error_file=$(mktemp)
            response_file=$(mktemp)
            if gh api --include "$endpoint" > "$response_file" 2> "$error_file"; then
              command_status=0
            else
              command_status=$?
            fi
            http_status=$(sed -n '1s/^HTTP\/[^ ]* \([0-9][0-9][0-9]\).*/\1/p' "$response_file")
            if [ "$http_status" = 404 ]; then
              rm -f "$error_file" "$response_file"
              return 44
            fi
            if [ "$command_status" -ne 0 ] || [[ ! "$http_status" =~ ^2[0-9][0-9]$ ]]; then
              echo "::error::GitHub API request failed for $endpoint (HTTP ${http_status:-unknown})."
              cat "$error_file" >&2
              rm -f "$error_file" "$response_file"
              if [ "$command_status" -ne 0 ]; then
                return "$command_status"
              fi
              return 1
            fi
            awk 'body { print } /^\r?$/ { body=1; next }' "$response_file" > "$output_file"
            rm -f "$error_file" "$response_file"
            return 0
          }
          git fetch --force --tags origin
          guard_output="$RUNNER_TEMP/final-release-guard.txt"
          node scripts/ci/resolve-release-version.mjs \
            --source-sha "$SOURCE_SHA" \
            --repo . \
            --tag "$PUBLIC_TAG" \
            --github-output "$guard_output"
          grep -qx 'source_guard=passed' "$guard_output" || {
            echo "::error::Final monotonic source guard did not pass."
            exit 1
          }
          latest_json="$RUNNER_TEMP/final-live-latest.json"
          if api_get "repos/$GITHUB_REPOSITORY/releases/latest" "$latest_json"; then
            latest_exists=true
          else
            status=$?
            [ "$status" -eq 44 ] || exit "$status"
            latest_exists=false
          fi
          if [ "$latest_exists" = true ]; then
            latest_tag=$(jq -er '.tag_name' "$latest_json")
            if [ "$latest_tag" != "$PUBLIC_TAG" ]; then
              git fetch --force origin "refs/tags/$latest_tag:refs/tags/$latest_tag"
              latest_commit=$(git rev-parse "refs/tags/$latest_tag^{commit}")
              latest_source=$(git log -1 --format='%(trailers:key=Release-Source-SHA,valueonly)' "$latest_commit" | tr -d '[:space:]')
              if [[ ! "$latest_source" =~ ^[0-9a-f]{40}$ ]]; then
                latest_source="$latest_commit"
              fi
              git merge-base --is-ancestor "$latest_source" "$SOURCE_SHA" || {
                echo "::error::A newer or divergent release became latest; refusing rollback promotion."
                exit 1
              }
            fi
          fi
          expected_visibility=draft
          if [ "$PUBLIC_PROMOTION" = true ]; then
            expected_visibility=public
          fi
          promote_release_by_id \
            "$RELEASE_ID" \
            "$PUBLIC_TAG" \
            "$SNAPSHOT_COMMIT" \
            "$expected_visibility" \
            "$RUNNER_TEMP/promoted-release.json"
          latest_tag=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq '.tag_name')
          [ "$latest_tag" = "$PUBLIC_TAG" ] || {
            echo "::error::Validated release was published but was not promoted to latest."
            exit 1
          }

      - name: Summarize idempotent production no-op
        if: inputs.release_tier == 'production' && steps.publication.outputs.no_op == 'true'
        run: >-
          echo "${{ needs.metadata.outputs.public_tag }} is already a complete,
          validated, current public release; no GitHub Release mutation occurred."

      - name: Summarize non-production validation
        if: inputs.release_tier != 'production'
        shell: bash
        run: >-
          echo "${{ inputs.release_tier }} validation completed for
          ${{ needs.metadata.outputs.public_tag }} at
          ${{ needs.metadata.outputs.snapshot_commit }}; no GitHub Release was modified."
